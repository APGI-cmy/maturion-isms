name: Deploy MMM Frontend to Vercel

# MMM WORKFLOW OWNERSHIP BOUNDARY
# This workflow owns the MMM frontend deployment surface only.
#
# Owned app path: apps/mmm/**
# Owned package: @maturion/mmm
# Expected output directory: apps/mmm/dist
# Vercel project target: maturion-isms-mmm
# Secret namespace: MMM_VERCEL_PROJECT_ID, MMM_VERCEL_ORG_ID, MMM_VERCEL_TOKEN,
# optional MMM_VERCEL_AUTOMATION_BYPASS_SECRET
#
# Owned trigger paths:
#   apps/mmm/**
#   packages/ai-centre/src/**       # MMM frontend dependency surface
#   .github/workflows/deploy-mmm-vercel.yml
#   pnpm-lock.yaml
#
# Explicitly not owned here:
#   apps/isms-portal/**
#   PIT app paths
#   broad api/** changes
#   root vercel.json shared monorepo policy changes
#   Supabase migrations or edge functions

on:
  push:
    branches:
      - main
    paths:
      - 'apps/mmm/**'
      - 'packages/ai-centre/src/**'
      - '.github/workflows/deploy-mmm-vercel.yml'
      - 'pnpm-lock.yaml'
  pull_request:
    branches:
      - main
    paths:
      - 'apps/mmm/**'
      - 'packages/ai-centre/src/**'
      - '.github/workflows/deploy-mmm-vercel.yml'
      - 'pnpm-lock.yaml'
  workflow_dispatch:

env:
  NODE_VERSION: '22'
  PNPM_VERSION: '9.12.0'
  MMM_APP_PATH: apps/mmm
  MMM_PACKAGE_NAME: '@maturion/mmm'
  MMM_OUTPUT_DIR: apps/mmm/dist
  MMM_VERCEL_PROJECT_NAME: maturion-isms-mmm

jobs:
  ownership-boundary:
    name: MMM Ownership Boundary
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Validate MMM workflow ownership contract
        run: |
          set -euo pipefail
          echo "Validating MMM Vercel workflow ownership contract..."

          WORKFLOW_FILE=".github/workflows/deploy-mmm-vercel.yml"
          FAIL=0

          if grep -q "secrets\.VERCEL_" "$WORKFLOW_FILE"; then
            echo "FAIL: workflow still references generic Vercel secrets."
            FAIL=1
          else
            echo "PASS: workflow uses app-specific Vercel secret namespace."
          fi

          if grep -q "- 'api/\*\*'" "$WORKFLOW_FILE"; then
            echo "FAIL: workflow still triggers on broad api/** changes."
            FAIL=1
          else
            echo "PASS: workflow does not trigger on broad api/** changes."
          fi

          if grep -q "apps/isms-portal" "$WORKFLOW_FILE"; then
            echo "FAIL: workflow references ISMS app paths."
            FAIL=1
          else
            echo "PASS: workflow does not reference ISMS app paths."
          fi

          if grep -qi "deploy-isms-portal-vercel" "$WORKFLOW_FILE"; then
            echo "FAIL: workflow references ISMS deployment workflow."
            FAIL=1
          else
            echo "PASS: workflow does not reference the ISMS deployment workflow."
          fi

          if grep -q "- 'vercel.json'" "$WORKFLOW_FILE"; then
            echo "FAIL: workflow triggers on root vercel.json shared-policy changes."
            FAIL=1
          else
            echo "PASS: workflow does not trigger on root vercel.json shared-policy changes."
          fi

          PACKAGE_NAME=$(node -e "const p=require('./apps/mmm/package.json'); process.stdout.write(p.name || '')")
          if [ "$PACKAGE_NAME" != "$MMM_PACKAGE_NAME" ]; then
            echo "FAIL: apps/mmm package name is '$PACKAGE_NAME'; expected '$MMM_PACKAGE_NAME'."
            FAIL=1
          else
            echo "PASS: MMM package name is $PACKAGE_NAME."
          fi

          if [ "$FAIL" -ne 0 ]; then
            exit 1
          fi

  typecheck:
    name: Type Check MMM
    runs-on: ubuntu-latest
    needs: [ownership-boundary]
    permissions:
      contents: read
    defaults:
      run:
        working-directory: apps/mmm
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Run TypeScript compiler
        run: pnpm exec tsc --noEmit

  build:
    name: Build MMM
    runs-on: ubuntu-latest
    needs: [ownership-boundary, typecheck]
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Check for direct provider SDK imports
        working-directory: apps/mmm
        run: |
          set -euo pipefail
          echo "Scanning MMM frontend for direct provider SDK imports..."
          if grep -rn \
            --include="*.ts" --include="*.tsx" --include="*.js" \
            --exclude="*.test.ts" --exclude="*.test.tsx" --exclude="*.test.js" \
            --exclude="*.spec.ts" --exclude="*.spec.tsx" \
            -E "from ['\"]openai['\"]|from ['\"]@anthropic-ai|from ['\"]@google/generative-ai|require\(['\"]openai['\"]|require\(['\"]@anthropic-ai|require\(['\"]@google/generative-ai" \
            .; then
            echo "FAIL: Direct provider SDK import found in MMM frontend."
            exit 1
          fi
          echo "PASS: No direct provider SDK imports found in MMM frontend."

      - name: Build MMM frontend
        run: pnpm --filter "$MMM_PACKAGE_NAME" build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v5
        with:
          name: mmm-frontend-dist
          path: ${{ env.MMM_OUTPUT_DIR }}/
          retention-days: 7

  deploy-preview:
    name: Deploy Preview
    runs-on: ubuntu-latest
    needs: [build]
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: write
    environment:
      name: preview
      url: ${{ steps.deploy.outputs.preview-url }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Create MMM environment file
        run: |
          set -euo pipefail
          printf 'VITE_SUPABASE_URL=%s\nVITE_SUPABASE_ANON_KEY=%s\nVITE_API_BASE_URL=%s\n' \
            "$VITE_SUPABASE_URL" "$VITE_SUPABASE_ANON_KEY" "$VITE_API_BASE_URL" > apps/mmm/.env
          chmod 600 apps/mmm/.env
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}

      - name: Configure MMM Vercel project
        env:
          MMM_VERCEL_PROJECT_ID: ${{ secrets.MMM_VERCEL_PROJECT_ID }}
          MMM_VERCEL_ORG_ID: ${{ secrets.MMM_VERCEL_ORG_ID }}
        run: |
          set -euo pipefail
          test -n "${MMM_VERCEL_PROJECT_ID:-}"
          test -n "${MMM_VERCEL_ORG_ID:-}"
          mkdir -p .vercel
          printf '{"projectId":"%s","orgId":"%s"}\n' \
            "$MMM_VERCEL_PROJECT_ID" "$MMM_VERCEL_ORG_ID" > .vercel/project.json

      - name: Pull MMM Vercel project settings
        run: vercel pull --yes --environment=preview --token=${{ secrets.MMM_VERCEL_TOKEN }}

      - name: Build MMM Vercel artifacts
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
        run: vercel build --token=${{ secrets.MMM_VERCEL_TOKEN }}

      - name: Verify MMM Vercel output directory
        run: |
          set -euo pipefail
          if [ ! -d ".vercel/output" ]; then
            echo "FAIL: .vercel/output not found after Vercel build."
            exit 1
          fi
          echo "PASS: Vercel build output exists for MMM preview."

      - name: Deploy MMM preview to Vercel
        id: deploy
        run: |
          set -euo pipefail
          url=$(vercel deploy --prebuilt --token=${{ secrets.MMM_VERCEL_TOKEN }})
          echo "preview-url=$url" >> "$GITHUB_OUTPUT"
          echo "Preview URL: $url"

      - name: MMM direct-route smoke test
        env:
          PREVIEW_URL: ${{ steps.deploy.outputs.preview-url }}
          MMM_VERCEL_AUTOMATION_BYPASS_SECRET: ${{ secrets.MMM_VERCEL_AUTOMATION_BYPASS_SECRET }}
        run: |
          set -euo pipefail
          echo "Running MMM smoke test against: $PREVIEW_URL"
          ROUTES=("/login" "/frameworks" "/frameworks/upload")
          FAIL=0
          for route in "${ROUTES[@]}"; do
            HEADER_ARGS=()
            if [ -n "${MMM_VERCEL_AUTOMATION_BYPASS_SECRET:-}" ]; then
              HEADER_ARGS=(-H "x-vercel-protection-bypass: ${MMM_VERCEL_AUTOMATION_BYPASS_SECRET}")
            fi
            http_code=$(curl -L -s -o /dev/null -w "%{http_code}" \
              --connect-timeout 10 \
              --max-time 30 \
              "${HEADER_ARGS[@]}" \
              "$PREVIEW_URL$route" 2>/dev/null || echo "000")

            if echo "$http_code" | grep -qE '^[23][0-9][0-9]$'; then
              echo "PASS: $route -> HTTP $http_code"
            elif [ "$http_code" = "401" ] || [ "$http_code" = "403" ]; then
              if [ -z "${MMM_VERCEL_AUTOMATION_BYPASS_SECRET:-}" ]; then
                echo "PASS: $route -> HTTP $http_code treated as expected Vercel preview protection because no MMM bypass secret is configured."
              else
                echo "FAIL: $route -> HTTP $http_code while MMM bypass secret is configured."
                FAIL=1
              fi
            elif [ "$http_code" = "404" ]; then
              echo "FAIL: $route -> HTTP 404; MMM SPA fallback or route is not reachable."
              FAIL=1
            else
              echo "FAIL: $route -> HTTP $http_code; unexpected deployment response."
              FAIL=1
            fi
          done

          if [ "$FAIL" -ne 0 ]; then
            exit 1
          fi
          echo "PASS: MMM smoke routes checked."

      - name: Comment MMM preview URL on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `MMM preview deployment URL: ${{ steps.deploy.outputs.preview-url }}`
            })

  deploy-production:
    name: Deploy Production
    runs-on: ubuntu-latest
    needs: [build]
    if: >
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main')
    permissions:
      contents: read
    environment:
      name: production
      url: https://maturion-isms-mmm.vercel.app
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Create MMM environment file
        run: |
          set -euo pipefail
          printf 'VITE_SUPABASE_URL=%s\nVITE_SUPABASE_ANON_KEY=%s\nVITE_API_BASE_URL=%s\n' \
            "$VITE_SUPABASE_URL" "$VITE_SUPABASE_ANON_KEY" "$VITE_API_BASE_URL" > apps/mmm/.env
          chmod 600 apps/mmm/.env
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}

      - name: Configure MMM Vercel project
        env:
          MMM_VERCEL_PROJECT_ID: ${{ secrets.MMM_VERCEL_PROJECT_ID }}
          MMM_VERCEL_ORG_ID: ${{ secrets.MMM_VERCEL_ORG_ID }}
        run: |
          set -euo pipefail
          test -n "${MMM_VERCEL_PROJECT_ID:-}"
          test -n "${MMM_VERCEL_ORG_ID:-}"
          mkdir -p .vercel
          printf '{"projectId":"%s","orgId":"%s"}\n' \
            "$MMM_VERCEL_PROJECT_ID" "$MMM_VERCEL_ORG_ID" > .vercel/project.json

      - name: Pull MMM production Vercel project settings
        run: vercel pull --yes --environment=production --token=${{ secrets.MMM_VERCEL_TOKEN }}

      - name: Build MMM production artifacts
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
        run: vercel build --prod --token=${{ secrets.MMM_VERCEL_TOKEN }}

      - name: Deploy MMM production to Vercel
        run: vercel deploy --prebuilt --prod --token=${{ secrets.MMM_VERCEL_TOKEN }}
