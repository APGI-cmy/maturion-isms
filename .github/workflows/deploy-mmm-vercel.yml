name: Deploy MMM Frontend to Vercel

# WORKFLOW OWNERSHIP BOUNDARY
# This workflow owns the MMM frontend deployment surface only.
#
# MMM deployment contract:
#   Vercel project: maturion-isms-mmm
#   App path: apps/mmm
#   Package: @maturion/mmm
#   Expected output directory: apps/mmm/dist
#   Project settings model: repository root, pnpm install, pnpm --filter @maturion/mmm build
#
# Owned trigger paths:
#   apps/mmm/**
#   .github/workflows/deploy-mmm-vercel.yml
#   pnpm-lock.yaml
#
# Non-owned paths must not trigger MMM preview deployment on their own:
#   apps/isms-portal/**
#   api/**
#   supabase/**
#   packages/**
#   vercel.json
#   PIT or other module workflows

on:
  push:
    branches:
      - main
    paths:
      - 'apps/mmm/**'
      - '.github/workflows/deploy-mmm-vercel.yml'
      - 'pnpm-lock.yaml'
  pull_request:
    branches:
      - main
    paths:
      - 'apps/mmm/**'
      - '.github/workflows/deploy-mmm-vercel.yml'
      - 'pnpm-lock.yaml'
  workflow_dispatch:

env:
  NODE_VERSION: '22'
  PNPM_VERSION: '9.12.0'
  MMM_APP_PATH: apps/mmm
  MMM_PACKAGE_NAME: '@maturion/mmm'
  MMM_OUTPUT_DIR: apps/mmm/dist
  MMM_VERCEL_PROJECT_NAME: maturion-isms-mmm
  MMM_PREVIEW_ROUTES: '/login /forgot-password /reset-password /onboarding /frameworks /frameworks/upload'

jobs:
  ownership-boundary:
    name: MMM Workflow Ownership Boundary
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Validate MMM ownership contract
        run: |
          set -euo pipefail
          echo "Validating MMM Vercel workflow ownership boundary..."
          test -d "$MMM_APP_PATH"
          node -e "const pkg=require('./apps/mmm/package.json'); if(pkg.name !== process.env.MMM_PACKAGE_NAME){ throw new Error('Unexpected MMM package name: '+pkg.name); }"
          echo "App path: $MMM_APP_PATH"
          echo "Package: $MMM_PACKAGE_NAME"
          echo "Expected output directory: $MMM_OUTPUT_DIR"
          echo "Vercel project: $MMM_VERCEL_PROJECT_NAME"

      - name: Guard against generic Vercel secrets in this workflow
        run: |
          set -euo pipefail
          WORKFLOW='.github/workflows/deploy-mmm-vercel.yml'
          if grep -nE 'secrets\.(VERCEL_PROJECT_ID|VERCEL_ORG_ID|VERCEL_TOKEN|VERCEL_AUTOMATION_BYPASS_SECRET)\b' "$WORKFLOW"; then
            echo "MMM workflow must use MMM-specific Vercel secrets only."
            exit 1
          fi
          echo "MMM workflow secret namespace is MMM-specific."

      - name: Record trigger boundary
        run: |
          echo "Owned trigger paths: apps/mmm/**, .github/workflows/deploy-mmm-vercel.yml, pnpm-lock.yaml"
          echo "Non-owned examples: apps/isms-portal/**, api/**, supabase/**, packages/**, vercel.json"

  build:
    name: Build MMM Frontend
    runs-on: ubuntu-latest
    needs: [ownership-boundary]
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies from monorepo root
        run: pnpm install --no-frozen-lockfile

      - name: Validate MMM frontend env secrets
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${VITE_SUPABASE_URL:-}" ] || [ "$VITE_SUPABASE_URL" = "https://placeholder.supabase.co" ]; then
            echo "VITE_SUPABASE_URL is missing or placeholder."
            exit 1
          fi
          if [ -z "${VITE_SUPABASE_ANON_KEY:-}" ] || [ "$VITE_SUPABASE_ANON_KEY" = "placeholder-anon-key" ]; then
            echo "VITE_SUPABASE_ANON_KEY is missing or placeholder."
            exit 1
          fi
          echo "MMM frontend env secrets are present."

      - name: Build MMM package
        run: pnpm --filter @maturion/mmm build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}

      - name: Verify MMM output directory
        run: |
          set -euo pipefail
          if [ ! -d "$MMM_OUTPUT_DIR" ]; then
            echo "Expected MMM output directory not found: $MMM_OUTPUT_DIR"
            exit 1
          fi
          echo "MMM output directory present: $MMM_OUTPUT_DIR"

      - name: Upload MMM build artifact
        uses: actions/upload-artifact@v5
        with:
          name: mmm-frontend-dist
          path: apps/mmm/dist/
          retention-days: 7

  deploy-preview:
    name: Deploy Preview
    runs-on: ubuntu-latest
    needs: [build]
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: write
    environment:
      name: preview
      url: ${{ steps.deploy.outputs.preview-url }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Validate MMM preview deployment secrets
        env:
          MMM_VERCEL_PROJECT_ID: ${{ secrets.MMM_VERCEL_PROJECT_ID }}
          MMM_VERCEL_ORG_ID: ${{ secrets.MMM_VERCEL_ORG_ID }}
          MMM_VERCEL_TOKEN: ${{ secrets.MMM_VERCEL_TOKEN }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: |
          set -euo pipefail
          missing=0
          for name in MMM_VERCEL_PROJECT_ID MMM_VERCEL_ORG_ID MMM_VERCEL_TOKEN VITE_SUPABASE_URL VITE_SUPABASE_ANON_KEY; do
            if [ -z "${!name:-}" ]; then
              echo "$name is required."
              missing=1
            fi
          done
          if [ "${VITE_SUPABASE_URL:-}" = "https://placeholder.supabase.co" ]; then
            echo "VITE_SUPABASE_URL is placeholder."
            missing=1
          fi
          if [ "${VITE_SUPABASE_ANON_KEY:-}" = "placeholder-anon-key" ]; then
            echo "VITE_SUPABASE_ANON_KEY is placeholder."
            missing=1
          fi
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi
          echo "MMM preview deployment secrets are present."

      - name: Create MMM env file from GitHub Secrets
        run: |
          set -euo pipefail
          printf 'VITE_SUPABASE_URL=%s\nVITE_SUPABASE_ANON_KEY=%s\nVITE_API_BASE_URL=%s\n' \
            "$VITE_SUPABASE_URL" "$VITE_SUPABASE_ANON_KEY" "$VITE_API_BASE_URL" > apps/mmm/.env
          chmod 600 apps/mmm/.env
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}

      - name: Configure MMM Vercel project
        env:
          MMM_VERCEL_PROJECT_ID: ${{ secrets.MMM_VERCEL_PROJECT_ID }}
          MMM_VERCEL_ORG_ID: ${{ secrets.MMM_VERCEL_ORG_ID }}
        run: |
          set -euo pipefail
          mkdir -p .vercel
          printf '{"projectId":"%s","orgId":"%s"}\n' \
            "$MMM_VERCEL_PROJECT_ID" "$MMM_VERCEL_ORG_ID" > .vercel/project.json
          echo "Configured MMM Vercel project: $MMM_VERCEL_PROJECT_NAME"

      - name: Pull MMM Vercel project settings
        run: vercel pull --yes --environment=preview --token=${{ secrets.MMM_VERCEL_TOKEN }}

      - name: Build MMM project artifacts with Vercel
        run: vercel build --token=${{ secrets.MMM_VERCEL_TOKEN }}
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}

      - name: Patch Vercel output routing for MMM SPA fallback
        run: |
          node - <<'NODE'
          const fs = require('fs');
          const path = '.vercel/output/config.json';
          if (!fs.existsSync(path)) {
            console.log('No .vercel/output/config.json found; skipping SPA route patch');
            process.exit(0);
          }
          const cfg = JSON.parse(fs.readFileSync(path, 'utf8'));
          const routes = cfg.routes || [];
          const filtered = routes.filter((r) => r.handle !== 'error' && r.dest !== '/404.html');
          if (!filtered.find((r) => r.handle === 'filesystem')) {
            filtered.push({ handle: 'filesystem' });
          }
          if (!filtered.find((r) => r.dest === '/index.html')) {
            filtered.push({
              src: '/((?!api/|assets/|manifest\\.json$|sw\\.js$).*)',
              dest: '/index.html',
            });
          }
          cfg.routes = filtered;
          fs.writeFileSync(path, JSON.stringify(cfg, null, 2));
          console.log('MMM SPA fallback route confirmed in Vercel output config.');
          NODE

      - name: Deploy MMM preview to Vercel
        id: deploy
        run: |
          set -euo pipefail
          url=$(vercel deploy --prebuilt --token=${{ secrets.MMM_VERCEL_TOKEN }})
          echo "preview-url=$url" >> "$GITHUB_OUTPUT"
          echo "MMM preview URL: $url"

      - name: MMM direct-route smoke test
        env:
          PREVIEW_URL: ${{ steps.deploy.outputs.preview-url }}
          MMM_VERCEL_AUTOMATION_BYPASS_SECRET: ${{ secrets.MMM_VERCEL_AUTOMATION_BYPASS_SECRET }}
        run: |
          set -euo pipefail
          echo "Running MMM smoke test against: $PREVIEW_URL"
          FAIL=0
          for route in $MMM_PREVIEW_ROUTES; do
            header_args=()
            if [ -n "${MMM_VERCEL_AUTOMATION_BYPASS_SECRET:-}" ]; then
              header_args=(-H "x-vercel-protection-bypass: $MMM_VERCEL_AUTOMATION_BYPASS_SECRET" -H "x-vercel-set-bypass-cookie: true")
            fi
            http_code=$(curl -L -s -o /dev/null -w "%{http_code}" \
              --connect-timeout 10 \
              --max-time 30 \
              "${header_args[@]}" \
              "$PREVIEW_URL$route" 2>/dev/null || echo "000")
            case "$http_code" in
              2*|3*)
                echo "PASS: $route -> HTTP $http_code"
                ;;
              401|403)
                echo "PROTECTED: $route -> HTTP $http_code; Vercel preview protection reached before app routing"
                ;;
              404)
                echo "FAIL: $route -> HTTP 404; MMM SPA fallback or route handling failed"
                FAIL=1
                ;;
              *)
                echo "FAIL: $route -> HTTP $http_code"
                FAIL=1
                ;;
            esac
          done
          if [ "$FAIL" -ne 0 ]; then
            exit 1
          fi

      - name: Comment MMM preview URL on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `MMM preview deployment created.\n\nPreview URL: ${{ steps.deploy.outputs.preview-url }}`,
            });

  deploy-production:
    name: Deploy Production
    runs-on: ubuntu-latest
    needs: [build]
    if: >
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main')
    permissions:
      contents: read
    environment:
      name: production
      url: https://maturion-isms-mmm.vercel.app
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Validate MMM production deployment secrets
        env:
          MMM_VERCEL_PROJECT_ID: ${{ secrets.MMM_VERCEL_PROJECT_ID }}
          MMM_VERCEL_ORG_ID: ${{ secrets.MMM_VERCEL_ORG_ID }}
          MMM_VERCEL_TOKEN: ${{ secrets.MMM_VERCEL_TOKEN }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: |
          set -euo pipefail
          missing=0
          for name in MMM_VERCEL_PROJECT_ID MMM_VERCEL_ORG_ID MMM_VERCEL_TOKEN VITE_SUPABASE_URL VITE_SUPABASE_ANON_KEY; do
            if [ -z "${!name:-}" ]; then
              echo "$name is required."
              missing=1
            fi
          done
          if [ "${VITE_SUPABASE_URL:-}" = "https://placeholder.supabase.co" ]; then
            echo "VITE_SUPABASE_URL is placeholder."
            missing=1
          fi
          if [ "${VITE_SUPABASE_ANON_KEY:-}" = "placeholder-anon-key" ]; then
            echo "VITE_SUPABASE_ANON_KEY is placeholder."
            missing=1
          fi
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi
          echo "MMM production deployment secrets are present."

      - name: Create MMM env file from GitHub Secrets
        run: |
          set -euo pipefail
          printf 'VITE_SUPABASE_URL=%s\nVITE_SUPABASE_ANON_KEY=%s\nVITE_API_BASE_URL=%s\n' \
            "$VITE_SUPABASE_URL" "$VITE_SUPABASE_ANON_KEY" "$VITE_API_BASE_URL" > apps/mmm/.env
          chmod 600 apps/mmm/.env
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}

      - name: Configure MMM Vercel project
        env:
          MMM_VERCEL_PROJECT_ID: ${{ secrets.MMM_VERCEL_PROJECT_ID }}
          MMM_VERCEL_ORG_ID: ${{ secrets.MMM_VERCEL_ORG_ID }}
        run: |
          set -euo pipefail
          mkdir -p .vercel
          printf '{"projectId":"%s","orgId":"%s"}\n' \
            "$MMM_VERCEL_PROJECT_ID" "$MMM_VERCEL_ORG_ID" > .vercel/project.json
          echo "Configured MMM Vercel project: $MMM_VERCEL_PROJECT_NAME"

      - name: Pull MMM Vercel production project settings
        run: vercel pull --yes --environment=production --token=${{ secrets.MMM_VERCEL_TOKEN }}

      - name: Build MMM production artifacts with Vercel
        run: vercel build --prod --token=${{ secrets.MMM_VERCEL_TOKEN }}
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}

      - name: Patch Vercel output routing for MMM production SPA fallback
        run: |
          node - <<'NODE'
          const fs = require('fs');
          const path = '.vercel/output/config.json';
          if (!fs.existsSync(path)) {
            console.log('No .vercel/output/config.json found; skipping SPA route patch');
            process.exit(0);
          }
          const cfg = JSON.parse(fs.readFileSync(path, 'utf8'));
          const routes = cfg.routes || [];
          const filtered = routes.filter((r) => r.handle !== 'error' && r.dest !== '/404.html');
          if (!filtered.find((r) => r.handle === 'filesystem')) {
            filtered.push({ handle: 'filesystem' });
          }
          if (!filtered.find((r) => r.dest === '/index.html')) {
            filtered.push({
              src: '/((?!api/|assets/|manifest\\.json$|sw\\.js$).*)',
              dest: '/index.html',
            });
          }
          cfg.routes = filtered;
          fs.writeFileSync(path, JSON.stringify(cfg, null, 2));
          console.log('MMM SPA fallback route confirmed in Vercel production output config.');
          NODE

      - name: Deploy MMM production to Vercel
        run: vercel deploy --prebuilt --prod --token=${{ secrets.MMM_VERCEL_TOKEN }}
