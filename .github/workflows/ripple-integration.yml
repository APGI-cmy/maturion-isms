name: Ripple Integration

# TERMINOLOGY (per ECOSYSTEM_VOCABULARY.md v1.1.0 and LAYERING_AND_RIPPLING_AUTOMATION_STRATEGY.md v1.0.0):
# - LAYERING DOWN : Cross-repo distribution of governance artefacts (upstream — foreman-governance repo).
# - RIPPLING      : Within-repo integration/synchronisation — this workflow.
#
# This workflow is the consumer-side listener for [Layer-Down] issues.  It processes
# a layer-down issue (labels: governance + layer-down) and creates a ripple PR.
#
#   1. Runs the existing align-governance.sh script to pull canonical changes.
#   2. Parses upstream AGENT-FILE-MANIFEST from issue body (informational).
#      Detects whether any .github/agents/*.md files are in the LOCAL diff (authoritative).
#   3. If agent files changed  → creates a DRAFT ripple PR + escalation doc (CS2 gate).
#   4. If no agent files       → creates a normal ripple PR and enables auto-merge.
#   5. Comments on the issue with the outcome.
#
# ARCHITECTURE NOTE (2026-03-04):
#   The `repository_dispatch: governance_ripple` Signal 2 trigger was retired from the
#   governance repo in PR #1292 (LAYER-DOWN-DEDUP-2026-03-03).  The canonical layer-down
#   chain is now Signal 1 only:
#     governance push → governance-layer-down-dispatch.yml → [Layer-Down] issue
#       → this workflow (issues: opened/labeled) → ripple PR
#   The `on: issues` trigger has been restored as the active automated path.
#   governance-ripple-sync.yml is now manual-only (recovery use via workflow_dispatch).
#
# Prior RETIREMENT NOTE (Issue #825, 2026-03-03 — superseded 2026-03-04):
#   The issues trigger was previously retired to prevent duplicate DRAFT PRs caused by
#   governance-ripple-sync.yml creating an issue AND repository_dispatch both firing.
#   With repository_dispatch retired, the issues trigger is the sole automated entry point
#   and the duplicate-PR risk no longer applies.
#
# Authority: LAYERING_AND_RIPPLING_AUTOMATION_STRATEGY.md v1.0.0
#            CROSS_REPOSITORY_LAYER_DOWN_PROTOCOL.md
#            CS2_AGENT_FILE_AUTHORITY_MODEL.md

on:
  # Signal 1 chain: [Layer-Down] issue → ripple PR (governance-layer-down-dispatch.yml
  # creates the issue; this workflow picks it up automatically).
  issues:
    types: [opened, labeled]

  # Manual trigger — for recovery or targeted re-processing of an existing issue
  workflow_dispatch:
    inputs:
      issue_number:
        description: 'Layer-down issue number to process'
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  # ──────────────────────────────────────────────────────────────
  # GATE: only process issues that carry both governance labels
  # ──────────────────────────────────────────────────────────────
  check-labels:
    name: Check Issue Labels
    runs-on: ubuntu-latest
    outputs:
      should_process: ${{ steps.check.outputs.should_process }}
    steps:
      - name: Evaluate labels
        id: check
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "should_process=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          HAS_GOVERNANCE="${{ contains(github.event.issue.labels.*.name, 'governance') }}"
          HAS_LAYERDOWN="${{ contains(github.event.issue.labels.*.name, 'layer-down') }}"

          if [ "$HAS_GOVERNANCE" = "true" ] && [ "$HAS_LAYERDOWN" = "true" ]; then
            echo "should_process=true" >> $GITHUB_OUTPUT
            echo "Issue carries governance + layer-down labels — proceeding"
          else
            echo "should_process=false" >> $GITHUB_OUTPUT
            echo "Issue does not carry both required labels — skipping"
          fi

  # ──────────────────────────────────────────────────────────────
  # MAIN: ripple integration
  # ──────────────────────────────────────────────────────────────
  ripple-integration:
    name: Ripple Integration
    runs-on: ubuntu-latest
    needs: check-labels
    if: needs.check-labels.outputs.should_process == 'true'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.MATURION_BOT_TOKEN || github.token }}

      - name: Configure Git
        run: |
          git config --global user.name "Maturion Bot"
          git config --global user.email "bot@maturion.ai"

      # ── Resolve the issue number regardless of trigger type ──
      - name: Resolve issue number
        id: issue
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "number=${{ github.event.inputs.issue_number }}" >> $GITHUB_OUTPUT
          else
            echo "number=${{ github.event.issue.number }}" >> $GITHUB_OUTPUT
          fi

      # ── Parse upstream agent file manifest from issue body ──
      # The upstream governance-layer-down-dispatch.yml embeds a structured
      # <!-- AGENT-FILE-MANIFEST ... --> HTML comment in every layer-down issue body.
      # Format when agent files are present:
      #   <!-- AGENT-FILE-MANIFEST
      #   agent_files_in_payload:
      #     - .github/agents/some-agent.md
      #   -->
      # Format when no agent files:
      #   <!-- AGENT-FILE-MANIFEST
      #   agent_files_in_payload: []
      #   -->
      # We parse this block and set agent_files_changed=true/false.
      # NOTE: this is the UPSTREAM signal only. The authoritative gate for CS2
      # escalation is diff_check (local git reality). See 'Determine escalation'.
      - name: Parse upstream agent file manifest
        id: agent_gate
        env:
          GH_TOKEN: ${{ secrets.MATURION_BOT_TOKEN || github.token }}
        run: |
          ISSUE_BODY=$(gh issue view "${{ steps.issue.outputs.number }}" \
            --repo ${{ github.repository }} \
            --json body --jq '.body' 2>/dev/null || echo "")

          # Extract the AGENT-FILE-MANIFEST block and check for non-empty payload
          MANIFEST=$(echo "$ISSUE_BODY" | awk '
            /<!-- AGENT-FILE-MANIFEST/ { found=1 }
            found { print }
            found && /-->/ { exit }
          ')

          if echo "$MANIFEST" | grep -q 'agent_files_in_payload:' && echo "$MANIFEST" | grep -qE '^[[:space:]]+-[[:space:]]'; then
            echo "agent_files_changed=true" >> $GITHUB_OUTPUT
            echo "Upstream manifest contains agent files — upstream signal: CS2 escalation indicated"
            echo "Manifest content:"
            echo "$MANIFEST"
          else
            echo "agent_files_changed=false" >> $GITHUB_OUTPUT
            if [ -z "$MANIFEST" ]; then
              echo "No AGENT-FILE-MANIFEST block found in issue body — legacy dispatch or no agent files"
            else
              echo "AGENT-FILE-MANIFEST present but agent_files_in_payload is empty — no agent files upstream"
            fi
          fi

      # ── Run canonical alignment script ──
      - name: Run governance alignment
        id: align
        env:
          MATURION_BOT_TOKEN: ${{ secrets.MATURION_BOT_TOKEN || github.token }}
        run: |
          set +e
          bash .github/scripts/align-governance.sh
          EXIT_CODE=$?

          if [ $EXIT_CODE -eq 0 ]; then
            if git status --porcelain | grep -q '^'; then
              echo "drift_detected=true" >> $GITHUB_OUTPUT
            else
              echo "drift_detected=false" >> $GITHUB_OUTPUT
            fi
          elif [ $EXIT_CODE -eq 2 ]; then
            # Exit code 2: partial success — stale hash in canonical CANON_INVENTORY.json.
            # Files were layered but hash verification against inventory failed.
            # Treat as a successful drift detection run so the PR path can proceed.
            echo "::warning::Alignment script completed with stale canonical inventory hashes (exit 2). Escalation required for canonical CANON_INVENTORY update."
            if git status --porcelain | grep -q '^'; then
              echo "drift_detected=true" >> $GITHUB_OUTPUT
            else
              echo "drift_detected=false" >> $GITHUB_OUTPUT
            fi
          else
            echo "alignment script exited with code $EXIT_CODE"
            exit $EXIT_CODE
          fi

      # ── Check for existing ripple PR to avoid duplicates ──
      # Checks for any open PR with a 'ripple/' branch prefix from ripple-integration.yml.
      # If any such PR is found, skip creation and reference it in the issue comment.
      # NOTE: The governance-alignment-auto branch check was removed as
      # governance-alignment-schedule.yml has been deleted (legacy direct-PR automation).
      - name: Check for existing ripple PR
        id: existing_pr
        if: steps.align.outputs.drift_detected == 'true'
        env:
          GH_TOKEN: ${{ secrets.MATURION_BOT_TOKEN || github.token }}
        run: |
          RIPPLE_JQ='.[] | select(.headRefName | startswith("ripple/")) | .number'

          # Check for any open ripple/ prefix branch PR from this workflow
          EXISTING=$(gh pr list \
            --repo ${{ github.repository }} \
            --state open \
            --label "governance" \
            --label "ripple" \
            --json number,headRefName \
            --jq "$RIPPLE_JQ" \
            2>/dev/null | head -1 || echo "")

          if [ -z "$EXISTING" ]; then
            EXISTING=$(gh pr list \
              --repo ${{ github.repository }} \
              --state open \
              --label "governance" \
              --label "automated" \
              --json number,headRefName \
              --jq "$RIPPLE_JQ" \
              2>/dev/null | head -1 || echo "")
          fi

          if [ -n "$EXISTING" ]; then
            echo "pr_number=${EXISTING}" >> $GITHUB_OUTPUT
            echo "skip_pr_creation=true" >> $GITHUB_OUTPUT
            echo "Existing governance/ripple PR #${EXISTING} found — skipping duplicate PR creation"
          else
            echo "pr_number=" >> $GITHUB_OUTPUT
            echo "skip_pr_creation=false" >> $GITHUB_OUTPUT
            echo "No existing alignment PR — proceeding with ripple PR creation"
          fi

      # ── Verify changed files for agent contracts (git diff check) ──
      - name: Check diff for agent contracts
        id: diff_check
        if: steps.align.outputs.drift_detected == 'true'
        run: |
          AGENT_DIFF=$(git diff --name-only HEAD | grep -E '^\.github/agents/.*\.md$' || true)
          if [ -n "$AGENT_DIFF" ]; then
            echo "has_agent_files=true" >> $GITHUB_OUTPUT
            echo "Agent contract files in diff: $AGENT_DIFF"
          else
            echo "has_agent_files=false" >> $GITHUB_OUTPUT
          fi

      # ── Determine final escalation decision ──
      - name: Determine escalation
        id: escalation
        run: |
          # GATE = upstream signal (informational, from manifest in issue body)
          # DIFF = local git diff reality (authoritative — agent files actually in this consumer's changeset)
          #
          # Security design: DIFF is the sole gate for CS2 escalation.
          # GATE provides traceability but a false positive in the upstream signal must NOT
          # block a pure governance layer-down that contains no agent files in the consumer diff.
          # Authority: CS2_AGENT_FILE_AUTHORITY_MODEL.md
          GATE="${{ steps.agent_gate.outputs.agent_files_changed }}"
          DIFF="${{ steps.diff_check.outputs.has_agent_files }}"
          if [ "$DIFF" = "true" ]; then
            echo "require_cs2=true" >> $GITHUB_OUTPUT
            echo "CS2 escalation required: agent contract files present in local diff"
          elif [ "$GATE" = "true" ]; then
            # Upstream said agent files changed but local diff is clean.
            # This can happen when the upstream commit touched agent files not applicable to this consumer.
            # Log for audit trail but do NOT escalate to CS2.
            echo "require_cs2=false" >> $GITHUB_OUTPUT
            echo "::notice::Upstream manifest indicated agent files but local diff is clean — standard path (no false escalation)"
          else
            echo "require_cs2=false" >> $GITHUB_OUTPUT
          fi

      # ── Collect alignment metadata ──
      - name: Collect alignment metadata
        id: metadata
        if: steps.align.outputs.drift_detected == 'true'
        run: |
          DRIFT_REPORT=$(ls -t .agent-admin/governance/drift-report-*.md 2>/dev/null | head -1)
          if [ -n "$DRIFT_REPORT" ]; then
            CANONICAL_COMMIT=$(grep "Canonical Commit" "$DRIFT_REPORT" | sed 's/.*: //')
            CANONICAL_VERSION=$(grep "Canonical Version" "$DRIFT_REPORT" | sed 's/.*: //')
            FILES_UPDATED=$(grep "Files Layered Down" "$DRIFT_REPORT" | sed 's/.*: //')
            echo "canonical_commit=$CANONICAL_COMMIT" >> $GITHUB_OUTPUT
            echo "canonical_version=$CANONICAL_VERSION" >> $GITHUB_OUTPUT
            echo "files_updated=$FILES_UPDATED" >> $GITHUB_OUTPUT
            echo "drift_report=$DRIFT_REPORT" >> $GITHUB_OUTPUT
          fi

      # ── Create escalation document when agent files touched ──
      # Defect 3 fix: write each line via echo so headings appear at column 0
      # in the committed file without breaking the YAML block scalar.
      - name: Create escalation document
        if: >
          steps.align.outputs.drift_detected == 'true' &&
          steps.escalation.outputs.require_cs2 == 'true'
        run: |
          DATESTAMP=$(date -u +"%Y-%m-%d")
          INBOX=".agent-workspace/governance-liaison/escalation-inbox"
          mkdir -p "$INBOX"
          ESCALATION_FILE="${INBOX}/agent-contract-ripple-escalation-${DATESTAMP}.md"
          {
            echo '# Escalation: Agent Contract Ripple — CS2 Approval Required'
            echo ''
            echo '## Type'
            echo 'BLOCKER'
            echo ''
            echo '## Description'
            echo 'A governance layer-down triggered a ripple that includes changes to'
            echo 'agent contract files (`.github/agents/*.md`).'
            echo ''
            echo 'Per **CS2_AGENT_FILE_AUTHORITY_MODEL.md** and'
            echo '**AGENT_CONTRACT_PROTECTION_PROTOCOL.md**, only CS2 (Johan Ras) may'
            echo 'approve and merge changes to agent contracts.'
            echo ''
            echo '**The ripple PR has been created as DRAFT and must not be merged until'
            echo 'CS2 explicitly approves it.**'
            echo ''
            echo '## Context'
            echo "- Session: ripple-integration-${{ github.run_id }}"
            echo "- Triggered by: Issue #${{ steps.issue.outputs.number }}"
            echo "- Canonical commit: ${{ steps.metadata.outputs.canonical_commit }}"
            echo "- Canonical version: ${{ steps.metadata.outputs.canonical_version }}"
            echo "- Files updated: ${{ steps.metadata.outputs.files_updated }}"
            echo "- Drift report: ${{ steps.metadata.outputs.drift_report }}"
            echo ''
            echo '## Recommendation'
            echo '1. CS2 reviews the DRAFT ripple PR'
            echo '2. CS2 approves and merges after review'
            echo '3. Move this file to `escalation-archive/` after resolution'
            echo ''
            echo '## Evidence'
            echo "- Drift report: \`${{ steps.metadata.outputs.drift_report }}\`"
            echo "- Workflow run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            echo ''
            echo '---'
            echo "Created: ${DATESTAMP} | Authority: CS2 | Session: ${{ github.run_id }}"
          } > "$ESCALATION_FILE"
          echo "Escalation document created: $ESCALATION_FILE"

      # ── Record layer-down receipt ──
      # Defect 1 fix: this step runs BEFORE the PR creation steps so the JSON
      # file is staged and included in the ripple PR commit.
      - name: Record layer-down receipt
        if: steps.align.outputs.drift_detected == 'true'
        run: |
          mkdir -p .agent-admin/ripple
          DATESTAMP=$(date -u +%Y%m%dT%H%M%SZ)
          RECORD=".agent-admin/ripple/layer-down-received-${DATESTAMP}.json"
          jq -n \
            --arg ts "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --arg issue "${{ steps.issue.outputs.number }}" \
            --arg commit "${{ steps.metadata.outputs.canonical_commit }}" \
            --arg cs2 "${{ steps.escalation.outputs.require_cs2 }}" \
            '{schema_version:"1.0.0",type:"layer_down_received",timestamp:$ts,source_issue:$issue,canonical_commit:$commit,requires_cs2_approval:($cs2=="true"),escalated:($cs2=="true")}' \
            > "$RECORD"
          echo "Receipt recorded: $RECORD"

      # ── Create PR — standard path (no agent files changed) ──
      # Defect 2 fix: separate steps with literal draft: false / draft: true
      - name: Create ripple PR (standard — no agent files)
        if: >
          steps.align.outputs.drift_detected == 'true' &&
          steps.escalation.outputs.require_cs2 == 'false' &&
          steps.existing_pr.outputs.skip_pr_creation != 'true'
        id: create_pr_standard
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.MATURION_BOT_TOKEN || github.token }}
          commit-message: |
            Ripple: propagate governance layer-down (issue #${{ steps.issue.outputs.number }})
            Canonical commit: ${{ steps.metadata.outputs.canonical_commit }}
            Files updated: ${{ steps.metadata.outputs.files_updated }}
            Agent files changed: false
          branch: ripple/layer-down-${{ github.run_id }}
          force-push: true
          delete-branch: true
          draft: false
          title: '[Ripple] Propagate governance layer-down'
          body: |
            ## Ripple Integration
            This PR propagates governance artefacts from the upstream layer-down.
            ### Source
            - **Layer-down issue**: #${{ steps.issue.outputs.number }}
            - **Canonical commit**: `${{ steps.metadata.outputs.canonical_commit }}`
            - **Canonical version**: `${{ steps.metadata.outputs.canonical_version }}`
            - **Files updated**: ${{ steps.metadata.outputs.files_updated }}
            ### Agent File Gate
            ✅ No agent contract files changed — standard auto-merge path.
            ---
            **Authority**: LAYERING_AND_RIPPLING_AUTOMATION_STRATEGY.md v1.0.0
            **Closes**: #${{ steps.issue.outputs.number }}
          labels: |
            governance
            ripple
            automated
            agent:liaison
          assignees: APGI-cmy

      # ── Create PR — CS2 DRAFT path (agent files changed) ──
      - name: Create ripple PR (DRAFT — CS2 required)
        if: >
          steps.align.outputs.drift_detected == 'true' &&
          steps.escalation.outputs.require_cs2 == 'true' &&
          steps.existing_pr.outputs.skip_pr_creation != 'true'
        id: create_pr_draft
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.MATURION_BOT_TOKEN || github.token }}
          commit-message: |
            Ripple: propagate governance layer-down (issue #${{ steps.issue.outputs.number }})
            Canonical commit: ${{ steps.metadata.outputs.canonical_commit }}
            Files updated: ${{ steps.metadata.outputs.files_updated }}
            Agent files changed: true
          branch: ripple/layer-down-${{ github.run_id }}
          force-push: true
          delete-branch: true
          draft: true
          title: '[Ripple][DRAFT — CS2 Required] Propagate governance layer-down'
          body: |
            ## Ripple Integration
            This PR propagates governance artefacts from the upstream layer-down.
            ### Source
            - **Layer-down issue**: #${{ steps.issue.outputs.number }}
            - **Canonical commit**: `${{ steps.metadata.outputs.canonical_commit }}`
            - **Canonical version**: `${{ steps.metadata.outputs.canonical_version }}`
            - **Files updated**: ${{ steps.metadata.outputs.files_updated }}
            ### Agent File Gate
            ⛔ **Agent contract files changed — CS2 approval required.** Auto-merge is DISABLED. See `.agent-workspace/governance-liaison/escalation-inbox/` for escalation document.
            ---
            **Authority**: LAYERING_AND_RIPPLING_AUTOMATION_STRATEGY.md v1.0.0
            **Closes**: #${{ steps.issue.outputs.number }}
          labels: |
            governance
            ripple
            automated
            agent:liaison
          assignees: APGI-cmy

      # ── Resolve PR number from whichever step ran ──
      - name: Resolve PR number
        id: pr_number
        run: |
          NUMBER="${{ steps.create_pr_standard.outputs.pull-request-number }}"
          if [ -z "$NUMBER" ]; then
            NUMBER="${{ steps.create_pr_draft.outputs.pull-request-number }}"
          fi
          # Fall back to the existing PR found by the duplicate-check step
          if [ -z "$NUMBER" ]; then
            NUMBER="${{ steps.existing_pr.outputs.pr_number }}"
          fi
          echo "number=$NUMBER" >> $GITHUB_OUTPUT

      # ── Stamp ripple PR number into sync_state.json on the PR branch ──
      # Updates last_sync.ripple_pr from "pending" to the actual merged PR number
      # for traceability and audit trail. Runs only when a new PR was created.
      - name: Stamp ripple PR number into sync_state.json
        if: >
          steps.align.outputs.drift_detected == 'true' &&
          steps.pr_number.outputs.number != '' &&
          steps.existing_pr.outputs.skip_pr_creation != 'true'
        run: |
          set -e
          PR_NUMBER="${{ steps.pr_number.outputs.number }}"
          # Prefer branch name from PR creation outputs; fallback matches the
          # 'branch: ripple/layer-down-${{ github.run_id }}' used in both
          # create_pr_standard and create_pr_draft steps above.
          BRANCH="${{ steps.create_pr_standard.outputs.pull-request-branch }}"
          if [ -z "$BRANCH" ]; then
            BRANCH="${{ steps.create_pr_draft.outputs.pull-request-branch }}"
          fi
          if [ -z "$BRANCH" ]; then
            BRANCH="ripple/layer-down-${{ github.run_id }}"
          fi
          SYNC_STATE="governance/sync_state.json"
          if ! git fetch origin "$BRANCH"; then
            echo "::error::Failed to fetch branch $BRANCH — cannot stamp ripple PR number"
            exit 1
          fi
          if ! git checkout "$BRANCH"; then
            echo "::error::Failed to checkout branch $BRANCH — cannot stamp ripple PR number"
            exit 1
          fi
          if [ -f "$SYNC_STATE" ]; then
            if jq --arg pr "$PR_NUMBER" '.last_sync.ripple_pr = $pr' \
                "$SYNC_STATE" > "${SYNC_STATE}.tmp"; then
              mv "${SYNC_STATE}.tmp" "$SYNC_STATE"
            else
              rm -f "${SYNC_STATE}.tmp"
              echo "::warning::jq failed to update sync_state.json — ripple_pr will remain as-is"
              exit 0
            fi
            git add "$SYNC_STATE"
            if ! git diff --cached --quiet; then
              git commit -m "chore: record ripple PR #${PR_NUMBER} in sync_state.json"
              git push origin "$BRANCH"
              echo "sync_state.json stamped: ripple_pr=${PR_NUMBER}"
            else
              echo "sync_state.json already up to date"
            fi
          fi

      # ── Enable auto-merge only when no CS2 gate required ──
      - name: Enable auto-merge
        if: >
          steps.align.outputs.drift_detected == 'true' &&
          steps.escalation.outputs.require_cs2 == 'false' &&
          steps.pr_number.outputs.number != ''
        env:
          GH_TOKEN: ${{ secrets.MATURION_BOT_TOKEN || github.token }}
        run: |
          PR_NUMBER="${{ steps.pr_number.outputs.number }}"
          echo "Enabling auto-merge for ripple PR #$PR_NUMBER"
          gh pr merge "$PR_NUMBER" \
            --repo ${{ github.repository }} \
            --auto \
            --squash \
            --delete-branch || echo "Auto-merge could not be enabled — branch protection may require checks to pass first"

      # ── Comment on the issue ──
      - name: Comment on issue
        if: always()
        env:
          GH_TOKEN: ${{ secrets.MATURION_BOT_TOKEN || github.token }}
        run: |
          DRIFT="${{ steps.align.outputs.drift_detected }}"
          REQUIRE_CS2="${{ steps.escalation.outputs.require_cs2 }}"
          PR_NUMBER="${{ steps.pr_number.outputs.number }}"
          COMMIT="${{ steps.metadata.outputs.canonical_commit }}"
          FILES="${{ steps.metadata.outputs.files_updated }}"
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          SKIP_PR="${{ steps.existing_pr.outputs.skip_pr_creation }}"

          if [ "$DRIFT" = "true" ] && [ -n "$PR_NUMBER" ]; then
            if [ "$SKIP_PR" = "true" ]; then
              COMMENT=$(printf '%s\n\n%s\n\n%s\n%s\n%s\n\n%s\n%s' \
                '## ✅ Ripple Integration — Existing Alignment PR Referenced' \
                'Governance drift was detected. A governance alignment PR already exists (created by the scheduled alignment workflow). No duplicate PR was created.' \
                "- Existing PR: #${PR_NUMBER}" \
                "- Canonical commit: \`${COMMIT}\`" \
                "- Files updated: ${FILES}" \
                '---' \
                '*Governance Liaison — ripple-integration.yml*')
            elif [ "$REQUIRE_CS2" = "true" ]; then
              COMMENT=$(printf '%s\n\n%s\n\n%s\n\n%s\n%s\n%s\n\n%s\n%s' \
                '## 🔒 Ripple Integration — CS2 Escalation Required' \
                'Governance drift was detected and a **DRAFT** ripple PR has been created.' \
                '**Agent contract files are in the changeset. Only CS2 (Johan Ras) may approve and merge.**' \
                "- Ripple PR: #${PR_NUMBER} (DRAFT — awaiting CS2 approval)" \
                '- Escalation doc: `.agent-workspace/governance-liaison/escalation-inbox/`' \
                "- Canonical commit: \`${COMMIT}\`" \
                '---' \
                '*Governance Liaison — ripple-integration.yml*')
            else
              COMMENT=$(printf '%s\n\n%s\n\n%s\n%s\n%s\n%s\n\n%s\n%s' \
                '## ✅ Ripple Integration — Auto-Merge Enabled' \
                'Governance drift was detected and a ripple PR has been created.' \
                "- Ripple PR: #${PR_NUMBER}" \
                "- Canonical commit: \`${COMMIT}\`" \
                "- Files updated: ${FILES}" \
                '- Auto-merge: **enabled** (no agent contract files changed)' \
                '---' \
                '*Governance Liaison — ripple-integration.yml*')
            fi
          elif [ "$DRIFT" = "false" ]; then
            COMMENT=$(printf '%s\n\n%s\n\n%s\n%s' \
              '## ✅ Ripple Integration — No Drift Detected' \
              'Governance is already aligned with canonical source. No PR required.' \
              '---' \
              '*Governance Liaison — ripple-integration.yml*')
          else
            COMMENT=$(printf '%s\n\n%s\n%s\n\n%s\n%s' \
              '## ⚠️ Ripple Integration — Alignment Script Error' \
              'The alignment script encountered an error. Check the workflow run for details:' \
              "${RUN_URL}" \
              '---' \
              '*Governance Liaison — ripple-integration.yml*')
          fi

          gh issue comment "${{ steps.issue.outputs.number }}" \
            --repo ${{ github.repository }} \
            --body "$COMMENT" || echo "Could not comment on issue"
