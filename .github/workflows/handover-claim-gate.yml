name: Handover Claim Gate

# Authority: governance/canon/LIVING_AGENT_SYSTEM.md v6.2.0
# Purpose: Prevent failed-gate handovers by detecting handover/merge-ready/completion
#          claims and verifying that:
#          (1) required CI checks on the current HEAD SHA are complete and green,
#          (2) the producing agent posted a current-head gate snapshot precondition,
#          (3) after a blocked claim, a corrective commit or corrective producer comment
#              exists before any later claim can be accepted.
#
# Snapshot format: The snapshot block required in the handover claim comment is the
# PRODUCER-SIDE handover format. It must be produced by the ECAP agent
# (execution-ceremony-admin-agent) as part of the ECAP_GATE_AND_ADMIN_REPORT output
# (see governance/checklists/phase4-role-separation-operational-guidance.md §6).
# It must NOT be copied from a prior gate-bot blocked comment.
# HANDOVER_ALLOWED: yes must reflect a genuine all-green snapshot at the current HEAD SHA.
# If any required check is red/pending/missing, ECAP must output STOP_AND_FIX and set
# HANDOVER_ALLOWED: no. Foreman must reject any handover claim missing this snapshot
# or presenting HANDOVER_ALLOWED: no.
#
# Related blocking condition (Governance Watchdog gap3-prehandover-pending-token):
# If the PREHANDOVER proof in .agent-workspace/ contains iaa_audit_token: PENDING or
# the field is absent, the Watchdog will flag this as a gap. ECAP must not post a
# handover claim while iaa_audit_token is unresolved — FAIL-ONLY-ONCE A-021 treats
# PENDING token + handover claim as an automatic merge gate failure.
#
# Triggers:
# - issue_comment: created — catches "handover", "merge-ready", "all gates pass",
#   "ready to merge", "ready for review", "complete/completion" keywords posted in PR comments.
# - pull_request_target: ready_for_review — fires when a draft is marked ready,
#   which is the canonical "I am handing over" signal.
#
# Behaviour:
# - If the latest-head checks are all green: posts an acknowledgement.
# - If any required check is red, pending, or missing: posts HANDOVER BLOCKED
#   listing the failing / pending / missing checks.
# - Handover-claim precondition: claim comments must include required snapshot fields
#   (CURRENT_HEAD_SHA / REQUIRED_CHECKS_TOTAL / PASSING_CHECKS / FAILING_CHECKS /
#   PENDING_CHECKS / MISSING_CHECKS / ECAP_REQUIRED / ECAP_ARTIFACT_PRESENT /
#   IAA_REQUIRED / IAA_ARTIFACT_PRESENT / HANDOVER_ALLOWED).
# - If gate previously blocked on this PR, acceptance requires corrective commit
#   (HEAD SHA advanced since blocked marker) or corrective comment from producing agent.
# - Product-fix PRs (manifest requires_iaa=false, requires_ecap=false)
#   are NOT required to have PREHANDOVER/LUIEP ceremony artifacts — the gate only
#   verifies that CI checks themselves are green.
#
# Issue: maturion-isms#1542

on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [ready_for_review]

permissions:
  pull-requests: write
  issues: write
  checks: read

jobs:
  handover-claim-gate:
    name: "handover-claim/check-current-head"
    runs-on: ubuntu-latest

    # Only fire when:
    # (a) A comment on a PR (not issue) contains handover keywords, OR
    # (b) A copilot/ branch PR is marked ready_for_review
    #
    # Keyword groups:
    # - User-facing: handover, merge-ready, ready to merge, all gates pass, merge gate released
    # - Foreman governance signals: Phase 4 (handover phase), OPOJD (complete handover doctrine)
    #   These are intentional — Foreman agents use these precise governance terms in comments.
    if: |
      (
        github.event_name == 'issue_comment' &&
        github.event.issue.pull_request != null &&
        (
          contains(github.event.comment.body, 'handover') ||
          contains(github.event.comment.body, 'Handover') ||
          contains(github.event.comment.body, 'HANDOVER') ||
          contains(github.event.comment.body, 'merge-ready') ||
          contains(github.event.comment.body, 'Merge-ready') ||
          contains(github.event.comment.body, 'merge ready') ||
          contains(github.event.comment.body, 'Merge ready') ||
          contains(github.event.comment.body, 'ready to merge') ||
          contains(github.event.comment.body, 'Ready to merge') ||
          contains(github.event.comment.body, 'all gates pass') ||
          contains(github.event.comment.body, 'All gates pass') ||
          contains(github.event.comment.body, 'ALL GATES PASS') ||
          contains(github.event.comment.body, 'ready for review') ||
          contains(github.event.comment.body, 'Ready for review') ||
          contains(github.event.comment.body, 'ready-for-review') ||
          contains(github.event.comment.body, 'Ready-for-review') ||
          contains(github.event.comment.body, 'work complete') ||
          contains(github.event.comment.body, 'Work complete') ||
          contains(github.event.comment.body, 'implementation complete') ||
          contains(github.event.comment.body, 'Implementation complete') ||
          contains(github.event.comment.body, 'Phase 4') ||
          contains(github.event.comment.body, 'OPOJD') ||
          contains(github.event.comment.body, 'merge gate released') ||
          contains(github.event.comment.body, 'Merge gate released')
        )
      ) ||
      (
        github.event_name == 'pull_request_target' &&
        (
          startsWith(github.head_ref, 'copilot/') ||
          github.event.pull_request.user.login == 'Copilot'
        )
      )

    steps:
      - name: Determine PR number and HEAD SHA
        id: pr_info
        uses: actions/github-script@v7
        with:
          script: |
            let prNumber, headSha;

            if (context.eventName === 'issue_comment') {
              prNumber = context.payload.issue.number;
              // Fetch PR details to get the current head SHA
              const { data: pr } = await github.rest.pulls.get({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: prNumber,
              });
              headSha = pr.head.sha;
            } else {
              // pull_request_target
              prNumber = context.payload.pull_request.number;
              headSha = context.payload.pull_request.head.sha;
            }

            core.setOutput('pr_number', String(prNumber));
            core.setOutput('head_sha', headSha);
            console.log(`PR: ${prNumber}, HEAD SHA: ${headSha}`);

      - name: Check current-head CI status and post gate result
        uses: actions/github-script@v7
        env:
          PR_NUMBER: ${{ steps.pr_info.outputs.pr_number }}
          HEAD_SHA: ${{ steps.pr_info.outputs.head_sha }}
        with:
          script: |
            const prNumber = parseInt(process.env.PR_NUMBER, 10);
            const headSha = process.env.HEAD_SHA;
            const isIssueComment = context.eventName === 'issue_comment';
            const commentBody = context.payload.comment?.body || '';
            const commentCreatedAt = context.payload.comment?.created_at ? new Date(context.payload.comment.created_at) : null;

            if (!prNumber || !headSha) {
              core.warning('Could not determine PR number or HEAD SHA — skipping handover claim gate.');
              return;
            }

            // ── Fetch PR (producer identity, metadata) ────────────────────────────
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
            });
            const producerLogin = pr.user?.login || '';

            // ── Resolve active PR manifest (per-PR preferred, legacy fallback) ──
            // Authority: governance/canon/MMM_SIMPLE_PR_ADMIN_MODEL.md v1.2.0
            let requiresIaa = true;
            let requiresEcap = true;
            let prType = 'unknown';
            const manifestPaths = [
              `.admin/prs/pr-${prNumber}.json`,
              '.admin/pr.json',
            ];
            for (const manifestPath of manifestPaths) {
              try {
                const { data: content } = await github.rest.repos.getContent({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  path: manifestPath,
                  ref: headSha,
                });
                const manifest = JSON.parse(Buffer.from(content.content, 'base64').toString('utf8'));
                requiresIaa = manifest.requires_iaa !== false;
                requiresEcap = manifest.requires_ecap !== false;
                prType = manifest.type || 'unknown';
                console.log(`Resolved manifest: ${manifestPath}`);
                break;
              } catch {
                // manifest path not found — try next
              }
            }
            const isProductFix = !requiresIaa && !requiresEcap;

            // ── Fetch all check runs for the HEAD SHA ─────────────────────────────
            const { data: checkRunsData } = await github.rest.checks.listForRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: headSha,
              per_page: 100,
            });

            // Also fetch commit statuses (older CI systems use status API)
            const { data: statusData } = await github.rest.repos.getCombinedStatusForRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: headSha,
            });

            const checkRuns = checkRunsData.check_runs || [];

            // Deduplicate: keep only the latest run per check name
            const latestByName = new Map();
            for (const run of checkRuns) {
              const existing = latestByName.get(run.name);
              if (!existing || new Date(run.started_at) > new Date(existing.started_at)) {
                latestByName.set(run.name, run);
              }
            }

            const failing = [];
            const pending = [];
            const passing = [];
            const missing = [];

            for (const [name, run] of latestByName) {
              if (run.status === 'completed') {
                // 'skipped' is acceptable: many jobs conditionally skip for non-applicable
                // PR types (e.g., non-Copilot PRs, docs-only PRs). A skipped job is not
                // a failing gate — it means the gate determined it does not apply.
                // 'neutral' is also acceptable: used by some checks to indicate "not applicable".
                if (run.conclusion === 'success' || run.conclusion === 'skipped' || run.conclusion === 'neutral') {
                  passing.push(name);
                } else {
                  failing.push({ name, conclusion: run.conclusion, url: run.html_url });
                }
              } else {
                // in_progress, queued, waiting
                pending.push({ name, status: run.status, url: run.html_url });
              }
            }

            // Check combined commit status
            if (statusData.state === 'failure' || statusData.state === 'error') {
              for (const s of statusData.statuses) {
                if (s.state === 'failure' || s.state === 'error') {
                  failing.push({ name: s.context, conclusion: s.state, url: s.target_url });
                }
              }
            } else if (statusData.state === 'pending') {
              for (const s of statusData.statuses) {
                if (s.state === 'pending') {
                  pending.push({ name: s.context, status: 'pending', url: s.target_url });
                }
              }
            }

            // ── Detect missing required checks ───────────────────────────────────
            // Required preflight check names for copilot/ branch PRs.
            // Absent contexts (never ran) are treated as missing/blocked, because
            // a check that never ran cannot confirm the PR is safe to merge.
            // 'skipped' counts as present (the gate decided it does not apply).
            const REQUIRED_CHECKS = [
              'preflight/phase-1-evidence',
              'preflight/iaa-prebrief-existence',
              'preflight/iaa-token-self-certification',
              'preflight/hfmc-ripple-presence',
              'preflight/evidence-exactness',
              'preflight/iaa-final-assurance',
              'preflight/ecap-admin-ceremony',
              'preflight/scope-declaration-parity',
              'preflight/mmm-pr-admin',
              'preflight/product-delivery-gates',
              'preflight/gate-changing-pr-rule',
            ];
            const observedNames = new Set([
              ...Array.from(latestByName.keys()),
              ...statusData.statuses.map(s => s.context),
            ]);
            for (const req of REQUIRED_CHECKS) {
              if (!observedNames.has(req)) {
                missing.push({ name: req });
              }
            }

            // Also block if no checks were returned at all (workflow has never run).
            // Use observedNames.size to avoid double-counting checks that appear in both APIs.
            const noChecksAtAll = observedNames.size === 0;

            const BLOCKED_MARKER = '<!-- handover-claim-gate-blocked -->';
            const OK_MARKER = '<!-- handover-claim-gate-ok -->';
            const GATE_MARKERS = [BLOCKED_MARKER, OK_MARKER];

            // ── Load existing PR comments once (preconditions + idempotency) ─────
            const { data: existingComments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              per_page: 100,
            });

            // ── Claim precondition snapshot validation (issue_comment only) ───────
            const requiredSnapshotFields = [
              'CURRENT_HEAD_SHA',
              'REQUIRED_CHECKS_TOTAL',
              'PASSING_CHECKS',
              'FAILING_CHECKS',
              'PENDING_CHECKS',
              'MISSING_CHECKS',
              'ECAP_REQUIRED',
              'ECAP_ARTIFACT_PRESENT',
              'IAA_REQUIRED',
              'IAA_ARTIFACT_PRESENT',
              'HANDOVER_ALLOWED',
            ];
            const preconditionFailures = [];
            const escapeRegex = (s) => {
              const special = '\\\\^$*+?.()|{}[]';
              return String(s).split('').map((ch) => (special.includes(ch) ? `\\${ch}` : ch)).join('');
            };

            const readSnapshotField = (fieldName) => {
              const m = commentBody.match(new RegExp(`^\\s*(?:[-*]\\s+)?${escapeRegex(fieldName)}:\\s*(.+)\\s*$`, 'im'));
              return m ? m[1].trim() : '';
            };
            const isNonEmptySignal = (value) => {
              const t = String(value || '').trim().toLowerCase();
              return t !== '' && !['none', 'n/a', 'na', '0', '[]', '{}', 'not_applicable'].includes(t);
            };
            const asBoolYesNo = (value) => {
              const t = String(value || '').trim().toLowerCase();
              if (t === 'yes') return true;
              if (t === 'no') return false;
              return null;
            };

            const snapshot = Object.fromEntries(requiredSnapshotFields.map((f) => [f, isIssueComment ? readSnapshotField(f) : '']));
            const missingSnapshotFields = requiredSnapshotFields.filter((f) => isIssueComment && !snapshot[f]);
            const claimUsesBlockedLanguage = /HANDOVER_BLOCKED|STOP_AND_FIX/i.test(commentBody);
            const snapshotSignalsBlocked = isIssueComment && (
              isNonEmptySignal(snapshot.FAILING_CHECKS) ||
              isNonEmptySignal(snapshot.PENDING_CHECKS) ||
              isNonEmptySignal(snapshot.MISSING_CHECKS)
            );
            const snapshotAllowsHandover = asBoolYesNo(snapshot.HANDOVER_ALLOWED);
            const snapshotHead = String(snapshot.CURRENT_HEAD_SHA || '').replace(/[`]/g, '');
            const requiredChecksTotal = Number.parseInt(String(snapshot.REQUIRED_CHECKS_TOTAL || ''), 10);
            const expectedEcapRequired = requiresEcap;
            const expectedIaaRequired = requiresIaa;
            const snapshotEcapRequired = asBoolYesNo(snapshot.ECAP_REQUIRED);
            const snapshotIaaRequired = asBoolYesNo(snapshot.IAA_REQUIRED);
            const snapshotEcapArtifactPresent = asBoolYesNo(snapshot.ECAP_ARTIFACT_PRESENT);
            const snapshotIaaArtifactPresent = asBoolYesNo(snapshot.IAA_ARTIFACT_PRESENT);
            const hasEcapEvidenceByChecks = !noChecksAtAll && !failing.some((f) => f.name === 'preflight/ecap-admin-ceremony') && !pending.some((p) => p.name === 'preflight/ecap-admin-ceremony') && !missing.some((m) => m.name === 'preflight/ecap-admin-ceremony');
            const hasIaaEvidenceByChecks = !noChecksAtAll && !failing.some((f) => f.name === 'preflight/iaa-final-assurance') && !pending.some((p) => p.name === 'preflight/iaa-final-assurance') && !missing.some((m) => m.name === 'preflight/iaa-final-assurance');

            if (!isIssueComment) {
              preconditionFailures.push('Handover trigger came from ready_for_review without required current-head snapshot comment. The ECAP agent (execution-ceremony-admin-agent) must post the ECAP_GATE_AND_ADMIN_REPORT snapshot block as a producer-side handover claim comment first.');
            } else {
              if (missingSnapshotFields.length > 0) {
                preconditionFailures.push(`Missing required snapshot field(s): ${missingSnapshotFields.join(', ')}. The snapshot must be produced by the ECAP agent (execution-ceremony-admin-agent) from the ECAP_GATE_AND_ADMIN_REPORT output — not copied from a prior gate-bot blocked comment.`);
              }
              if (snapshotHead) {
                if (!/^[0-9a-f]{12,40}$/i.test(snapshotHead)) {
                  preconditionFailures.push(`CURRENT_HEAD_SHA (${snapshotHead}) must be a 12-40 char hex SHA.`);
                } else {
                  const normalizedSnapshotHead = snapshotHead.toLowerCase();
                  const normalizedHeadSha = headSha.toLowerCase();
                  const normalizedHeadPrefix = normalizedHeadSha.slice(0, normalizedSnapshotHead.length);
                  if (normalizedSnapshotHead !== normalizedHeadSha && normalizedSnapshotHead !== normalizedHeadPrefix) {
                    preconditionFailures.push(`CURRENT_HEAD_SHA (${snapshotHead}) does not match PR HEAD (${headSha}).`);
                  }
                }
              }
              if (!Number.isNaN(requiredChecksTotal) && requiredChecksTotal !== REQUIRED_CHECKS.length) {
                preconditionFailures.push(`REQUIRED_CHECKS_TOTAL (${requiredChecksTotal}) does not match enforced set (${REQUIRED_CHECKS.length}).`);
              }
              if (snapshotSignalsBlocked && !claimUsesBlockedLanguage) {
                preconditionFailures.push('Snapshot reports failing/pending/missing checks, but claim is not HANDOVER_BLOCKED or STOP_AND_FIX.');
              }
              if (snapshotSignalsBlocked && snapshotAllowsHandover === true) {
                preconditionFailures.push('Snapshot reports failing/pending/missing checks while HANDOVER_ALLOWED is yes.');
              }
              if (snapshotAllowsHandover === true && (failing.length > 0 || pending.length > 0 || missing.length > 0 || noChecksAtAll)) {
                preconditionFailures.push('HANDOVER_ALLOWED is yes but current gate snapshot is not fully green.');
              }
              if (snapshotAllowsHandover === false && !claimUsesBlockedLanguage) {
                preconditionFailures.push('HANDOVER_ALLOWED is no; handover claim must be STOP_AND_FIX or must not be posted. A snapshot with HANDOVER_ALLOWED: no is valid only as a HANDOVER_BLOCKED / STOP_AND_FIX producer comment.');
              }
              if (snapshotEcapRequired !== null && snapshotEcapRequired !== expectedEcapRequired) {
                preconditionFailures.push(`ECAP_REQUIRED mismatch. Snapshot=${snapshot.ECAP_REQUIRED}, expected=${expectedEcapRequired ? 'yes' : 'no'}.`);
              }
              if (snapshotIaaRequired !== null && snapshotIaaRequired !== expectedIaaRequired) {
                preconditionFailures.push(`IAA_REQUIRED mismatch. Snapshot=${snapshot.IAA_REQUIRED}, expected=${expectedIaaRequired ? 'yes' : 'no'}.`);
              }
              if (expectedEcapRequired && snapshotEcapArtifactPresent !== true) {
                preconditionFailures.push('ECAP is required but ECAP_ARTIFACT_PRESENT is not yes.');
              }
              if (expectedIaaRequired && snapshotIaaArtifactPresent !== true) {
                preconditionFailures.push('IAA is required but IAA_ARTIFACT_PRESENT is not yes.');
              }
              if (expectedEcapRequired && !hasEcapEvidenceByChecks) {
                preconditionFailures.push('ECAP precondition failed: preflight/ecap-admin-ceremony is not green for current HEAD.');
              }
              if (expectedIaaRequired && !hasIaaEvidenceByChecks) {
                preconditionFailures.push('IAA precondition failed: preflight/iaa-final-assurance is not green for current HEAD.');
              }
            }

            // ── Corrective-action requirement after prior HANDOVER BLOCKED ────────
            const latestBlockedGateComment = existingComments
              .filter(c => c.body && c.body.includes(BLOCKED_MARKER))
              .sort((a, b) => new Date(b.updated_at || b.created_at) - new Date(a.updated_at || a.created_at))[0];
            if (isIssueComment && latestBlockedGateComment && commentCreatedAt) {
              const blockedAt = new Date(latestBlockedGateComment.updated_at || latestBlockedGateComment.created_at);
              if (commentCreatedAt > blockedAt) {
                const blockedHeadMatch = latestBlockedGateComment.body.match(/HEAD SHA verified:\s*`([0-9a-f]{7,40})`/i);
                const blockedHead = blockedHeadMatch ? blockedHeadMatch[1] : '';
                const headAdvanced = blockedHead && blockedHead !== headSha;
                const correctiveProducerComment = existingComments.some(c =>
                  c.user?.login === producerLogin &&
                  new Date(c.created_at) > blockedAt &&
                  /HANDOVER_BLOCKED|STOP_AND_FIX/i.test(c.body || '')
                );
                if (!headAdvanced && !correctiveProducerComment) {
                  preconditionFailures.push(
                    `Previous handover block requires corrective commit (new HEAD SHA) or corrective comment from producing agent (${producerLogin}) before claim can be accepted.`
                  );
                }
              }
            }

            const isBlocked = failing.length > 0 || pending.length > 0 || missing.length > 0 || noChecksAtAll || preconditionFailures.length > 0;

            // ── Build comment body ────────────────────────────────────────────────
            let body;
            if (isBlocked) {
              const failLines = failing.map(f =>
                `- ❌ **${f.name}** — \`${f.conclusion}\`${f.url ? ` ([details](${f.url}))` : ''}`
              ).join('\n');
              const pendingLines = pending.map(p =>
                `- ⏳ **${p.name}** — \`${p.status}\`${p.url ? ` ([details](${p.url}))` : ''}`
              ).join('\n');
              const missingLines = noChecksAtAll
                ? '- ⚠️ No checks found for this SHA — CI workflow may not have run yet.'
                : missing.map(m => `- ⚠️ **${m.name}** — \`missing\` (never ran for this SHA)`).join('\n');

              const statusSummary = [
                failing.length > 0 ? `**Failing checks (${failing.length}):**\n${failLines}` : null,
                pending.length > 0 ? `**Pending checks (${pending.length}):**\n${pendingLines}` : null,
                (missing.length > 0 || noChecksAtAll) ? `**Missing checks (${noChecksAtAll ? 'all' : missing.length}):**\n${missingLines}` : null,
              ].filter(Boolean).join('\n\n');
              const preconditionSummary = preconditionFailures.length > 0
                ? `**Handover precondition failures (${preconditionFailures.length}):**\n${preconditionFailures.map(x => `- ❌ ${x}`).join('\n')}`
                : null;
              const currentHeadSnapshot = [
                `- CURRENT_HEAD_SHA: ${headSha}`,
                `- REQUIRED_CHECKS_TOTAL: ${REQUIRED_CHECKS.length}`,
                `- PASSING_CHECKS: ${passing.length}`,
                `- FAILING_CHECKS: ${failing.length > 0 ? failing.map(f => f.name).join(', ') : 'none'}`,
                `- PENDING_CHECKS: ${pending.length > 0 ? pending.map(p => p.name).join(', ') : 'none'}`,
                `- MISSING_CHECKS: ${(missing.length > 0 || noChecksAtAll) ? (noChecksAtAll ? 'all' : missing.map(m => m.name).join(', ')) : 'none'}`,
                `- ECAP_REQUIRED: ${requiresEcap ? 'yes' : 'no'}`,
                `- ECAP_ARTIFACT_PRESENT: ${requiresEcap ? (hasEcapEvidenceByChecks ? 'yes' : 'no') : 'not_applicable'}`,
                `- IAA_REQUIRED: ${requiresIaa ? 'yes' : 'no'}`,
                `- IAA_ARTIFACT_PRESENT: ${requiresIaa ? (hasIaaEvidenceByChecks ? 'yes' : 'no') : 'not_applicable'}`,
                `- HANDOVER_ALLOWED: no`,
              ].join('\n');

              body = [
                `${BLOCKED_MARKER}`,
                '## 🚫 HANDOVER BLOCKED',
                '',
                `@copilot — A handover/merge-ready claim was detected on PR #${prNumber}, but the following required checks on HEAD \`${headSha.slice(0, 12)}...\` are **not green**:`,
                '',
                [statusSummary, preconditionSummary].filter(Boolean).join('\n\n'),
                '',
                '> **A PR cannot claim handover or merge-ready while any required check is red, pending, or missing.**',
                '> Fix all failing checks, wait for pending checks to complete, and ensure all required checks have run before re-claiming handover.',
                '> If this gate already blocked previously, post a corrective producer comment (HANDOVER_BLOCKED / STOP_AND_FIX) or push a corrective commit before the next claim.',
                '',
                '> ⚠️  **Producer-side snapshot requirement**: The snapshot block in your handover claim comment must be produced by the ECAP agent (execution-ceremony-admin-agent) as part of the `ECAP_GATE_AND_ADMIN_REPORT` output. Do NOT copy it from this gate-bot response. `HANDOVER_ALLOWED: yes` must reflect a genuine all-green snapshot at the current HEAD SHA — set it only after verifying all required checks are green. See `governance/checklists/phase4-role-separation-operational-guidance.md` §6.',
                '',
                isProductFix
                  ? `> ℹ️  This is a **product-fix PR** (\`type: ${prType}\`, \`requires_iaa: false\`, \`requires_ecap: false\`). No PREHANDOVER/IAA/ECAP ceremony is required — only CI must be green.`
                  : '> ⚠️  This PR requires IAA/ECAP ceremony artifacts in addition to green CI.',
                '',
                `**HEAD SHA verified**: \`${headSha}\``,
                `**Passing checks**: ${passing.length}`,
                '',
                '**Current-head gate snapshot (authoritative — for reference only; reproduce independently in your claim):**',
                currentHeadSnapshot,
                '**Authority**: CS2 (Johan Ras / @APGI-cmy) | Issue: maturion-isms#1542',
              ].join('\n');
            } else {
              const currentHeadSnapshot = [
                `- CURRENT_HEAD_SHA: ${headSha}`,
                `- REQUIRED_CHECKS_TOTAL: ${REQUIRED_CHECKS.length}`,
                `- PASSING_CHECKS: ${passing.length}`,
                '- FAILING_CHECKS: none',
                '- PENDING_CHECKS: none',
                '- MISSING_CHECKS: none',
                `- ECAP_REQUIRED: ${requiresEcap ? 'yes' : 'no'}`,
                `- ECAP_ARTIFACT_PRESENT: ${requiresEcap ? (hasEcapEvidenceByChecks ? 'yes' : 'no') : 'not_applicable'}`,
                `- IAA_REQUIRED: ${requiresIaa ? 'yes' : 'no'}`,
                `- IAA_ARTIFACT_PRESENT: ${requiresIaa ? (hasIaaEvidenceByChecks ? 'yes' : 'no') : 'not_applicable'}`,
                '- HANDOVER_ALLOWED: yes',
              ].join('\n');
              body = [
                `${OK_MARKER}`,
                '## ✅ HANDOVER CLAIM ACKNOWLEDGED',
                '',
                `@copilot — All current-head checks on HEAD \`${headSha.slice(0, 12)}...\` are green (${passing.length} passing).`,
                '',
                isProductFix
                  ? `> ℹ️  This is a **product-fix PR** (\`type: ${prType}\`, \`requires_iaa: false\`, \`requires_ecap: false\`). CI is green — handover is unblocked.`
                  : '> ✅ CI checks are green. Ensure PREHANDOVER proof and IAA token artifacts are committed before merge.',
                '',
                '> ℹ️  The snapshot block you included in your claim was validated as the required producer-side format (ECAP_GATE_AND_ADMIN_REPORT). Foreman must confirm HANDOVER_ALLOWED: yes before accepting handover.',
                '',
                `**HEAD SHA verified**: \`${headSha}\``,
                '',
                '**Current-head gate snapshot (authoritative):**',
                currentHeadSnapshot,
                '**Authority**: CS2 (Johan Ras / @APGI-cmy) | Issue: maturion-isms#1542',
              ].join('\n');
            }

            // ── Idempotency guard: edit existing gate comment if present ─────────
            // Avoids comment spam when the same PR triggers the gate multiple times.
            const existingGateComment = existingComments
              .filter(c => GATE_MARKERS.some(m => c.body && c.body.includes(m)))
              .sort((a, b) => new Date(b.created_at) - new Date(a.created_at))[0];

            if (existingGateComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existingGateComment.id,
                body,
              });
              console.log(`Updated existing gate comment ${existingGateComment.id}`);
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body,
              });
              console.log('Created new gate comment');
            }

            if (isBlocked) {
              // Update/create gate comment first so the reason is visible,
              // then fail the workflow job to enforce the gate as a hard CI check.
              core.setFailed(
                [
                  'HANDOVER BLOCKED:',
                  failing.length > 0 ? `${failing.length} failing` : null,
                  pending.length > 0 ? `${pending.length} pending` : null,
                  (missing.length > 0 || noChecksAtAll) ? `${noChecksAtAll ? 'all' : missing.length} missing` : null,
                  `check(s) on HEAD ${headSha.slice(0, 12)}.`,
                ].filter(Boolean).join(' ')
              );
            }
