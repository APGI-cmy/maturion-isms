name: Handover Claim Gate

# Authority: governance/canon/LIVING_AGENT_SYSTEM.md v6.2.0
# Purpose: Prevent failed-gate handovers by detecting handover/merge-ready/completion
#          claims and verifying that:
#          (1) required CI checks on the current HEAD SHA are complete and green,
#          (2) a deliberate current-head PRE_HANDOVER_CHECKPOINT_RESULT exists,
#          (3) after a blocked claim, a corrective commit or corrective producer comment
#              exists before any later claim can be accepted.
#
# Snapshot format: The snapshot block required in the handover claim comment is the
# PRODUCER-SIDE handover format. It must be produced by the ECAP agent
# (execution-ceremony-admin-agent) as part of the ECAP_GATE_AND_ADMIN_REPORT output
# (see governance/checklists/phase4-role-separation-operational-guidance.md §6).
# It must NOT be copied from a prior gate-bot blocked comment.
# HANDOVER_ALLOWED: yes must reflect a genuine all-green snapshot at the current HEAD SHA.
# If any required check is red/pending/missing, ECAP must output STOP_AND_FIX or
# REJECTION_NOTICE and set
# HANDOVER_ALLOWED: no. Foreman must reject any handover claim missing this snapshot
# or presenting HANDOVER_ALLOWED: no.
#
# Related blocking condition (Governance Watchdog gap3-prehandover-pending-token):
# If the PREHANDOVER proof in .agent-workspace/ contains iaa_audit_token: PENDING or
# the field is absent, the Watchdog will flag this as a gap. ECAP must not post a
# handover claim while iaa_audit_token is unresolved — FAIL-ONLY-ONCE A-021 treats
# PENDING token + handover claim as an automatic merge gate failure.
#
# Triggers:
# - issue_comment: created — catches "handover", "merge-ready", "all gates pass",
#   "ready to merge", "ready for review", "complete/completion" keywords posted in PR comments.
# - pull_request_target: ready_for_review — fires when a PR transitions to ready_for_review.
#
# Behaviour:
# - If the latest-head checks are all green: posts an acknowledgement.
# - If any required check is red, pending, or missing: posts HANDOVER BLOCKED
#   listing the failing / pending / missing checks.
# - Handover-claim precondition: a prior PRE_HANDOVER_CHECKPOINT_RESULT comment for
#   the current HEAD SHA must state HANDOVER_ALLOWED: yes and RESULT: HANDOVER_ALLOWED.
# - If gate previously blocked on this PR, acceptance requires corrective commit
#   (HEAD SHA advanced since blocked marker) or corrective comment from producing agent.
# - Product-fix PRs (manifest requires_iaa=false, requires_ecap=false)
#   are NOT required to have PREHANDOVER/LUIEP ceremony artifacts — the gate only
#   verifies that CI checks themselves are green.
#
# ready_for_review vs explicit handover claim distinction (Issue: maturion-isms#1637):
# - A bare ready_for_review event (no explicit handover/merge-ready claim in PR comments)
#   is classified as CHECKPOINT_REQUIRED | HANDOVER_NOT_ACCEPTED. The gate posts an
#   advisory comment but does NOT call core.setFailed. This avoids noisy early failures
#   when Copilot opens/marks a PR ready before checks complete or before a producer-side
#   snapshot is available.
# - If any existing PR comment contains explicit handover/merge-ready language (and is not
#   a STOP_AND_FIX, CS2_INTERVENTION_REQUIRED, HANDOVER_BLOCKED, or REJECTION_NOTICE comment),
#   the ready_for_review event is treated as an active handover gate trigger and the full
#   strict check is enforced.
# - STOP_AND_FIX and CS2_INTERVENTION_REQUIRED comments are never treated as handover claims.
# - Classification labels used:
#     CHECKPOINT_REQUIRED  — bare ready_for_review with no current-head snapshot yet
#     HANDOVER_NOT_ACCEPTED — ready_for_review without explicit claim; advisory only
#     STOP_AND_FIX         — agent can fix failing/missing/stale gates inside authority
#     CS2_INTERVENTION_REQUIRED — out-of-authority/sandbox blocker requiring CS2 action
#     HANDOVER_BLOCKED     — explicit handover/merge-ready claim made but requirements unmet
#
# Issue: maturion-isms#1542

on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [ready_for_review]

permissions:
  pull-requests: write
  issues: write
  checks: read

jobs:
  handover-claim-gate:
    name: "handover-claim/check-current-head"
    runs-on: ubuntu-latest

    # Only fire when:
    # (a) A comment on a PR (not issue) contains handover keywords, OR
    # (b) A copilot/ branch PR is marked ready_for_review
    #
    # Keyword groups:
    # - User-facing: handover, merge-ready, ready to merge, all gates pass, merge gate released
    # - Foreman governance signals: Phase 4 (handover phase), OPOJD (complete handover doctrine)
    #   These are intentional — Foreman agents use these precise governance terms in comments.
    if: |
      (
        github.event_name == 'issue_comment' &&
        github.event.issue.pull_request != null &&
        (
          contains(github.event.comment.body, 'handover') ||
          contains(github.event.comment.body, 'Handover') ||
          contains(github.event.comment.body, 'HANDOVER') ||
          contains(github.event.comment.body, 'merge-ready') ||
          contains(github.event.comment.body, 'Merge-ready') ||
          contains(github.event.comment.body, 'merge ready') ||
          contains(github.event.comment.body, 'Merge ready') ||
          contains(github.event.comment.body, 'ready to merge') ||
          contains(github.event.comment.body, 'Ready to merge') ||
          contains(github.event.comment.body, 'all gates pass') ||
          contains(github.event.comment.body, 'All gates pass') ||
          contains(github.event.comment.body, 'ALL GATES PASS') ||
          contains(github.event.comment.body, 'ready for review') ||
          contains(github.event.comment.body, 'Ready for review') ||
          contains(github.event.comment.body, 'ready-for-review') ||
          contains(github.event.comment.body, 'Ready-for-review') ||
          contains(github.event.comment.body, 'work complete') ||
          contains(github.event.comment.body, 'Work complete') ||
          contains(github.event.comment.body, 'implementation complete') ||
          contains(github.event.comment.body, 'Implementation complete') ||
          contains(github.event.comment.body, 'Phase 4') ||
          contains(github.event.comment.body, 'OPOJD') ||
          contains(github.event.comment.body, 'merge gate released') ||
          contains(github.event.comment.body, 'Merge gate released')
        )
      ) ||
      (
        github.event_name == 'pull_request_target' &&
        (
          startsWith(github.head_ref, 'copilot/') ||
          github.event.pull_request.user.login == 'Copilot'
        )
      )

    steps:
      - name: Determine PR number and HEAD SHA
        id: pr_info
        uses: actions/github-script@v7
        with:
          script: |
            let prNumber, headSha;

            if (context.eventName === 'issue_comment') {
              prNumber = context.payload.issue.number;
              // Fetch PR details to get the current head SHA
              const { data: pr } = await github.rest.pulls.get({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: prNumber,
              });
              headSha = pr.head.sha;
            } else {
              // pull_request_target
              prNumber = context.payload.pull_request.number;
              headSha = context.payload.pull_request.head.sha;
            }

            core.setOutput('pr_number', String(prNumber));
            core.setOutput('head_sha', headSha);
            console.log(`PR: ${prNumber}, HEAD SHA: ${headSha}`);

      - name: Check current-head CI status and post gate result
        uses: actions/github-script@v7
        env:
          PR_NUMBER: ${{ steps.pr_info.outputs.pr_number }}
          HEAD_SHA: ${{ steps.pr_info.outputs.head_sha }}
        with:
          script: |
            const prNumber = parseInt(process.env.PR_NUMBER, 10);
            const headSha = process.env.HEAD_SHA;
            const isIssueComment = context.eventName === 'issue_comment';
            const commentBody = context.payload.comment?.body || '';
            const commentCreatedAt = context.payload.comment?.created_at ? new Date(context.payload.comment.created_at) : null;
            const checkpointTriggerPattern = /^(?:ECAP_)?PRE_HANDOVER_CHECKPOINT(?:\b.*)?$|^\/prepare-handover(?:\b.*)?$/i;
            const checkpointResultPattern = /PRE_HANDOVER_CHECKPOINT_RESULT/i;

            if (!prNumber || !headSha) {
              core.warning('Could not determine PR number or HEAD SHA — skipping handover claim gate.');
              return;
            }

            if (
              isIssueComment &&
              (
                checkpointTriggerPattern.test(commentBody.trim()) ||
                checkpointResultPattern.test(commentBody) ||
                /RESULT:\s*STOP_AND_FIX/i.test(commentBody) ||
                /RESULT:\s*CS2_INTERVENTION_REQUIRED/i.test(commentBody) ||
                /HANDOVER_ALLOWED:\s*no/i.test(commentBody)
              )
            ) {
              core.info('Checkpoint trigger/result or STOP_AND_FIX/CS2_INTERVENTION_REQUIRED status comment detected — not treating as handover claim.');
              return;
            }

            // ── Fetch PR (producer identity, metadata) ────────────────────────────
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
            });
            const producerLogin = pr.user?.login || '';

            // ── Resolve active PR manifest (per-PR preferred, legacy fallback) ──
            // Authority: governance/canon/MMM_SIMPLE_PR_ADMIN_MODEL.md v1.2.0
            let requiresIaa = true;
            let requiresEcap = true;
            let prType = 'unknown';
            const manifestPaths = [
              `.admin/prs/pr-${prNumber}.json`,
              '.admin/pr.json',
            ];
            for (const manifestPath of manifestPaths) {
              try {
                const { data: content } = await github.rest.repos.getContent({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  path: manifestPath,
                  ref: headSha,
                });
                const manifest = JSON.parse(Buffer.from(content.content, 'base64').toString('utf8'));
                requiresIaa = manifest.requires_iaa !== false;
                requiresEcap = manifest.requires_ecap !== false;
                prType = manifest.type || 'unknown';
                console.log(`Resolved manifest: ${manifestPath}`);
                break;
              } catch {
                // manifest path not found — try next
              }
            }
            const isProductFix = !requiresIaa && !requiresEcap;

            // ── Fetch all check runs for the HEAD SHA ─────────────────────────────
            const { data: checkRunsData } = await github.rest.checks.listForRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: headSha,
              per_page: 100,
            });

            // Also fetch commit statuses (older CI systems use status API)
            const { data: statusData } = await github.rest.repos.getCombinedStatusForRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: headSha,
            });

            const checkRuns = checkRunsData.check_runs || [];

            // Deduplicate: keep only the latest run per check name
            const latestByName = new Map();
            for (const run of checkRuns) {
              const existing = latestByName.get(run.name);
              if (!existing || new Date(run.started_at) > new Date(existing.started_at)) {
                latestByName.set(run.name, run);
              }
            }

            const failing = [];
            const pending = [];
            const passing = [];
            const missing = [];

            for (const [name, run] of latestByName) {
              if (run.status === 'completed') {
                // 'skipped' is acceptable: many jobs conditionally skip for non-applicable
                // PR types (e.g., non-Copilot PRs, docs-only PRs). A skipped job is not
                // a failing gate — it means the gate determined it does not apply.
                // 'neutral' is also acceptable: used by some checks to indicate "not applicable".
                if (run.conclusion === 'success' || run.conclusion === 'skipped' || run.conclusion === 'neutral') {
                  passing.push(name);
                } else {
                  failing.push({ name, conclusion: run.conclusion, url: run.html_url });
                }
              } else {
                // in_progress, queued, waiting
                pending.push({ name, status: run.status, url: run.html_url });
              }
            }

            // Check combined commit status
            if (statusData.state === 'failure' || statusData.state === 'error') {
              for (const s of statusData.statuses) {
                if (s.state === 'failure' || s.state === 'error') {
                  failing.push({ name: s.context, conclusion: s.state, url: s.target_url });
                }
              }
            } else if (statusData.state === 'pending') {
              for (const s of statusData.statuses) {
                if (s.state === 'pending') {
                  pending.push({ name: s.context, status: 'pending', url: s.target_url });
                }
              }
            }

            // ── Detect missing required checks ───────────────────────────────────
            // Required preflight check names for copilot/ branch PRs.
            // Absent contexts (never ran) are treated as missing/blocked, because
            // a check that never ran cannot confirm the PR is safe to merge.
            // 'skipped' counts as present (the gate decided it does not apply).
            const REQUIRED_CHECKS = [
              'preflight/phase-1-evidence',
              'preflight/iaa-prebrief-existence',
              'preflight/iaa-token-self-certification',
              'preflight/hfmc-ripple-presence',
              'preflight/evidence-exactness',
              'preflight/iaa-final-assurance',
              'preflight/ecap-admin-ceremony',
              'preflight/scope-declaration-parity',
              'preflight/mmm-pr-admin',
              'preflight/product-delivery-gates',
              'preflight/gate-changing-pr-rule',
            ];
            const observedNames = new Set([
              ...Array.from(latestByName.keys()),
              ...statusData.statuses.map(s => s.context),
            ]);
            for (const req of REQUIRED_CHECKS) {
              if (!observedNames.has(req)) {
                missing.push({ name: req });
              }
            }

            // Also block if no checks were returned at all (workflow has never run).
            // Use observedNames.size to avoid double-counting checks that appear in both APIs.
            const noChecksAtAll = observedNames.size === 0;

            const BLOCKED_MARKER = '<!-- handover-claim-gate-blocked -->';
            const OK_MARKER = '<!-- handover-claim-gate-ok -->';
            // CHECKPOINT_REQUIRED_MARKER is intentionally separate from GATE_MARKERS so that
            // the main gate idempotency (HANDOVER BLOCKED / ACKNOWLEDGED) does not update the
            // advisory comment, and vice versa. The advisory can coexist with a BLOCKED comment.
            const CHECKPOINT_REQUIRED_MARKER = '<!-- handover-checkpoint-required -->';
            const GATE_MARKERS = [BLOCKED_MARKER, OK_MARKER];

            // ── Load existing PR comments once (preconditions + idempotency) ─────
            const listAllIssueComments = async () => {
              const comments = [];
              let page = 1;
              let hasMore = true;
              while (hasMore) {
                const { data } = await github.rest.issues.listComments({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: prNumber,
                  per_page: 100,
                  page,
                });
                comments.push(...data);
                hasMore = data.length === 100;
                page += 1;
              }
              return comments;
            };
            const existingComments = await listAllIssueComments();

            const requiredSnapshotFields = [
              'CURRENT_HEAD_SHA',
              'MERGE_CONFLICT_CHECKED',
              'MERGEABLE_WITH_BASE',
              'BASE_SYNCED_OR_CONFLICTS_RESOLVED',
              'CURRENT_HEAD_CI_CHECKED',
              'LOCAL_OR_CURRENT_HEAD_CI_CHECKS_RUN',
              'REQUIRED_CHECKS_TOTAL',
              'PASSING_CHECKS',
              'FAILING_CHECKS',
              'PENDING_CHECKS',
              'MISSING_CHECKS',
              'STALE_EVIDENCE_FOUND',
              'ECAP_REQUIRED',
              'ECAP_ARTIFACT_PRESENT',
              'IAA_REQUIRED',
              'IAA_ARTIFACT_PRESENT',
              'OUT_OF_SANDBOX_OR_GOVERNANCE_BLOCKER',
              'HANDOVER_ALLOWED',
              'RESULT',
            ];
            const preconditionFailures = [];
            const CHECKPOINT_MARKER = '<!-- pre-handover-checkpoint -->';
            const escapeRegex = (s) => {
              const special = '\\\\^$*+?.()|{}[]';
              return String(s).split('').map((ch) => (special.includes(ch) ? `\\${ch}` : ch)).join('');
            };

            const readField = (text, fieldName) => {
              const m = String(text || '').match(new RegExp(`^\\s*(?:[-*]\\s+)?${escapeRegex(fieldName)}:\\s*(.+)\\s*$`, 'im'));
              return m ? m[1].trim() : '';
            };
            const REJECTION_NOTICE_REGEX = /(?:ADMIN_|IAA_|FOREMAN_)?REJECTION_NOTICE/i;
            const isNonEmptySignal = (value) => {
              const t = String(value || '').trim().toLowerCase();
              return t !== '' && !['none', 'n/a', 'na', '0', '[]', '{}', 'not_applicable'].includes(t);
            };
            const asBoolYesNo = (value) => {
              const t = String(value || '').trim().toLowerCase();
              if (t === 'yes') return true;
              if (t === 'no') return false;
              return null;
            };

            const snapshot = Object.fromEntries(requiredSnapshotFields.map((f) => [f, isIssueComment ? readField(commentBody, f) : '']));
            const missingSnapshotFields = requiredSnapshotFields.filter((f) => isIssueComment && !snapshot[f]);
            const claimUsesBlockedLanguage = /HANDOVER_BLOCKED|STOP_AND_FIX|CS2_INTERVENTION_REQUIRED/i.test(commentBody) || REJECTION_NOTICE_REGEX.test(commentBody);
            const snapshotSignalsBlocked = isIssueComment && (
              isNonEmptySignal(snapshot.FAILING_CHECKS) ||
              isNonEmptySignal(snapshot.PENDING_CHECKS) ||
              isNonEmptySignal(snapshot.MISSING_CHECKS) ||
              /^yes$/i.test(String(snapshot.STALE_EVIDENCE_FOUND || '').trim())
            );
            const snapshotAllowsHandover = asBoolYesNo(snapshot.HANDOVER_ALLOWED);
            const snapshotResult = String(snapshot.RESULT || '').trim();
            const snapshotMergeConflictChecked = asBoolYesNo(snapshot.MERGE_CONFLICT_CHECKED);
            const snapshotMergeableWithBase = asBoolYesNo(snapshot.MERGEABLE_WITH_BASE);
            const snapshotBaseSyncedOrConflictsResolved = asBoolYesNo(snapshot.BASE_SYNCED_OR_CONFLICTS_RESOLVED);
            const snapshotCurrentHeadCiChecked = asBoolYesNo(snapshot.CURRENT_HEAD_CI_CHECKED);
            const snapshotOutOfSandboxBlocker = String(snapshot.OUT_OF_SANDBOX_OR_GOVERNANCE_BLOCKER || '').trim();
            const snapshotChecksRun = asBoolYesNo(snapshot.LOCAL_OR_CURRENT_HEAD_CI_CHECKS_RUN);
            const snapshotHead = String(snapshot.CURRENT_HEAD_SHA || '').replace(/[`]/g, '');
            const requiredChecksTotal = Number.parseInt(String(snapshot.REQUIRED_CHECKS_TOTAL || ''), 10);
            const expectedEcapRequired = requiresEcap;
            const expectedIaaRequired = requiresIaa;
            const snapshotEcapRequired = asBoolYesNo(snapshot.ECAP_REQUIRED);
            const snapshotIaaRequired = asBoolYesNo(snapshot.IAA_REQUIRED);
            const snapshotEcapArtifactPresent = asBoolYesNo(snapshot.ECAP_ARTIFACT_PRESENT);
            const snapshotIaaArtifactPresent = asBoolYesNo(snapshot.IAA_ARTIFACT_PRESENT);

            const checkpointComments = existingComments
              .filter(c => c.body && c.body.includes(CHECKPOINT_MARKER))
              .map((comment) => {
                const checkpointHead = String(readField(comment.body, 'CURRENT_HEAD_SHA') || '').replace(/[`]/g, '');
                const handoverValue = asBoolYesNo(readField(comment.body, 'HANDOVER_ALLOWED'));
                const resultValue = readField(comment.body, 'RESULT');
                return {
                  comment,
                  checkpointHead,
                  handoverValue,
                  resultValue,
                  reasonValue: readField(comment.body, 'REASON'),
                };
              })
              .filter(({ checkpointHead }) => {
                const normalized = checkpointHead.toLowerCase();
                const target = headSha.toLowerCase();
                return normalized && (normalized === target || target.startsWith(normalized));
              })
              .sort((a, b) => new Date(b.comment.updated_at || b.comment.created_at) - new Date(a.comment.updated_at || a.comment.created_at));
            const latestCurrentHeadCheckpoint = checkpointComments[0];
            const latestCurrentHeadCheckpointSuccessful = Boolean(
              latestCurrentHeadCheckpoint &&
              latestCurrentHeadCheckpoint.handoverValue === true &&
              /^HANDOVER_ALLOWED$/i.test(String(latestCurrentHeadCheckpoint.resultValue || '').trim())
            );
            const hasEcapEvidenceByChecks = !noChecksAtAll && !failing.some((f) => f.name === 'preflight/ecap-admin-ceremony') && !pending.some((p) => p.name === 'preflight/ecap-admin-ceremony') && !missing.some((m) => m.name === 'preflight/ecap-admin-ceremony');
            const hasIaaEvidenceByChecks = !noChecksAtAll && !failing.some((f) => f.name === 'preflight/iaa-final-assurance') && !pending.some((p) => p.name === 'preflight/iaa-final-assurance') && !missing.some((m) => m.name === 'preflight/iaa-final-assurance');

            if (!isIssueComment) {
              // ready_for_review event: distinguish bare PR state transition from active handover claim.
              //
              // Check if any existing PR comment contains explicit handover/merge-ready language.
              // Gate-bot comments (BLOCKED/OK/CHECKPOINT_REQUIRED markers), checkpoint trigger/result
              // comments, and STOP_AND_FIX/CS2_INTERVENTION_REQUIRED/REJECTION_NOTICE comments are
              // all excluded — they are not handover claims.
              const existingExplicitHandoverClaim = existingComments.find((c) => {
                const b = c.body || '';
                // Exclude gate-bot comments (they are authoritative gate results, not producer claims)
                if (GATE_MARKERS.some(m => b.includes(m))) return false;
                if (b.includes(CHECKPOINT_REQUIRED_MARKER)) return false;
                // Exclude checkpoint trigger/result comments
                if (checkpointTriggerPattern.test(b.trim()) || checkpointResultPattern.test(b)) return false;
                // Exclude STOP_AND_FIX / blocked status comments — not handover claims
                if (/HANDOVER_BLOCKED|STOP_AND_FIX|CS2_INTERVENTION_REQUIRED/i.test(b)) return false;
                if (REJECTION_NOTICE_REGEX.test(b)) return false;
                // Match explicit handover/merge-ready claim language
                return (
                  /\bhandover\b/i.test(b) ||
                  /merge.?ready|ready.to.merge/i.test(b) ||
                  /all.gates.pass|merge.gate.released/i.test(b) ||
                  /\bOPOJD\b/i.test(b) ||
                  /\bPhase\s+4\b/i.test(b) ||
                  /HANDOVER_ALLOWED\s*:\s*yes/i.test(b) ||
                  /\b(?:work|implementation)\s+complete\b/i.test(b)
                );
              });

              if (!existingExplicitHandoverClaim) {
                // Bare ready_for_review with no explicit handover/merge-ready claim found.
                // Classify as CHECKPOINT_REQUIRED | HANDOVER_NOT_ACCEPTED.
                // Post an advisory comment and exit WITHOUT calling core.setFailed.

                // ── Protected-path detection ─────────────────────────────────────────
                // Fetch the PR file list from the API to determine whether protected paths
                // are touched, and whether ECAP/PREHANDOVER evidence has already been
                // committed. The producer must not wait for CI to discover this.
                const PROTECTED_PATH_PATTERNS = [
                  /^governance\/templates\//,
                  /^governance\/checklists\//,
                  /^governance\/canon\//,
                  /^\.github\/agents\//,
                  /^governance\/CANON_INVENTORY\.json$/,
                ];
                let prFilenames = [];
                try {
                  // Paginate to collect all changed files (GitHub API max 3000).
                  let filePage = 1;
                  let hasMoreFiles = true;
                  while (hasMoreFiles) {
                    const { data: prFiles } = await github.rest.pulls.listFiles({
                      owner: context.repo.owner,
                      repo: context.repo.repo,
                      pull_number: prNumber,
                      per_page: 100,
                      page: filePage,
                    });
                    prFilenames.push(...prFiles.map(f => f.filename));
                    hasMoreFiles = prFiles.length === 100;
                    filePage += 1;
                  }
                } catch (e) {
                  const message = `Could not fetch PR file list: ${e.message}. ` +
                    'Protected-path and ECAP/PREHANDOVER evidence classification is unknown, ' +
                    'so this workflow will not continue with file-list-based handover classification.';
                  console.log(message);
                  throw new Error(message);
                }

                const protectedFilesChanged = prFilenames.filter(f =>
                  PROTECTED_PATH_PATTERNS.some(p => p.test(f))
                );
                const hasProtectedPaths = protectedFilesChanged.length > 0;

                // Detect ECAP/PREHANDOVER evidence already in the PR (committed files).
                const prehandoverProofPresent = prFilenames.some(f =>
                  /^\.agent-admin\/prehandover\/proof-.*\.md$/.test(f) ||
                  /^\.agent-workspace\/foreman-v2\/memory\/PREHANDOVER-.*\.md$/.test(f)
                );
                const ecapBundlePresent = prFilenames.some(f =>
                  /^\.agent-workspace\/execution-ceremony-admin-agent\/bundles\/PREHANDOVER-.*\.md$/.test(f)
                );
                // ECAP_ARTIFACT_PRESENT is true when both proof and bundle are present
                // (mirrors ecap-admin-ceremony-gate.sh logic)
                const ecapArtifactPresent = prehandoverProofPresent && ecapBundlePresent;

                // If this is a protected-path PR and ECAP is required but evidence is absent,
                // the advisory must surface RESULT: STOP_AND_FIX / HANDOVER_ALLOWED: no.
                // requiresEcap was resolved from the PR manifest above.
                const ecapRequiredForAdvisory = hasProtectedPaths || requiresEcap;
                const ecapEvidenceMissing = ecapRequiredForAdvisory && !ecapArtifactPresent;

                // ── Build protected-path section for advisory ──────────────────────
                const protectedPathSection = hasProtectedPaths ? [
                  '',
                  '### 🔒 Protected paths detected',
                  '',
                  'This PR modifies governance-controlled paths that require ECAP ceremony evidence before handover:',
                  ...protectedFilesChanged.slice(0, 20).map(f => `- \`${f}\``),
                  ...(protectedFilesChanged.length > 20 ? [`- … and ${protectedFilesChanged.length - 20} more`] : []),
                  '',
                  '**ECAP classification snapshot (producer-side pre-handover check required):**',
                  `- ECAP_REQUIRED: ${ecapRequiredForAdvisory ? 'yes' : 'no'}`,
                  `- ECAP_ARTIFACT_PRESENT: ${ecapArtifactPresent ? 'yes' : 'no'}`,
                  `- PREHANDOVER_PROOF_PRESENT: ${prehandoverProofPresent ? 'yes' : 'no'}`,
                  `- ECAP_BUNDLE_PRESENT: ${ecapBundlePresent ? 'yes' : 'no'}`,
                  `- HANDOVER_ALLOWED: ${ecapEvidenceMissing ? 'no' : (ecapRequiredForAdvisory ? 'yes' : 'not_yet_determined')}`,
                  `- RESULT: ${ecapEvidenceMissing ? 'STOP_AND_FIX' : 'CHECKPOINT_REQUIRED'}`,
                  ...(ecapEvidenceMissing ? [
                    '',
                    '> ⚠️ **STOP_AND_FIX**: ECAP is required for this PR (protected paths changed) but ECAP/PREHANDOVER evidence is not yet present.',
                    '> The ECAP agent must commit the following before posting a handover claim:',
                    '> - A proof file at `.agent-admin/prehandover/proof-<pr>-<slug>.md`',
                    '> - An ECAP bundle at `.agent-workspace/execution-ceremony-admin-agent/bundles/PREHANDOVER-<pr>-<slug>.md`',
                    '> Do not wait for CI to discover missing ECAP evidence.',
                  ] : [
                    '',
                    '> ✅ ECAP evidence artifacts are present. Ensure they are valid before posting a handover claim.',
                  ]),
                ] : [];

                const checkpointRequiredBody = [
                  CHECKPOINT_REQUIRED_MARKER,
                  '## ⏸️ CHECKPOINT REQUIRED — HANDOVER NOT YET ACCEPTED',
                  '',
                  `@copilot — PR #${prNumber} transitioned to \`ready_for_review\` (HEAD \`${headSha.slice(0, 12)}...\`) but no explicit handover/merge-ready claim has been posted yet${latestCurrentHeadCheckpointSuccessful ? ' and a current-head producer-side checkpoint result was already detected.' : ' and no current-head producer-side snapshot exists.'}`,
                  '',
                  '> **Classification**: `CHECKPOINT_REQUIRED` | `HANDOVER_NOT_ACCEPTED`',
                  '> This is a checkpoint advisory — the gate has not been triggered by an explicit handover/merge-ready claim. No hard failure is raised here.',
                  ...protectedPathSection,
                  '',
                  '> Before posting a handover/merge-ready claim, the ECAP agent (execution-ceremony-admin-agent) must:',
                  '> 1. Post `ECAP_PRE_HANDOVER_CHECKPOINT` or `PRE_HANDOVER_CHECKPOINT` as a PR comment to verify current-head CI state.',
                  '> 2. Produce the `ECAP_GATE_AND_ADMIN_REPORT` snapshot block with all required fields populated.',
                  '> 3. Set `HANDOVER_ALLOWED: yes` only when all required checks are green at the current HEAD SHA.',
                  '> 4. Then post a formal handover/merge-ready claim comment — the gate will evaluate it at that point.',
                  '',
                  '> See `governance/checklists/phase4-role-separation-operational-guidance.md` §6 for the required snapshot format.',
                  '',
                  `**HEAD SHA observed**: \`${headSha}\``,
                  `**Classification**: CHECKPOINT_REQUIRED | HANDOVER_NOT_ACCEPTED${ecapEvidenceMissing ? ' | STOP_AND_FIX (ECAP evidence missing)' : ''}`,
                  '**Authority**: CS2 (Johan Ras / @APGI-cmy) | Issue: maturion-isms#1542',
                ].join('\n');

                // Idempotency: update existing advisory comment if present, else create new.
                const existingAdvisory = existingComments
                  .filter(c => c.body && c.body.includes(CHECKPOINT_REQUIRED_MARKER))
                  .sort((a, b) => new Date(b.created_at) - new Date(a.created_at))[0];

                if (existingAdvisory) {
                  await github.rest.issues.updateComment({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    comment_id: existingAdvisory.id,
                    body: checkpointRequiredBody,
                  });
                  console.log(`Updated existing checkpoint advisory comment ${existingAdvisory.id}`);
                } else {
                  await github.rest.issues.createComment({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: prNumber,
                    body: checkpointRequiredBody,
                  });
                  console.log('Created checkpoint advisory comment');
                }

                console.log('CHECKPOINT_REQUIRED: bare ready_for_review with no explicit handover claim. Advisory posted. No hard failure.');
                return;
              }

              // Existing explicit handover claim found — treat ready_for_review as an active
              // handover gate trigger and enforce the full strict check.
              preconditionFailures.push('Handover trigger came from ready_for_review with an explicit handover/merge-ready claim in PR comments, but no ECAP_GATE_AND_ADMIN_REPORT snapshot block was present in the triggering event. Post a new handover claim comment that includes the full snapshot block (produced by the ECAP agent) to satisfy this precondition.');
            } else {
              if (missingSnapshotFields.length > 0) {
                preconditionFailures.push(`Missing required snapshot field(s): ${missingSnapshotFields.join(', ')}. The snapshot must be produced by the ECAP agent (execution-ceremony-admin-agent) from the ECAP_GATE_AND_ADMIN_REPORT output — not copied from a prior gate-bot blocked comment.`);
              }
              if (snapshotHead) {
                if (!/^[0-9a-f]{12,40}$/i.test(snapshotHead)) {
                  preconditionFailures.push(`CURRENT_HEAD_SHA (${snapshotHead}) must be a 12-40 char hex SHA.`);
                } else {
                  const normalizedSnapshotHead = snapshotHead.toLowerCase();
                  const normalizedHeadSha = headSha.toLowerCase();
                  const normalizedHeadPrefix = normalizedHeadSha.slice(0, normalizedSnapshotHead.length);
                  if (normalizedSnapshotHead !== normalizedHeadSha && normalizedSnapshotHead !== normalizedHeadPrefix) {
                    preconditionFailures.push(`CURRENT_HEAD_SHA (${snapshotHead}) does not match PR HEAD (${headSha}).`);
                  }
                }
              }
              if (!Number.isNaN(requiredChecksTotal) && requiredChecksTotal !== REQUIRED_CHECKS.length) {
                preconditionFailures.push(`REQUIRED_CHECKS_TOTAL (${requiredChecksTotal}) does not match enforced set (${REQUIRED_CHECKS.length}).`);
              }
              if (snapshotSignalsBlocked && !claimUsesBlockedLanguage) {
                preconditionFailures.push('Snapshot reports failing/pending/missing/stale checks, but claim is not HANDOVER_BLOCKED, STOP_AND_FIX, CS2_INTERVENTION_REQUIRED, or REJECTION_NOTICE.');
              }
              if (snapshotSignalsBlocked && snapshotAllowsHandover === true) {
                preconditionFailures.push('Snapshot reports failing/pending/missing/stale checks while HANDOVER_ALLOWED is yes.');
              }
              if (snapshotAllowsHandover === true && (failing.length > 0 || pending.length > 0 || missing.length > 0 || noChecksAtAll)) {
                preconditionFailures.push('HANDOVER_ALLOWED is yes but current gate snapshot is not fully green.');
              }
              if (snapshotAllowsHandover === false && !claimUsesBlockedLanguage) {
                preconditionFailures.push('HANDOVER_ALLOWED is no; handover claim must be STOP_AND_FIX, CS2_INTERVENTION_REQUIRED, REJECTION_NOTICE, or must not be posted. A snapshot with HANDOVER_ALLOWED: no is valid only as a HANDOVER_BLOCKED / STOP_AND_FIX / CS2_INTERVENTION_REQUIRED / REJECTION_NOTICE producer comment.');
              }
              if (snapshotChecksRun !== true && snapshotAllowsHandover === true) {
                preconditionFailures.push('LOCAL_OR_CURRENT_HEAD_CI_CHECKS_RUN must be yes while HANDOVER_ALLOWED is set to yes.');
              }
              if (snapshotCurrentHeadCiChecked !== true && snapshotAllowsHandover === true) {
                preconditionFailures.push('CURRENT_HEAD_CI_CHECKED must be yes while HANDOVER_ALLOWED is set to yes.');
              }
              if (snapshotMergeConflictChecked !== true && snapshotAllowsHandover === true) {
                preconditionFailures.push('MERGE_CONFLICT_CHECKED must be yes before HANDOVER_ALLOWED can be yes.');
              }
              if (snapshotMergeableWithBase !== true && snapshotAllowsHandover === true) {
                preconditionFailures.push('MERGEABLE_WITH_BASE must be yes before HANDOVER_ALLOWED can be yes.');
              }
              if (snapshotBaseSyncedOrConflictsResolved !== true && snapshotAllowsHandover === true) {
                preconditionFailures.push('BASE_SYNCED_OR_CONFLICTS_RESOLVED must be yes before HANDOVER_ALLOWED can be yes.');
              }
              if (snapshotAllowsHandover === true && !/^HANDOVER_ALLOWED$/i.test(snapshotResult)) {
                preconditionFailures.push(`RESULT (${snapshotResult || 'missing'}) must be HANDOVER_ALLOWED when HANDOVER_ALLOWED is yes.`);
              }
              if (snapshotAllowsHandover === false && !/^(STOP_AND_FIX|CS2_INTERVENTION_REQUIRED|REJECTED_BACK_TO_PRODUCER)$/i.test(snapshotResult)) {
                preconditionFailures.push(`RESULT (${snapshotResult || 'missing'}) must be STOP_AND_FIX, CS2_INTERVENTION_REQUIRED, or REJECTED_BACK_TO_PRODUCER when HANDOVER_ALLOWED is no.`);
              }
              if (/^CS2_INTERVENTION_REQUIRED$/i.test(snapshotResult)) {
                const hasConcreteBlocker = snapshotOutOfSandboxBlocker &&
                  !['none', 'n/a', 'na', 'not_applicable'].includes(snapshotOutOfSandboxBlocker.toLowerCase());
                if (!hasConcreteBlocker) {
                  preconditionFailures.push('CS2_INTERVENTION_REQUIRED requires a concrete OUT_OF_SANDBOX_OR_GOVERNANCE_BLOCKER reason.');
                }
              }
              if (snapshotEcapRequired !== null && snapshotEcapRequired !== expectedEcapRequired) {
                preconditionFailures.push(`ECAP_REQUIRED mismatch. Snapshot=${snapshot.ECAP_REQUIRED}, expected=${expectedEcapRequired ? 'yes' : 'no'}.`);
              }
              if (snapshotIaaRequired !== null && snapshotIaaRequired !== expectedIaaRequired) {
                preconditionFailures.push(`IAA_REQUIRED mismatch. Snapshot=${snapshot.IAA_REQUIRED}, expected=${expectedIaaRequired ? 'yes' : 'no'}.`);
              }
              if (expectedEcapRequired && snapshotEcapArtifactPresent !== true) {
                preconditionFailures.push('ECAP is required but ECAP_ARTIFACT_PRESENT is not yes.');
              }
              if (expectedIaaRequired && snapshotIaaArtifactPresent !== true) {
                preconditionFailures.push('IAA is required but IAA_ARTIFACT_PRESENT is not yes.');
              }
               if (!latestCurrentHeadCheckpointSuccessful) {
                 const latestCheckpointReason = latestCurrentHeadCheckpoint?.reasonValue;
                 preconditionFailures.push(
                   latestCheckpointReason
                     ? `Missing current-head PRE_HANDOVER_CHECKPOINT_RESULT with HANDOVER_ALLOWED: yes. Latest checkpoint says: ${latestCheckpointReason}`
                     : 'Missing current-head PRE_HANDOVER_CHECKPOINT_RESULT with HANDOVER_ALLOWED: yes.'
                 );
               }
               if (latestCurrentHeadCheckpointSuccessful && (failing.length > 0 || pending.length > 0 || missing.length > 0 || noChecksAtAll)) {
                 preconditionFailures.push('Checkpoint says handover allowed, but current required checks are not fully green.');
               }
              if (expectedEcapRequired && !hasEcapEvidenceByChecks) {
                preconditionFailures.push('ECAP precondition failed: preflight/ecap-admin-ceremony is not green for current HEAD.');
              }
              if (expectedIaaRequired && !hasIaaEvidenceByChecks) {
                preconditionFailures.push('IAA precondition failed: preflight/iaa-final-assurance is not green for current HEAD.');
              }
              // ── Injection compliance enforcement (§12 CS2 Injection Compliance) ──
              // For full-ceremony PRs (requires_ecap=true), the ECAP_GATE_AND_ADMIN_REPORT snapshot
              // MUST include injection compliance fields before claiming HANDOVER_ALLOWED: yes.
              // Authority: governance/checklists/phase4-role-separation-operational-guidance.md §12
              //            governance/templates/execution-ceremony-admin/PREHANDOVER.template.md §Injection Compliance
              //            maturion-isms#1648
              if (!isProductFix) {
                const injectionComplianceResult = readField(commentBody, 'INJECTION_COMPLIANCE_RESULT');
                const uncheckedRequiredItems = readField(commentBody, 'UNCHECKED_REQUIRED_ITEMS');
                const unauthorizedDeviations = readField(commentBody, 'UNAUTHORIZED_DEVIATIONS');
                if (!injectionComplianceResult) {
                  preconditionFailures.push('INJECTION_COMPLIANCE_RESULT field missing from snapshot. Before claiming HANDOVER_ALLOWED: yes, producers must extract CS2 injections and PR checklist items and classify each as completed/blocked/waived. See governance/checklists/phase4-role-separation-operational-guidance.md §12.');
                } else if (!/^COMPLIANT$/i.test(injectionComplianceResult.trim())) {
                  preconditionFailures.push(`INJECTION_COMPLIANCE_RESULT (${injectionComplianceResult}) is not COMPLIANT. Fix or block all CS2 injections and PR checklist items before claiming handover. See §12 CS2 Injection Compliance.`);
                }
                if (uncheckedRequiredItems && isNonEmptySignal(uncheckedRequiredItems)) {
                  preconditionFailures.push(`UNCHECKED_REQUIRED_ITEMS (${uncheckedRequiredItems}) must be none before handover. All required instructions must be classified as completed, blocked, or waived.`);
                }
                if (unauthorizedDeviations && isNonEmptySignal(unauthorizedDeviations)) {
                  preconditionFailures.push(`UNAUTHORIZED_DEVIATIONS (${unauthorizedDeviations}) must be none before handover. Unauthorized deviations must be resolved or waived by CS2.`);
                }
              }
            }

            // ── Corrective-action requirement after prior HANDOVER BLOCKED ────────
            const latestBlockedGateComment = existingComments
              .filter(c => c.body && c.body.includes(BLOCKED_MARKER))
              .sort((a, b) => new Date(b.updated_at || b.created_at) - new Date(a.updated_at || a.created_at))[0];
            if (isIssueComment && latestBlockedGateComment && commentCreatedAt) {
              const blockedAt = new Date(latestBlockedGateComment.updated_at || latestBlockedGateComment.created_at);
              if (commentCreatedAt > blockedAt) {
                const blockedHeadMatch = latestBlockedGateComment.body.match(/HEAD SHA verified:\s*`([0-9a-f]{7,40})`/i);
                const blockedHead = blockedHeadMatch ? blockedHeadMatch[1] : '';
                const headAdvanced = blockedHead && blockedHead !== headSha;
                const correctiveProducerComment = existingComments.some(c =>
                  c.user?.login === producerLogin &&
                  new Date(c.created_at) > blockedAt &&
                  (
                    /HANDOVER_BLOCKED|STOP_AND_FIX/i.test(c.body || '') ||
                    /CS2_INTERVENTION_REQUIRED/i.test(c.body || '') ||
                    REJECTION_NOTICE_REGEX.test(c.body || '')
                  )
                );
                if (!headAdvanced && !correctiveProducerComment) {
                  preconditionFailures.push(
                    `Previous handover block requires corrective commit (new HEAD SHA) or corrective comment from producing agent (${producerLogin}) before claim can be accepted.`
                  );
                }
              }
            }

            const isBlocked = failing.length > 0 || pending.length > 0 || missing.length > 0 || noChecksAtAll || preconditionFailures.length > 0;
            const staleEvidenceFound = preconditionFailures.some((entry) => /stale|does not match PR HEAD|older SHA/i.test(String(entry || '')));

            // ── Build comment body ────────────────────────────────────────────────
            let body;
            if (isBlocked) {
              const failLines = failing.map(f =>
                `- ❌ **${f.name}** — \`${f.conclusion}\`${f.url ? ` ([details](${f.url}))` : ''}`
              ).join('\n');
              const pendingLines = pending.map(p =>
                `- ⏳ **${p.name}** — \`${p.status}\`${p.url ? ` ([details](${p.url}))` : ''}`
              ).join('\n');
              const missingLines = noChecksAtAll
                ? '- ⚠️ No checks found for this SHA — CI workflow may not have run yet.'
                : missing.map(m => `- ⚠️ **${m.name}** — \`missing\` (never ran for this SHA)`).join('\n');

              const statusSummary = [
                failing.length > 0 ? `**Failing checks (${failing.length}):**\n${failLines}` : null,
                pending.length > 0 ? `**Pending checks (${pending.length}):**\n${pendingLines}` : null,
                (missing.length > 0 || noChecksAtAll) ? `**Missing checks (${noChecksAtAll ? 'all' : missing.length}):**\n${missingLines}` : null,
              ].filter(Boolean).join('\n\n');
              const preconditionSummary = preconditionFailures.length > 0
                ? `**Handover precondition failures (${preconditionFailures.length}):**\n${preconditionFailures.map(x => `- ❌ ${x}`).join('\n')}`
                : null;
              const currentHeadSnapshot = [
                `- CURRENT_HEAD_SHA: ${headSha}`,
                `- LOCAL_OR_CURRENT_HEAD_CI_CHECKS_RUN: ${noChecksAtAll ? 'no' : 'yes'}`,
                `- REQUIRED_CHECKS_TOTAL: ${REQUIRED_CHECKS.length}`,
                `- PASSING_CHECKS: ${passing.length}`,
                `- FAILING_CHECKS: ${failing.length > 0 ? failing.map(f => f.name).join(', ') : 'none'}`,
                `- PENDING_CHECKS: ${pending.length > 0 ? pending.map(p => p.name).join(', ') : 'none'}`,
                `- MISSING_CHECKS: ${(missing.length > 0 || noChecksAtAll) ? (noChecksAtAll ? 'all' : missing.map(m => m.name).join(', ')) : 'none'}`,
                `- STALE_EVIDENCE_FOUND: ${staleEvidenceFound ? 'yes' : 'no'}`,
                `- ECAP_REQUIRED: ${requiresEcap ? 'yes' : 'no'}`,
                `- ECAP_ARTIFACT_PRESENT: ${requiresEcap ? (hasEcapEvidenceByChecks ? 'yes' : 'no') : 'not_applicable'}`,
                `- IAA_REQUIRED: ${requiresIaa ? 'yes' : 'no'}`,
                `- IAA_ARTIFACT_PRESENT: ${requiresIaa ? (hasIaaEvidenceByChecks ? 'yes' : 'no') : 'not_applicable'}`,
                `- INJECTION_COMPLIANCE_RESULT: ${isProductFix ? 'not_required' : (readField(commentBody, 'INJECTION_COMPLIANCE_RESULT') || 'missing')}`,
                `- UNCHECKED_REQUIRED_ITEMS: ${isProductFix ? 'not_required' : (readField(commentBody, 'UNCHECKED_REQUIRED_ITEMS') || 'not_provided')}`,
                `- UNAUTHORIZED_DEVIATIONS: ${isProductFix ? 'not_required' : (readField(commentBody, 'UNAUTHORIZED_DEVIATIONS') || 'not_provided')}`,
                 `- HANDOVER_ALLOWED: no`,
                 `- RESULT: STOP_AND_FIX`,
                 `- CHECKPOINT_REQUIRED: yes`,
                 `- CHECKPOINT_PRESENT_FOR_CURRENT_HEAD: ${latestCurrentHeadCheckpointSuccessful ? 'yes' : 'no'}`,
              ].join('\n');

              body = [
                `${BLOCKED_MARKER}`,
                '## 🚫 HANDOVER BLOCKED',
                '',
                `@copilot — A handover/merge-ready claim was detected on PR #${prNumber}, but the following required checks on HEAD \`${headSha.slice(0, 12)}...\` are **not green**:`,
                '',
                [statusSummary, preconditionSummary].filter(Boolean).join('\n\n'),
                '',
                '> **A PR cannot claim handover or merge-ready while any required check is red, pending, or missing.**',
                '> **A PR also cannot claim handover without a successful current-head PRE_HANDOVER_CHECKPOINT_RESULT.**',
                '> Fix all failing checks, wait for pending checks to complete, and ensure all required checks have run before re-claiming handover.',
                '> Deliberate path: comment `ECAP_PRE_HANDOVER_CHECKPOINT`, `PRE_HANDOVER_CHECKPOINT`, or `/prepare-handover` first.',
                '> If this gate already blocked previously, post a corrective producer comment (HANDOVER_BLOCKED / STOP_AND_FIX / CS2_INTERVENTION_REQUIRED / REJECTION_NOTICE) or push a corrective commit before the next claim.',
                '',
                '> ⚠️  **Producer-side snapshot requirement**: The snapshot block in your handover claim comment must be produced by the ECAP agent (execution-ceremony-admin-agent) as part of the `ECAP_GATE_AND_ADMIN_REPORT` output. Do NOT copy it from this gate-bot response. `HANDOVER_ALLOWED: yes` must reflect a genuine all-green snapshot at the current HEAD SHA — set it only after verifying all required checks are green. See `governance/checklists/phase4-role-separation-operational-guidance.md` §6.',
                '',
                isProductFix
                  ? `> ℹ️  This is a **product-fix PR** (\`type: ${prType}\`, \`requires_iaa: false\`, \`requires_ecap: false\`). No PREHANDOVER/IAA/ECAP ceremony is required — only CI must be green.`
                  : '> ⚠️  This PR requires IAA/ECAP ceremony artifacts in addition to green CI. ECAP_GATE_AND_ADMIN_REPORT must include `INJECTION_COMPLIANCE_RESULT: COMPLIANT`, `UNCHECKED_REQUIRED_ITEMS: none`, and `UNAUTHORIZED_DEVIATIONS: none` before claiming handover. See `governance/checklists/phase4-role-separation-operational-guidance.md` §12.',
                '',
                `**HEAD SHA verified**: \`${headSha}\``,
                `**Passing checks**: ${passing.length}`,
                '',
                '**Current-head gate snapshot (authoritative — for reference only; reproduce independently in your claim):**',
                currentHeadSnapshot,
                '**Authority**: CS2 (Johan Ras / @APGI-cmy) | Issue: maturion-isms#1542',
              ].join('\n');
            } else {
              const currentHeadSnapshot = [
                `- CURRENT_HEAD_SHA: ${headSha}`,
                `- LOCAL_OR_CURRENT_HEAD_CI_CHECKS_RUN: yes`,
                `- REQUIRED_CHECKS_TOTAL: ${REQUIRED_CHECKS.length}`,
                `- PASSING_CHECKS: ${passing.length}`,
                '- FAILING_CHECKS: none',
                '- PENDING_CHECKS: none',
                '- MISSING_CHECKS: none',
                '- STALE_EVIDENCE_FOUND: no',
                `- ECAP_REQUIRED: ${requiresEcap ? 'yes' : 'no'}`,
                `- ECAP_ARTIFACT_PRESENT: ${requiresEcap ? (hasEcapEvidenceByChecks ? 'yes' : 'no') : 'not_applicable'}`,
                `- IAA_REQUIRED: ${requiresIaa ? 'yes' : 'no'}`,
                `- IAA_ARTIFACT_PRESENT: ${requiresIaa ? (hasIaaEvidenceByChecks ? 'yes' : 'no') : 'not_applicable'}`,
                `- INJECTION_COMPLIANCE_RESULT: ${isProductFix ? 'not_required' : (readField(commentBody, 'INJECTION_COMPLIANCE_RESULT') || 'COMPLIANT')}`,
                `- UNCHECKED_REQUIRED_ITEMS: ${isProductFix ? 'not_required' : (readField(commentBody, 'UNCHECKED_REQUIRED_ITEMS') || 'none')}`,
                `- UNAUTHORIZED_DEVIATIONS: ${isProductFix ? 'not_required' : (readField(commentBody, 'UNAUTHORIZED_DEVIATIONS') || 'none')}`,
                 '- HANDOVER_ALLOWED: yes',
                 '- RESULT: HANDOVER_ALLOWED',
                 '- CHECKPOINT_REQUIRED: yes',
                 '- CHECKPOINT_PRESENT_FOR_CURRENT_HEAD: yes',
              ].join('\n');
              body = [
                `${OK_MARKER}`,
                '## ✅ HANDOVER CLAIM ACKNOWLEDGED',
                '',
                `@copilot — All current-head checks on HEAD \`${headSha.slice(0, 12)}...\` are green (${passing.length} passing).`,
                '',
                isProductFix
                  ? `> ℹ️  This is a **product-fix PR** (\`type: ${prType}\`, \`requires_iaa: false\`, \`requires_ecap: false\`). CI is green — handover is unblocked.`
                   : '> ✅ CI checks are green and a successful current-head PRE_HANDOVER_CHECKPOINT_RESULT exists. Ensure PREHANDOVER proof and IAA token artifacts are committed before merge.',
                '',
                '> ℹ️  The snapshot block you included in your claim was validated as the required producer-side format (ECAP_GATE_AND_ADMIN_REPORT). Foreman must confirm HANDOVER_ALLOWED: yes before accepting handover.',
                '',
                `**HEAD SHA verified**: \`${headSha}\``,
                '',
                '**Current-head gate snapshot (authoritative):**',
                currentHeadSnapshot,
                '**Authority**: CS2 (Johan Ras / @APGI-cmy) | Issue: maturion-isms#1542',
              ].join('\n');
            }

            // ── Idempotency guard: edit existing gate comment if present ─────────
            // Avoids comment spam when the same PR triggers the gate multiple times.
            const existingGateComment = existingComments
              .filter(c => GATE_MARKERS.some(m => c.body && c.body.includes(m)))
              .sort((a, b) => new Date(b.created_at) - new Date(a.created_at))[0];

            if (existingGateComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existingGateComment.id,
                body,
              });
              console.log(`Updated existing gate comment ${existingGateComment.id}`);
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body,
              });
              console.log('Created new gate comment');
            }

            // Only hard-fail (core.setFailed) for deliberate final handover claims.
            // For pull_request_target: ready_for_review events the gate posts the
            // advisory comment but does not block CI — required checks may not have
            // run yet when the PR is first marked ready. Hard-block only when the
            // producer explicitly posts a snapshot-based claim comment.
            const finalHandoverClaim =
              isIssueComment && (
                /ECAP_GATE_AND_ADMIN_REPORT/i.test(commentBody) ||
                /HANDOVER_ALLOWED:\s*yes/i.test(commentBody) ||
                /\/claim-handover\b/i.test(commentBody)
              );

            if (isBlocked && finalHandoverClaim) {
              // Update/create gate comment first so the reason is visible,
              // then fail the workflow job to enforce the gate as a hard CI check.
              core.setFailed(
                [
                  'HANDOVER BLOCKED:',
                  failing.length > 0 ? `${failing.length} failing` : null,
                  pending.length > 0 ? `${pending.length} pending` : null,
                  (missing.length > 0 || noChecksAtAll) ? `${noChecksAtAll ? 'all' : missing.length} missing` : null,
                  `check(s) on HEAD ${headSha.slice(0, 12)}.`,
                ].filter(Boolean).join(' ')
              );
            }
