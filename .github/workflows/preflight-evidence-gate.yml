name: Preflight Evidence Gate

# Authority: LIVING_AGENT_SYSTEM.md v6.2.0, AGENT_PREFLIGHT_PATTERN.md v1.0.0
# Purpose: Block PRs from agent-driven work unless the active agent's session memory
#          contains a non-empty phase_1_preflight evidence block.
#          Also enforces IAA Pre-Brief gate per IAA_PRE_BRIEF_PROTOCOL.md v1.2.0:
#          wave-current-tasks.md must exist AND an iaa-prebrief-*.md must exist in
#          .agent-admin/assurance/ before any foreman PR may be merged.
# Violation class: GOV-BREACH-AIMC-W5-002 (preflight skip)
#                  HALT-008 (pre-brief or wave tasks absent before file-write/PR open)
# Assignee: Copilot (automation script / CI infra update)

on:
  # Changed back to pull_request so the workflow runs from the PR head branch (not main),
  # ensuring regex fixes and other in-PR workflow changes are exercised by CI.
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

jobs:
  preflight-evidence-check:
    name: "preflight/phase-1-evidence"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Check for Phase 1 Preflight Evidence
        id: preflight_check
        env:
          PR_LABELS: ${{ join(github.event.pull_request.labels.*.name, ',') }}
          PR_BRANCH: ${{ github.event.pull_request.head.ref }}
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          echo "=== Phase 1 Preflight Evidence Gate ==="
          echo "Authority: LIVING_AGENT_SYSTEM.md v6.2.0"
          echo "Violation class: GOV-BREACH-AIMC-W5-002 (preflight skip)"
          echo ""

          # ----------------------------------------------------------------
          # Automated governance alignment PRs are pre-validated — bypass
          # ----------------------------------------------------------------

          if [[ ( "$PR_LABELS" == *"governance"* && "$PR_LABELS" == *"automated"* && "$PR_LABELS" == *"agent:liaison"* ) || \
               "$PR_BRANCH" == "governance-alignment-auto" ]]; then
            echo "✅ Automated governance alignment PR detected — bypassing preflight gate."
            exit 0
          fi

          # ----------------------------------------------------------------
          # Detect which agent submitted this PR (from labels or PR body)
          # ----------------------------------------------------------------
          AGENT_ID="unknown"
          KNOWN_AGENTS=(
            "foreman-v2-agent"
            "CodexAdvisor-agent"
            "api-builder"
            "qa-builder"
            "schema-builder"
            "ui-builder"
            "integration-builder"
            "maturion-agent"
            "mat-specialist"
            "pit-specialist"
            "governance-liaison-isms-agent"
            "independent-assurance-agent"
            "report-writer-agent"
            "risk-platform-agent"
            "maturity-scoring-agent"
            "criteria-generator-agent"
            "document-parser-agent"
          )

          # Check labels first
          for agent in "${KNOWN_AGENTS[@]}"; do
            if [[ "$PR_LABELS" == *"agent:${agent}"* ]] || [[ "$PR_LABELS" == *"${agent}"* ]]; then
              AGENT_ID="$agent"
              break
            fi
          done

          # If not found via labels, check PR body for agent signature
          if [[ "$AGENT_ID" == "unknown" ]]; then
            for agent in "${KNOWN_AGENTS[@]}"; do
              if echo "$PR_BODY" | grep -qi "$agent"; then
                AGENT_ID="$agent"
                break
              fi
            done
          fi

          echo "Detected agent: $AGENT_ID"
          echo ""

          # ----------------------------------------------------------------
          # If no agent detected, check whether ANY session memory file
          # exists with phase_1_preflight evidence (covers unlabelled PRs)
          # ----------------------------------------------------------------
          EVIDENCE_FOUND=false

          if [[ "$AGENT_ID" == "unknown" ]]; then
            echo "ℹ️  Agent identity not detected from PR labels or body."
            echo "    Searching all session memory files for phase_1_preflight evidence..."
            echo ""

            if find .agent-workspace -name "session-*.md" 2>/dev/null | xargs grep -qliE "phase_1_preflight|Phase 1.*[Cc]omplete|PREFLIGHT COMPLETE|PREFLIGHT.*PASS|preflight.*evidence|Phase 1 output" 2>/dev/null; then
              EVIDENCE_FOUND=true
              echo "✅ Phase 1 preflight evidence found in at least one session memory file."
            else
              echo "ℹ️  No session memory files found with phase_1_preflight evidence."
              echo "    This PR does not appear to be an agent-driven work PR."
              echo "    Skipping preflight gate (non-agent PR)."
              exit 0
            fi
          else
            # ----------------------------------------------------------------
            # Agent identified — look in its session memory directory
            # ----------------------------------------------------------------
            MEMORY_DIR=".agent-workspace/${AGENT_ID}/memory"
            echo "Session memory directory: $MEMORY_DIR"
            echo ""

            if [ ! -d "$MEMORY_DIR" ]; then
              echo "⚠️  Session memory directory not found: $MEMORY_DIR"
              echo "    This may be a new agent or the session memory was not committed."
              echo "ℹ️  Falling back to broad search across all session memory files..."
              echo ""
            fi

            # Search in agent-specific directory first, then fall back to broader search
            SEARCH_PATHS="$MEMORY_DIR"
            if [ ! -d "$MEMORY_DIR" ]; then
              SEARCH_PATHS=".agent-workspace"
            fi

            if find "$SEARCH_PATHS" -name "session-*.md" 2>/dev/null | \
               xargs grep -qliE "phase_1_preflight|Phase 1.*[Cc]omplete|PREFLIGHT COMPLETE|PREFLIGHT.*PASS|preflight.*evidence|Phase 1 output" 2>/dev/null; then
              EVIDENCE_FOUND=true
            fi
          fi

          # ----------------------------------------------------------------
          # Evaluate result
          # ----------------------------------------------------------------
          echo "=== Phase 1 Preflight Evidence Check Result ==="
          echo ""

          if [ "$EVIDENCE_FOUND" = true ]; then
            echo "✅ PASS — Phase 1 preflight evidence found in session memory."
            echo ""
            echo "Per AGENT_PREFLIGHT_PATTERN.md v1.0.0:"
            echo "  - Agent completed Phase 1 before submitting this PR."
            echo "  - Preflight compliance confirmed."
          else
            echo "❌ FAIL — No Phase 1 preflight evidence found in session memory."
            echo ""
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo ""
            echo "🚨 GOV-BREACH-AIMC-W5-002 — PREFLIGHT SKIP DETECTED"
            echo ""
            echo "Every agent-driven PR must include a session memory file at:"
            echo "  .agent-workspace/<agent-id>/memory/session-NNN-YYYYMMDD.md"
            echo ""
            echo "The session memory must contain a non-empty phase_1_preflight"
            echo "evidence block proving Phase 1 was executed before any work began."
            echo ""
            echo "Required evidence in session memory (any of):"
            echo "  - 'phase_1_preflight: ...' field with non-empty value"
            echo "  - 'PREFLIGHT COMPLETE' declaration"
            echo "  - 'Phase 1 output:' section with declared evidence"
            echo ""
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo ""
            echo "Action Required:"
            echo "  1. Complete Phase 1 of your agent contract IN FULL."
            echo "  2. Record Phase 1 evidence output in your session memory file."
            echo "  3. Commit the updated session memory file to this PR."
            echo "  4. Push to re-trigger CI validation."
            echo ""
            echo "Reference:"
            echo "  - LIVING_AGENT_SYSTEM.md v6.2.0"
            echo "  - AGENT_PREFLIGHT_PATTERN.md v1.0.0"
            echo "  - copilot-instructions.md (repo-root enforcement)"
            echo ""
            exit 1
          fi


  iaa-prebrief-check:
    name: "preflight/iaa-prebrief-existence"
    runs-on: ubuntu-latest

    # Only enforce for Copilot/foreman PRs: branches starting with 'copilot/'
    # or PRs authored by the Copilot bot
    if: >-
      startsWith(github.head_ref, 'copilot/') ||
      github.event.pull_request.user.login == 'Copilot'

    steps:
      - name: Checkout PR head branch
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 1

      - name: Check IAA Pre-Brief and Wave Tasks existence (HALT-008)
        id: prebrief_check
        run: |
          echo "=== IAA Pre-Brief Existence Gate (HALT-008) ==="
          echo "Authority: IAA_PRE_BRIEF_PROTOCOL.md v1.2.0"
          echo "Violation class: HALT-008 (prebrief_or_wavetasks_absent)"
          echo ""

          FAIL=false

          # ----------------------------------------------------------------
          # Check 1: wave-current-tasks.md must exist on this branch
          # ----------------------------------------------------------------
          WAVE_TASKS_PATH=".agent-workspace/foreman-v2/personal/wave-current-tasks.md"
          if [ -f "$WAVE_TASKS_PATH" ]; then
            echo "✅ wave-current-tasks.md found at: $WAVE_TASKS_PATH"
          else
            echo "❌ MISSING: $WAVE_TASKS_PATH"
            FAIL=true
          fi

          # ----------------------------------------------------------------
          # Check 2: iaa-prebrief-*.md OR iaa-wave-record-*.md (with ## PRE-BRIEF
          #          section) must exist in .agent-admin/assurance/
          # ----------------------------------------------------------------
          ASSURANCE_DIR=".agent-admin/assurance"
          PREBRIEF_FOUND=false
          PREBRIEF_PATH=""
          if [ -d "$ASSURANCE_DIR" ]; then
            # Legacy pattern: standalone iaa-prebrief-*.md
            while IFS= read -r -d '' f; do
              if ! grep -qi "SUPERSEDED" "$f" 2>/dev/null; then
                PREBRIEF_FOUND=true
                PREBRIEF_PATH="$f"
                break
              fi
            done < <(find "$ASSURANCE_DIR" -name "iaa-prebrief-*.md" -print0 2>/dev/null)

            # New pattern (PR #1348): iaa-wave-record-*.md with ## PRE-BRIEF section
            if [ "$PREBRIEF_FOUND" = false ]; then
              while IFS= read -r -d '' f; do
                if grep -q "## PRE-BRIEF" "$f" 2>/dev/null && \
                   ! grep -qi "SUPERSEDED" "$f" 2>/dev/null; then
                  PREBRIEF_FOUND=true
                  PREBRIEF_PATH="$f"
                  break
                fi
              done < <(find "$ASSURANCE_DIR" -name "iaa-wave-record-*.md" -print0 2>/dev/null)
            fi
          fi

          if $PREBRIEF_FOUND; then
            echo "✅ IAA Pre-Brief artifact found at: $PREBRIEF_PATH"
          else
            echo "❌ MISSING: No active iaa-prebrief-*.md or iaa-wave-record-*.md (with ## PRE-BRIEF) in $ASSURANCE_DIR"
            FAIL=true
          fi

          # ----------------------------------------------------------------
          # Check 3: iaa_prebrief_path field in wave-current-tasks.md must
          #          not be PENDING (if the file exists)
          # ----------------------------------------------------------------
          if [ -f "$WAVE_TASKS_PATH" ]; then
            if grep -q "iaa_prebrief_path:.*PENDING" "$WAVE_TASKS_PATH" 2>/dev/null; then
              echo "❌ iaa_prebrief_path is still PENDING in $WAVE_TASKS_PATH"
              FAIL=true
            elif grep -qE "iaa_prebrief_path:|iaa_wave_record_path:" "$WAVE_TASKS_PATH" 2>/dev/null; then
              PREBRIEF_FIELD=$(grep -E "iaa_prebrief_path:|iaa_wave_record_path:" "$WAVE_TASKS_PATH" | head -1)
              echo "✅ Pre-Brief/wave-record path field resolved: $PREBRIEF_FIELD"
            else
              echo "⚠️  Neither iaa_prebrief_path nor iaa_wave_record_path found in $WAVE_TASKS_PATH"
              echo "   Add iaa_prebrief_path or iaa_wave_record_path per IAA_PRE_BRIEF_PROTOCOL.md v1.2.0"
              FAIL=true
            fi
          fi

          echo ""
          echo "=== IAA Pre-Brief Gate Result ==="
          echo ""

          if [ "$FAIL" = true ]; then
            echo "❌ FAIL — IAA Pre-Brief gate: HALT-008"
            echo ""
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo ""
            echo "🚨 HALT-008 — PRE-BRIEF GATE FAILED"
            echo ""
            echo "Before any file-write, report_progress, or PR open, Foreman MUST verify:"
            echo "  (a) wave-current-tasks.md exists at: .agent-workspace/foreman-v2/personal/wave-current-tasks.md"
            echo "  (b) iaa-prebrief-*.md exists in: .agent-admin/assurance/"
            echo "  (c) iaa_prebrief_path field in wave-current-tasks.md is NOT PENDING"
            echo ""
            echo "Per IAA_PRE_BRIEF_PROTOCOL.md v1.2.0:"
            echo "  - PHASE_A_ADVISORY is abolished. There is no IAA-unavailable bypass."
            echo "  - If IAA is unavailable, HALT and notify CS2 (@APGI-cmy) via issue comment."
            echo "  - No Pre-Brief = no build actions."
            echo ""
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo ""
            exit 1
          else
            echo "✅ PASS — IAA Pre-Brief gate passed. All pre-brief artifacts present."
            echo ""
            echo "Per IAA_PRE_BRIEF_PROTOCOL.md v1.2.0 and foreman-v2-agent.md HALT-008."
          fi

  iaa-token-self-cert-check:
    name: "preflight/iaa-token-self-certification"
    runs-on: ubuntu-latest

    # Only enforce for Copilot/foreman PRs
    if: >-
      startsWith(github.head_ref, 'copilot/') ||
      github.event.pull_request.user.login == 'Copilot'

    steps:
      - name: Checkout PR head branch
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Check IAA token self-certification guard
        id: token_self_cert_check
        run: |
          echo "=== IAA Token Self-Certification Guard ==="
          echo "Authority: IAA_PRE_BRIEF_PROTOCOL.md v1.2.0 §IAA Token Self-Certification Guard"
          echo ""

          ASSURANCE_DIR=".agent-admin/assurance"
          BASE_SHA="${{ github.event.pull_request.base.sha }}"

          # Scope check to token files that are NEW in this PR (not pre-existing in base)
          # This prevents retroactive failures on historical token files that pre-date this check
          TOKEN_FILES=$(git diff "$BASE_SHA" HEAD --name-only --diff-filter=A 2>/dev/null \
            | grep "^${ASSURANCE_DIR}/iaa-token-.*\.md$" | head -20)

          if [ -z "$TOKEN_FILES" ]; then
            echo "ℹ️  No new IAA token files added in this PR — skipping self-cert check."
            echo "   (Token check is only enforced for token files introduced by this PR.)"
            exit 0
          fi

          FAIL=false
          while IFS= read -r token_file; do
            echo "Checking token file: $token_file"

            # Skip REJECTION-PACKAGE files — they are not PASS tokens and do not carry PHASE_B_BLOCKING_TOKEN
            if head -10 "$token_file" 2>/dev/null | grep -qi "REJECTION.PACKAGE\|REJECTION-PACKAGE"; then
              echo "  ⏭️  REJECTION-PACKAGE file — skipping PHASE_B_BLOCKING_TOKEN check"
              continue
            fi

            # Check 1: PHASE_B_BLOCKING_TOKEN field must be present and non-empty
            if grep -q "PHASE_B_BLOCKING_TOKEN:" "$token_file" 2>/dev/null; then
              TOKEN_VALUE=$(grep "PHASE_B_BLOCKING_TOKEN:" "$token_file" | head -1 | sed 's/.*PHASE_B_BLOCKING_TOKEN://;s/^[[:space:]]*//;s/[[:space:]]*$//')
              if [ -z "$TOKEN_VALUE" ]; then
                echo "  ❌ PHASE_B_BLOCKING_TOKEN field is EMPTY or whitespace-only in $token_file — IAA-SELF-CERT-001"
                FAIL=true
              elif [ "$TOKEN_VALUE" = "PENDING" ]; then
                echo "  ❌ PHASE_B_BLOCKING_TOKEN is PENDING in $token_file — IAA-SELF-CERT-002"
                FAIL=true
              else
                echo "  ✅ PHASE_B_BLOCKING_TOKEN present and non-empty, value: $TOKEN_VALUE"
              fi
            else
              echo "  ❌ PHASE_B_BLOCKING_TOKEN field MISSING from $token_file — IAA-SELF-CERT-001"
              FAIL=true
            fi

            # Check 2: Token must not be PHASE_A_ADVISORY
            if grep -q "PHASE_A_ADVISORY" "$token_file" 2>/dev/null; then
              echo "  ❌ Token contains PHASE_A_ADVISORY — IAA-PHASE-A-BYPASS-001"
              FAIL=true
            else
              echo "  ✅ No PHASE_A_ADVISORY in token file"
            fi

          done <<< "$TOKEN_FILES"

          echo ""
          if [ "$FAIL" = true ]; then
            echo "❌ FAIL — IAA token self-certification guard failed"
            echo ""
            echo "Violation: IAA-SELF-CERT-001, IAA-SELF-CERT-002 or IAA-PHASE-A-BYPASS-001"
            echo "The IAA token file must contain a PHASE_B_BLOCKING_TOKEN field (non-empty, not PENDING)."
            echo "This field is only contractually producible by the IAA."
            echo "Its absence, a PENDING value, or a PHASE_A_ADVISORY value indicates self-authoring."
            echo ""
            exit 1
          else
            echo "✅ PASS — All IAA token files pass self-certification guard."
          fi

  hfmc-ripple-presence-check:
    name: "preflight/hfmc-ripple-presence"
    runs-on: ubuntu-latest

    # Enforce on Copilot/foreman PRs — the same scope as other ceremony checks
    if: >-
      startsWith(github.head_ref, 'copilot/') ||
      github.event.pull_request.user.login == 'Copilot'

    steps:
      - name: Checkout PR head branch
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: HFMC-01 — Ripple/Cross-Agent Assessment presence check
        id: hfmc01_check
        shell: bash
        run: |
          echo "=== HFMC-01: Ripple/Cross-Agent Assessment Presence Gate ==="
          echo "Authority: iaa-high-frequency-checks.md v2.1.0 (HFMC-01)"
          echo "Anti-pattern: AAP-20 (execution-ceremony-admin-anti-patterns.md v1.3.0)"
          echo "IAA trigger: ACR-14 (INDEPENDENT_ASSURANCE_AGENT_CANON.md v1.8.0)"
          echo ""

          PROOF_DIR=".agent-admin/prehandover"
          FAIL=false
          BASE_SHA="${{ github.event.pull_request.base.sha }}"

          # ----------------------------------------------------------------
          # Discover PREHANDOVER proof files added or modified in this PR only.
          # Historical proofs already on the base branch are excluded — they
          # were valid under the pre-HFMC-01 rules and are immutable audit
          # artifacts. Only the active/current proof set introduced by this PR
          # is subject to the new mandatory Ripple/Cross-Agent Assessment check.
          #
          # Use the base commit SHA (not a remote-tracking branch name) so the
          # diff works reliably regardless of how actions/checkout fetches refs.
          # ----------------------------------------------------------------
          PROOF_FILES=$(git diff --name-only --diff-filter=AM \
            "${BASE_SHA}...HEAD" 2>/dev/null | \
            grep "^${PROOF_DIR}/proof-.*\.md$" | sort || true)

          if [ -z "${PROOF_FILES}" ]; then
            echo "ℹ️  No PREHANDOVER proof files added or modified by this PR."
            echo "   HFMC-01 check: skipped (no active proof files in diff)."
            exit 0
          fi

          echo "PR-introduced/modified proof files to check:"
          echo "${PROOF_FILES}" | while IFS= read -r f; do echo "  - ${f}"; done
          echo ""

          # ----------------------------------------------------------------
          # For each proof file, check that:
          #   1. A '## Ripple' or '## Cross-Agent' heading exists
          #   2. The section contains at least one concrete impact conclusion
          #      row — a table data row that is not a header, separator, or
          #      a row made entirely of placeholder cells like [text].
          # Superseded proofs (those cited by a "Supersedes:" line in another
          # proof) are exempt from this check — they are immutable pre-token
          # artifacts retained for audit trail only.
          # ----------------------------------------------------------------

          # Build superseded set
          SUPERSEDED_FILES=()
          while IFS= read -r proof; do
            while IFS= read -r superseded_name; do
              [ -n "${superseded_name}" ] && SUPERSEDED_FILES+=("${PROOF_DIR}/${superseded_name}")
            done < <(grep -oP '(?i)(?<=Supersedes: )\S+' "${proof}" 2>/dev/null || true)
          done <<< "${PROOF_FILES}"

          MISSING_SECTION=()
          BLANK_SECTION=()

          while IFS= read -r proof; do
            # Skip superseded proofs
            IS_SUPERSEDED=false
            for s in "${SUPERSEDED_FILES[@]}"; do
              [ "${proof}" = "${s}" ] && IS_SUPERSEDED=true && break
            done
            [ "${IS_SUPERSEDED}" = "true" ] && continue

            echo "Checking: ${proof}"

            # Check 1: Heading presence
            if ! grep -qiE "^## Ripple|^## Cross-Agent" "${proof}" 2>/dev/null; then
              echo "  ❌ MISSING: '## Ripple/Cross-Agent Assessment' section heading not found"
              MISSING_SECTION+=("${proof}")
              FAIL=true
              continue
            fi

            # Check 2: Section contains at least one concrete impact conclusion row.
            # A concrete DATA row must appear AFTER the table separator row
            # (e.g. |---|---|---|). This correctly excludes:
            #   - the header row (which precedes the separator)
            #   - the separator row itself
            #   - rows consisting entirely of placeholder cells (| [x] | [x] |)
            # A section with only a heading, a header row, and a separator row
            # (scaffold rows) will FAIL this gate.
            HEADING_LINE=$(grep -niE "^## Ripple|^## Cross-Agent" "${proof}" 2>/dev/null | head -1 | cut -d: -f1)
            CONCRETE_ROW=""
            if [ -n "${HEADING_LINE}" ]; then
              SECTION=$(tail -n "+$((HEADING_LINE + 1))" "${proof}" 2>/dev/null | awk '/^## / { exit } { print }')
              # Find the separator row (|---|---|---| or |:---|:---:|---| etc.)
              SEP_LINE=$(echo "${SECTION}" | grep -nE '^\|[[:space:]:-][|: -]*\|' | head -1 | cut -d: -f1 || true)
              if [ -n "${SEP_LINE}" ]; then
                # Data rows come after the separator; exclude all-placeholder rows
                CONCRETE_ROW=$(echo "${SECTION}" | \
                  tail -n "+$((SEP_LINE + 1))" | \
                  grep -E '^\|' | \
                  grep -vP '^\|(\s*\[[^\]]*\]\s*\|)+\s*$' | \
                  head -1 || true)
              fi
            fi

            if [ -z "${CONCRETE_ROW}" ]; then
              echo "  ❌ INSUFFICIENT: '## Ripple/Cross-Agent Assessment' section has no concrete impact conclusion row"
              echo "     (Table headers, separator rows, and placeholder-only rows do not count.)"
              BLANK_SECTION+=("${proof}")
              FAIL=true
            else
              echo "  ✅ Section present with concrete impact conclusion row"
            fi
          done <<< "${PROOF_FILES}"

          echo ""
          echo "=== HFMC-01 Result ==="
          echo ""

          if [ "${FAIL}" = "true" ]; then
            echo "❌ FAIL — HFMC-01: Ripple/Cross-Agent Assessment presence check FAILED"
            echo ""
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo ""
            echo "🚨 HFMC-01 / AAP-20 / ACR-14 — RIPPLE SECTION MISSING OR INSUFFICIENT"
            echo ""
            if [ ${#MISSING_SECTION[@]} -gt 0 ]; then
              echo "Proof files missing '## Ripple/Cross-Agent Assessment' section:"
              for f in "${MISSING_SECTION[@]}"; do echo "  - ${f}"; done
              echo ""
            fi
            if [ ${#BLANK_SECTION[@]} -gt 0 ]; then
              echo "Proof files with no concrete impact conclusion row in '## Ripple/Cross-Agent Assessment':"
              for f in "${BLANK_SECTION[@]}"; do echo "  - ${f}"; done
              echo ""
            fi
            echo "Every PREHANDOVER proof introduced by this PR MUST contain this section with at"
            echo "least one concrete impact conclusion row. Table headers, separator rows, and rows"
            echo "consisting entirely of placeholder cells (e.g. | [text] | [text] |) do not count."
            echo ""
            echo "Required section format (at least one concrete data row required):"
            echo "  ## Ripple/Cross-Agent Assessment"
            echo "  | Agent / System | Change Scope Assessed | Impact Conclusion |"
            echo "  |---|---|---|"
            echo "  | foreman-v2-agent | governance canon files | NO IMPACT — ceremony-only wave |"
            echo "  **Downstream ripple conclusion**: NO IMPACT — governance/ceremony artifacts only"
            echo ""
            echo "If this wave contains no code/schema/API/contract changes:"
            echo "  State: 'NO IMPACT — governance/ceremony artifacts only, no downstream effect'"
            echo ""
            echo "References:"
            echo "  - iaa-high-frequency-checks.md v2.1.0 HFMC-01"
            echo "  - execution-ceremony-admin-anti-patterns.md v1.3.0 AAP-20"
            echo "  - INDEPENDENT_ASSURANCE_AGENT_CANON.md v1.8.0 ACR-14"
            echo "  - PREHANDOVER_PROOF_TEMPLATE.md v3.1"
            echo ""
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo ""
            exit 1
          else
            echo "✅ PASS — All PR-introduced PREHANDOVER proofs contain a concrete ## Ripple/Cross-Agent Assessment section."
            echo "   HFMC-01 compliance confirmed."
          fi

  evidence-exactness-check:
    name: "preflight/evidence-exactness"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Run governance evidence exactness checks
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          echo "=== Governance Evidence Exactness Gate ==="
          echo "Authority: LIVING_AGENT_SYSTEM.md v6.2.0"
          echo "Checks: PATH COUNT HASH VERSION-MISMATCH ISSUE-MISMATCH"
          echo ""
          chmod +x .github/scripts/validate-governance-evidence-exactness.sh
          .github/scripts/validate-governance-evidence-exactness.sh

  # ============================================================================
  # Hard gate: IAA Final Assurance (maturion-isms#1503)
  # Fails when implementation/substantive files are changed but no current,
  # PR-specific IAA final assurance token exists in .agent-admin/assurance/.
  # Advisory re-anchor comments remain, but this is the binding enforcement.
  # ============================================================================
  iaa-final-assurance-gate:
    name: "preflight/iaa-final-assurance"
    runs-on: ubuntu-latest

    # Only enforce for Copilot/foreman PRs
    if: >-
      startsWith(github.head_ref, 'copilot/') ||
      github.event.pull_request.user.login == 'Copilot'

    steps:
      - name: Checkout PR head branch
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: IAA Final Assurance Gate
        id: iaa_final_gate
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_LABELS: ${{ join(github.event.pull_request.labels.*.name, ',') }}
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          chmod +x .github/scripts/iaa-final-assurance-gate.sh
          .github/scripts/iaa-final-assurance-gate.sh

  # ============================================================================
  # Hard gate: ECAP / Admin Ceremony (maturion-isms#1503)
  # Fails when protected paths are changed but ECAP/admin ceremony evidence is
  # absent or unevidenced. Also rejects an IAA PASS on a protected-path PR
  # where ECAP was required but not evidenced.
  # ============================================================================
  ecap-admin-ceremony-gate:
    name: "preflight/ecap-admin-ceremony"
    runs-on: ubuntu-latest

    # Only enforce for Copilot/foreman PRs
    if: >-
      startsWith(github.head_ref, 'copilot/') ||
      github.event.pull_request.user.login == 'Copilot'

    steps:
      - name: Checkout PR head branch
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: ECAP / Admin Ceremony Gate
        id: ecap_gate
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_LABELS: ${{ join(github.event.pull_request.labels.*.name, ',') }}
        run: |
          chmod +x .github/scripts/ecap-admin-ceremony-gate.sh
          .github/scripts/ecap-admin-ceremony-gate.sh

  # ============================================================================
  # Hard gate: Scope Declaration Policy (maturion-isms#1521)
  # Fails when:
  #   Gate A — root SCOPE_DECLARATION.md is modified without a migration exemption
  #   Gate B — agent/Copilot PR is missing a per-PR scope declaration file
  # ============================================================================
  scope-declaration-parity:
    name: "preflight/scope-declaration-parity"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout PR head branch
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Scope Declaration Policy Gate
        id: scope_policy_gate
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_LABELS: ${{ join(github.event.pull_request.labels.*.name, ',') }}
          PR_BODY: ${{ github.event.pull_request.body }}
          # Gate B only enforces for agent/Copilot PRs
          ENFORCE_SCOPE: ${{ (startsWith(github.head_ref, 'copilot/') || github.event.pull_request.user.login == 'Copilot') && 'true' || 'false' }}
        run: |
          chmod +x .github/scripts/enforce-scope-declaration-policy.sh
          .github/scripts/enforce-scope-declaration-policy.sh

  mmm-ui-evidence-pack-gate:
    name: "preflight/mmm-ui-evidence-pack-gate"
    runs-on: ubuntu-latest
    permissions:
      contents: read

    # Only enforce for Copilot/foreman PRs
    if: >-
      startsWith(github.head_ref, 'copilot/') ||
      github.event.pull_request.user.login == 'Copilot'

    steps:
      - name: Checkout PR head branch
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: MMM Live UI Evidence Pack Gate
        id: mmm_luiep_gate
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
          BRANCH: ${{ github.event.pull_request.head.ref }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          chmod +x .github/scripts/validate-mmm-ui-evidence-pack.sh
          .github/scripts/validate-mmm-ui-evidence-pack.sh
