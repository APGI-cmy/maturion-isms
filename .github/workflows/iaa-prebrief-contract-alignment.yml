name: IAA Pre-Brief Contract Alignment

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  iaa-prebrief-contract-alignment:
    name: "preflight/iaa-prebrief-contract-alignment"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Verify canonical pre-brief contract alignment
        shell: bash
        run: |
          set -euo pipefail

          echo "=== IAA Pre-Brief Contract Alignment ==="
          echo "Canonical artifact: .agent-admin/assurance/iaa-wave-record-*.md under ## PRE-BRIEF"
          echo "Prohibited new artifact: .agent-admin/assurance/iaa-prebrief-*.md"
          echo "Canonical schema: .agent-admin/control/schemas/iaa-preflight-brief.schema.json"
          echo "Canonical protocol: .agent-admin/control/protocols/IAA_PREFLIGHT_BRIEF_PROTOCOL.md"
          echo "Scoped overlay: .agent-admin/control/overlays/WAVE1_IAA_PREFLIGHT_BRIEF_CONTRACT_ADDENDUM.md"
          echo ""

          test -f .agent-admin/control/schemas/iaa-preflight-brief.schema.json
          test -f .agent-admin/control/protocols/IAA_PREFLIGHT_BRIEF_PROTOCOL.md
          test -f .agent-admin/control/overlays/WAVE1_IAA_PREFLIGHT_BRIEF_CONTRACT_ADDENDUM.md

          SELF_WORKFLOW=".github/workflows/iaa-prebrief-contract-alignment.yml"

          legacy_generation_matches=$(grep -RIn "Generate the Pre-Brief artifact at: .*iaa-prebrief" .github/workflows .agent-admin/control 2>/dev/null | grep -v "${SELF_WORKFLOW}" || true)
          if [ -n "${legacy_generation_matches}" ]; then
            printf '%s\n' "${legacy_generation_matches}"
            echo "::error::Legacy standalone iaa-prebrief generation instruction found in active Wave 1 workflow/control guidance."
            exit 1
          fi

          legacy_commit_matches=$(grep -RIn "commit.*iaa-prebrief" .github/workflows .agent-admin/control 2>/dev/null | grep -v "${SELF_WORKFLOW}" || true)
          if [ -n "${legacy_commit_matches}" ]; then
            printf '%s\n' "${legacy_commit_matches}"
            echo "::error::Legacy standalone iaa-prebrief commit instruction found in active Wave 1 workflow/control guidance."
            exit 1
          fi

          canonical_matches=$(grep -RIn "IAA_PREFLIGHT_BRIEF" .agent-admin/control .github/workflows 2>/dev/null | grep -v "${SELF_WORKFLOW}" || true)
          if [ -n "${canonical_matches}" ]; then
            echo "Canonical IAA_PREFLIGHT_BRIEF references found."
          else
            echo "::error::No canonical IAA_PREFLIGHT_BRIEF references found in Wave 1 control guidance (excluding this workflow)."
            exit 1
          fi

          echo "IAA pre-brief contract alignment gate completed."
