name: IAA Pre-Brief Contract Alignment

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  iaa-prebrief-contract-alignment:
    name: "preflight/iaa-prebrief-contract-alignment"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Verify canonical pre-brief contract alignment
        shell: bash
        run: |
          set -euo pipefail

          echo "=== IAA Pre-Brief Contract Alignment ==="
          echo "Validating canonical control files and active canonical references."

          test -f .agent-admin/control/schemas/iaa-preflight-brief.schema.json
          test -f .agent-admin/control/protocols/IAA_PREFLIGHT_BRIEF_PROTOCOL.md
          test -f .agent-admin/control/overlays/WAVE1_IAA_PREFLIGHT_BRIEF_CONTRACT_ADDENDUM.md

          ACTIVE_SCAN_ROOTS=(
            ".agent-admin/control/protocols"
            ".agent-admin/control/overlays"
            ".agent-admin/control/templates"
            ".agent-admin/control/checklists"
          )

          existing_roots=()
          for root in "${ACTIVE_SCAN_ROOTS[@]}"; do
            if [ -d "$root" ]; then
              existing_roots+=("$root")
            fi
          done

          if [ "${#existing_roots[@]}" -eq 0 ]; then
            echo "::error::No active IAA pre-brief guidance roots are present for alignment validation."
            exit 1
          fi

          canonical_matches=$(grep -RIn "IAA_PREFLIGHT_BRIEF" "${existing_roots[@]}" 2>/dev/null \
            | grep -v "/wave-reviews/" \
            | grep -v "/test-fixtures/" \
            | grep -v "/archive/" \
            || true)

          if [ -n "${canonical_matches}" ]; then
            echo "Canonical IAA_PREFLIGHT_BRIEF references found in active guidance."
          else
            echo "::error::No canonical IAA_PREFLIGHT_BRIEF references found in active guidance."
            exit 1
          fi

          echo "IAA pre-brief contract alignment gate completed."
