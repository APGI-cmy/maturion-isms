name: Pre-Handover Checkpoint

# Authority: maturion-isms#1583
# Purpose: Deliberate, comment-triggered current-head checkpoint before any
#          handover / merge-ready / ready-for-review claim is accepted.

on:
  issue_comment:
    types: [created, edited]

permissions:
  contents: read
  pull-requests: write
  issues: write
  checks: read

jobs:
  pre-handover-checkpoint:
    name: "pre-handover/checkpoint"
    runs-on: ubuntu-latest
    if: github.event.issue.pull_request != null

    steps:
      - name: Normalize deliberate checkpoint trigger
        id: trigger
        uses: actions/github-script@v7
        with:
          script: |
            const rawBody = context.payload.comment.body || '';
            const normalizedBody = rawBody.trim();
            const author = String(context.payload.comment.user?.login || '').toLowerCase();
            const isDeliberate =
              /^(?:ECAP_)?PRE_HANDOVER_CHECKPOINT(?:\b.*)?$/i.test(normalizedBody) ||
              /^\/prepare-handover(?:\b.*)?$/i.test(normalizedBody);
            const isCheckpointResult = /<!-- pre-handover-checkpoint -->|PRE_HANDOVER_CHECKPOINT_RESULT/i.test(rawBody);
            const isFailedGateSignal = /HANDOVER BLOCKED|HANDOVER_BLOCKED|CHECKPOINT REQUIRED|CHECKPOINT_REQUIRED|RESULT:\s*STOP_AND_FIX|RESULT:\s*CS2_INTERVENTION_REQUIRED|RESULT:\s*REJECTED_BACK_TO_PRODUCER|REJECTION_NOTICE|HANDOVER_ALLOWED:\s*no/i.test(rawBody);
            const isReviewOrHandoverSignal = /\bhandover\b|merge.?ready|ready.to.merge|ready.for.review|work complete|implementation complete|merge gate released/i.test(rawBody);
            const isCs2Comment = author === 'apgi-cmy';
            const matched = !isCheckpointResult && (isDeliberate || isCs2Comment || isFailedGateSignal || isReviewOrHandoverSignal);
            core.setOutput('matched', matched ? 'true' : 'false');
            core.setOutput('normalized_body', normalizedBody);
            core.setOutput('intake_only', matched && !isDeliberate ? 'true' : 'false');

      - name: Resolve PR context
        id: pr
        if: steps.trigger.outputs.matched == 'true'
        uses: actions/github-script@v7
        env:
          TRIGGER_BODY: ${{ steps.trigger.outputs.normalized_body }}
        with:
          script: |
            const prNumber = context.payload.issue.number;
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
            });

            core.setOutput('pr_number', String(prNumber));
            core.setOutput('head_sha', pr.head.sha);
            core.setOutput('base_sha', pr.base.sha);
            core.setOutput('base_ref', pr.base.ref || '');
             core.setOutput('head_ref', pr.head.ref);
             core.setOutput('title', pr.title || '');
             core.setOutput('body', pr.body || '');
             core.setOutput('updated_at', pr.updated_at || '');
             core.setOutput('trigger', process.env.TRIGGER_BODY || '');
            const mergeableState = String(pr.mergeable_state || '').toLowerCase();
            let mergeConflictChecked = 'no';
            let mergeableWithBase = 'no';
            if (typeof pr.mergeable === 'boolean') {
              mergeConflictChecked = 'yes';
              mergeableWithBase = pr.mergeable ? 'yes' : 'no';
            } else if (mergeableState) {
              if (['clean', 'has_hooks', 'unstable'].includes(mergeableState)) {
                mergeConflictChecked = 'yes';
                mergeableWithBase = 'yes';
              } else if (mergeableState === 'dirty') {
                mergeConflictChecked = 'yes';
                mergeableWithBase = 'no';
              }
            }
            let baseSynced = 'no';
            try {
              const { data: comparison } = await github.rest.repos.compareCommitsWithBasehead({
                owner: context.repo.owner,
                repo: context.repo.repo,
                basehead: `${pr.base.sha}...${pr.head.sha}`,
              });
              if (['ahead', 'identical'].includes(String(comparison.status || '').toLowerCase())) {
                baseSynced = 'yes';
              }
            } catch (error) {
              core.info(`Unable to determine whether PR head contains base SHA: ${error.message}`);
            }
            core.setOutput('merge_conflict_checked', mergeConflictChecked);
            core.setOutput('mergeable_with_base', mergeableWithBase);
            core.setOutput('base_synced_or_conflicts_resolved', baseSynced);

      - name: Checkout trusted default branch utilities
        if: steps.trigger.outputs.matched == 'true'
        uses: actions/checkout@v5
        with:
          ref: refs/heads/${{ github.event.repository.default_branch }}
          persist-credentials: false

      - name: Collect current-head checkpoint inputs
        id: inputs
        if: steps.trigger.outputs.matched == 'true'
        uses: actions/github-script@v7
        env:
          CHECKPOINT_INPUT_DIR: ${{ runner.temp }}/pre-handover-checkpoint
          PR_NUMBER: ${{ steps.pr.outputs.pr_number }}
          HEAD_SHA: ${{ steps.pr.outputs.head_sha }}
          PR_BODY: ${{ steps.pr.outputs.body }}
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const headSha = process.env.HEAD_SHA;
            const prNumber = parseInt(process.env.PR_NUMBER, 10);
            const prBody = process.env.PR_BODY || '';

            const { data: checkRunsData } = await github.rest.checks.listForRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: headSha,
              per_page: 100,
            });

            const { data: statusData } = await github.rest.repos.getCombinedStatusForRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: headSha,
            });

            const issueMatch = (context.payload.comment.body || '').match(/#(\d+)/);
            let issueNumber = issueMatch ? issueMatch[1] : '';
            const repoFiles = {};
            const comments = [];

            const fetchFile = async (targetPath) => {
              try {
                const { data } = await github.rest.repos.getContent({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  path: targetPath,
                  ref: headSha,
                });
                if (!Array.isArray(data) && data.type === 'file') {
                  repoFiles[targetPath] = Buffer.from(data.content, 'base64').toString('utf8');
                }
              } catch {}
            };

            const fetchDirectory = async (targetPath, includePattern) => {
              try {
                const { data } = await github.rest.repos.getContent({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  path: targetPath,
                  ref: headSha,
                });
                if (!Array.isArray(data)) return;
                for (const entry of data) {
                  if (entry.type !== 'file') continue;
                  if (includePattern && !includePattern.test(entry.path)) continue;
                  await fetchFile(entry.path);
                }
              } catch {}
            };

            let changedFiles = [];
            let page = 1;
            while (true) {
              const { data: files } = await github.rest.pulls.listFiles({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: prNumber,
                per_page: 100,
                page,
              });
              changedFiles = changedFiles.concat(files.map((file) => file.filename));
              if (files.length < 100) break;
              page += 1;
            }

            page = 1;
            while (true) {
              const { data: pageComments } = await github.rest.issues.listComments({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                per_page: 100,
                page,
              });
              comments.push(...pageComments);
              if (pageComments.length < 100) break;
              page += 1;
            }

            if (!issueNumber) {
              const scopePath = `.agent-admin/scope-declarations/pr-${prNumber}.md`;
              await fetchFile(scopePath);
              const scopeText = repoFiles[scopePath] || '';
              const match = scopeText.match(/^ISSUE:\s*#?(\d+)/m);
              if (match) issueNumber = match[1];
            }

            await fetchFile(`.admin/prs/pr-${prNumber}.json`);
            await fetchFile('.admin/pr.json');
            await fetchFile(`.agent-admin/scope-declarations/pr-${prNumber}.md`);
            await fetchFile(`.functional-delivery/pr-${prNumber}.md`);

            const bodyArtifactMatch = prBody.match(/Functional-Delivery-Artifact:\s*(\S+)/i);
            if (bodyArtifactMatch) {
              await fetchFile(bodyArtifactMatch[1]);
            }

            await fetchDirectory('.agent-admin/assurance', /^\.agent-admin\/assurance\/(iaa-prebrief-|iaa-token-|iaa-wave-record-).+\.md$/);
            await fetchDirectory('.agent-admin/prehandover', /^\.agent-admin\/prehandover\/proof-.+\.md$/);
            await fetchDirectory('.agent-workspace/execution-ceremony-admin-agent/bundles', /^\.agent-workspace\/execution-ceremony-admin-agent\/bundles\/.+\.md$/);
            await fetchDirectory('.agent-workspace/foreman-v2/memory', /^\.agent-workspace\/foreman-v2\/memory\/PREHANDOVER-.+\.md$/);

            fs.mkdirSync(process.env.CHECKPOINT_INPUT_DIR, { recursive: true });
            const writeJson = (name, value) => {
              const targetPath = path.join(process.env.CHECKPOINT_INPUT_DIR, `pr-${prNumber}-${name}.json`);
              fs.writeFileSync(targetPath, JSON.stringify(value));
              return targetPath;
            };
            const repoFilesPath = path.join(process.env.CHECKPOINT_INPUT_DIR, `pr-${prNumber}-repo-files.json`);
            fs.writeFileSync(repoFilesPath, JSON.stringify(repoFiles));

            core.setOutput('check_runs_path', writeJson('check-runs', checkRunsData.check_runs || []));
            core.setOutput('commit_statuses_path', writeJson('commit-statuses', statusData.statuses || []));
            core.setOutput('pr_comments_path', writeJson('comments', comments));
            core.setOutput('issue_number', issueNumber);
            core.setOutput('changed_files_path', writeJson('changed-files', changedFiles));
            core.setOutput('repo_files_path', repoFilesPath);

      - name: Evaluate pre-handover checkpoint
        id: evaluate
        if: steps.trigger.outputs.matched == 'true'
        env:
          PR_NUMBER: ${{ steps.pr.outputs.pr_number }}
          ISSUE_NUMBER: ${{ steps.inputs.outputs.issue_number }}
          PR_TITLE: ${{ steps.pr.outputs.title }}
          PR_BODY: ${{ steps.pr.outputs.body }}
          PR_BRANCH: ${{ steps.pr.outputs.head_ref }}
          BASE_BRANCH: ${{ steps.pr.outputs.base_ref }}
          BASE_SHA: ${{ steps.pr.outputs.base_sha }}
          HEAD_SHA: ${{ steps.pr.outputs.head_sha }}
          CHECKPOINT_MERGE_CONFLICT_CHECKED: ${{ steps.pr.outputs.merge_conflict_checked }}
          CHECKPOINT_MERGEABLE_WITH_BASE: ${{ steps.pr.outputs.mergeable_with_base }}
          CHECKPOINT_BASE_SYNCED_OR_CONFLICTS_RESOLVED: ${{ steps.pr.outputs.base_synced_or_conflicts_resolved }}
          CHECKPOINT_TRIGGER: ${{ steps.pr.outputs.trigger }}
          CHECKPOINT_TIME: ${{ github.event.comment.created_at }}
          CHECKPOINT_CHECK_RUNS_PATH: ${{ steps.inputs.outputs.check_runs_path }}
          CHECKPOINT_COMMIT_STATUSES_PATH: ${{ steps.inputs.outputs.commit_statuses_path }}
          CHECKPOINT_CHANGED_FILES_PATH: ${{ steps.inputs.outputs.changed_files_path }}
          CHECKPOINT_PR_COMMENTS_PATH: ${{ steps.inputs.outputs.pr_comments_path }}
          CHECKPOINT_REPO_FILES_PATH: ${{ steps.inputs.outputs.repo_files_path }}
          CHECKPOINT_MARK_CURRENT_RUN_AS_INTAKE: "true"
          CHECKPOINT_INTAKE_ONLY: ${{ steps.trigger.outputs.intake_only }}
        run: |
          RESULT_JSON="$(node .github/scripts/pre-handover-checkpoint.js)"
          echo "result_json<<EOF" >> "$GITHUB_OUTPUT"
          echo "$RESULT_JSON" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
          RESULT_BODY="$(printf '%s\n' "$RESULT_JSON" | node -e 'let data="";process.stdin.on("data",d=>data+=d);process.stdin.on("end",()=>process.stdout.write(JSON.parse(data).body));')"
          echo "result_body<<EOF" >> "$GITHUB_OUTPUT"
          echo "$RESULT_BODY" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Post or update checkpoint result
        if: steps.trigger.outputs.matched == 'true'
        uses: actions/github-script@v7
        env:
          PR_NUMBER: ${{ steps.pr.outputs.pr_number }}
          RESULT_BODY: ${{ steps.evaluate.outputs.result_body }}
        with:
          script: |
            const prNumber = parseInt(process.env.PR_NUMBER, 10);
            const body = process.env.RESULT_BODY;
            const marker = '<!-- pre-handover-checkpoint -->';

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              per_page: 100,
            });

            const existing = comments
              .filter((comment) => comment.body && comment.body.includes(marker))
              .sort((a, b) => new Date(b.updated_at || b.created_at) - new Date(a.updated_at || a.created_at))[0];

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body,
              });
            }
