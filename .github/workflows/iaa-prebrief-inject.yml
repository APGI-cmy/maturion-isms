name: IAA Pre-Brief Injection

on:
  push:
    branches-ignore:
      - main
    paths:
      - '.agent-admin/prs/pr-*/wave-current-tasks.md'
      - '.agent-workspace/foreman*/personal/wave-current-tasks.md'
  pull_request_target:
    types: [opened, ready_for_review]
  issue_comment:
    types: [created]
  workflow_dispatch: {}

permissions:
  pull-requests: write
  issues: write
  contents: read

jobs:
  iaa-prebrief-inject:
    name: "iaa-prebrief/inject"
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'push' ||
      github.event_name == 'pull_request_target' ||
      (github.event_name == 'issue_comment' &&
       (github.event.comment.body == '/iaa-prebrief' ||
        startsWith(github.event.comment.body, '/iaa-prebrief '))) ||
      github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout branch state when safe
        if: github.event_name == 'push' || github.event_name == 'issue_comment' || github.event_name == 'workflow_dispatch'
        uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - name: Resolve context
        id: ctx
        uses: actions/github-script@v7
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_NUMBER: ${{ github.event.pull_request.number || '' }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha || '' }}
          ISSUE_NUMBER: ${{ github.event.issue.number || '' }}
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const eventName = process.env.EVENT_NAME;
            let prNumber = process.env.PR_NUMBER || '';
            let ref = process.env.PR_HEAD_SHA || context.sha;
            let branch = '';

            if (eventName === 'issue_comment') {
              const issueNumber = Number(process.env.ISSUE_NUMBER || 0);
              try {
                const { data: pr } = await github.rest.pulls.get({ owner, repo, pull_number: issueNumber });
                prNumber = String(issueNumber);
                ref = pr.head.sha;
                branch = pr.head.ref;
              } catch (_e) {}
            }

            if (eventName === 'push') {
              branch = context.ref.replace('refs/heads/', '');
              try {
                const { data: pulls } = await github.rest.pulls.list({ owner, repo, state: 'open', head: `${owner}:${branch}`, per_page: 1 });
                if (pulls.length) {
                  prNumber = String(pulls[0].number);
                  ref = pulls[0].head.sha;
                }
              } catch (_e) {}
            }

            if (eventName === 'pull_request_target' && prNumber) {
              const { data: pr } = await github.rest.pulls.get({ owner, repo, pull_number: Number(prNumber) });
              ref = pr.head.sha;
              branch = pr.head.ref;
            }

            core.setOutput('pr_number', prNumber);
            core.setOutput('ref', ref);
            core.setOutput('branch', branch || 'unknown');

      - name: Inspect task and wave-record state
        id: inspect
        uses: actions/github-script@v7
        env:
          PR_NUMBER: ${{ steps.ctx.outputs.pr_number }}
          REF: ${{ steps.ctx.outputs.ref }}
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const prNumber = process.env.PR_NUMBER || '';
            const ref = process.env.REF || context.sha;

            const taskPaths = [];
            if (prNumber) taskPaths.push(`.agent-admin/prs/pr-${prNumber}/wave-current-tasks.md`);
            taskPaths.push('.agent-workspace/foreman-v2/personal/wave-current-tasks.md');

            let tasksFound = false;
            let tasksSnippet = '';
            let wave = 'unknown';
            for (const path of taskPaths) {
              try {
                const { data } = await github.rest.repos.getContent({ owner, repo, path, ref });
                if (Array.isArray(data) || data.type !== 'file') continue;
                const content = Buffer.from(data.content, 'base64').toString('utf8');
                tasksFound = true;
                tasksSnippet = content.slice(0, 1500).replace(/`/g, "'");
                const match = content.match(/(?:\*\*Wave\*\*|wave):\s*(?:Wave\s+)?([^\s\n]+)/i);
                if (match) wave = match[1];
                break;
              } catch (_e) {}
            }

            let prebriefExists = false;
            let prebriefPath = '';
            try {
              const { data: dir } = await github.rest.repos.getContent({ owner, repo, path: '.agent-admin/assurance', ref });
              const files = Array.isArray(dir) ? dir.filter(f => f.type === 'file' && /^iaa-wave-record-.*\.md$/.test(f.name)) : [];
              for (const file of files) {
                const { data } = await github.rest.repos.getContent({ owner, repo, path: file.path, ref });
                const content = Buffer.from(data.content, 'base64').toString('utf8');
                const lower = content.toLowerCase();
                const canonical = lower.includes('## pre-brief') &&
                  content.includes('IAA_PREFLIGHT_BRIEF:') &&
                  lower.includes('schema_version:') &&
                  lower.includes('result: preflight_brief_complete') &&
                  !lower.includes('superseded');
                const prBound = prNumber ? new RegExp(`\\bpr:\\s*#?${prNumber}\\b`, 'i').test(content) : true;
                if (canonical && prBound) {
                  prebriefExists = true;
                  prebriefPath = file.path;
                  break;
                }
              }
            } catch (_e) {}

            core.setOutput('tasks_found', String(tasksFound));
            core.setOutput('tasks_snippet', tasksSnippet);
            core.setOutput('wave', wave);
            core.setOutput('prebrief_exists', String(prebriefExists));
            core.setOutput('prebrief_path', prebriefPath);

      - name: Skip if canonical pre-brief exists
        if: steps.inspect.outputs.prebrief_exists == 'true'
        run: echo "Canonical pre-brief exists at ${{ steps.inspect.outputs.prebrief_path }}"

      - name: Post canonical pre-brief request
        if: steps.inspect.outputs.prebrief_exists != 'true'
        uses: actions/github-script@v7
        env:
          PR_NUMBER: ${{ steps.ctx.outputs.pr_number }}
          BRANCH: ${{ steps.ctx.outputs.branch }}
          REF: ${{ steps.ctx.outputs.ref }}
          WAVE: ${{ steps.inspect.outputs.wave }}
          TASKS_FOUND: ${{ steps.inspect.outputs.tasks_found }}
          TASKS_SNIPPET: ${{ steps.inspect.outputs.tasks_snippet }}
          ISSUE_NUMBER: ${{ github.event.issue.number || '' }}
        with:
          script: |
            const prNumber = process.env.PR_NUMBER || '';
            const issueNumber = process.env.ISSUE_NUMBER || '';
            const targetNumber = Number(prNumber || issueNumber || 0);
            const wave = process.env.WAVE || 'unknown';
            const branch = process.env.BRANCH || 'unknown';
            const taskSection = process.env.TASKS_FOUND === 'true'
              ? '\n' + (process.env.TASKS_SNIPPET || '') + '\n...\n'
              : '> wave-current-tasks.md was not found on this branch.';

            const body = [
              '## IAA Pre-Brief Invocation',
              '',
              'Action Required: generate the canonical Wave Pre-Brief.',
              `Wave: ${wave}`,
              `Branch: ${branch}`,
              prNumber ? `PR: #${prNumber}` : 'PR: PENDING',
              '',
              'Required artifact location:',
              '',
              '```text',
              '.agent-admin/assurance/iaa-wave-record-{wave}-{date}.md',
              '```',
              '',
              'Required section and block:',
              '',
              '```text',
              '## PRE-BRIEF',
              'IAA_PREFLIGHT_BRIEF:',
              'schema_version: "1.0.0"',
              'result: PREFLIGHT_BRIEF_COMPLETE',
              '```',
              '',
              'Do not create standalone prebrief files. Use the schema and protocol at:',
              '',
              '- .agent-admin/control/schemas/iaa-preflight-brief.schema.json',
              '- .agent-admin/control/protocols/IAA_PREFLIGHT_BRIEF_PROTOCOL.md',
              '',
              'Current wave task list:',
              '',
              taskSection,
            ].join('\n');

            if (targetNumber) {
              await github.rest.issues.createComment({ owner: context.repo.owner, repo: context.repo.repo, issue_number: targetNumber, body });
            } else {
              await github.rest.repos.createCommitComment({ owner: context.repo.owner, repo: context.repo.repo, commit_sha: process.env.REF || context.sha, body });
            }
