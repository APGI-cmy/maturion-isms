name: IAA Pre-Brief Injection

on:
  push:
    branches-ignore:
      - main
    paths:
      - '.agent-workspace/foreman*/personal/wave-current-tasks*.md'
  pull_request_target:
    types: [opened, synchronize, ready_for_review]
  issue_comment:
    types: [created]
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for manual trigger'
        required: false
        default: 'Manual activation'

permissions:
  pull-requests: write
  issues: write
  contents: read

jobs:
  iaa-prebrief-inject:
    runs-on: ubuntu-latest
    outputs:
      prebrief_existed_at_t0: ${{ steps.wave_tasks.outputs.prebrief_exists }}

    if: >-
      github.event_name == 'push' ||
      (github.event_name == 'issue_comment' &&
       (github.event.comment.body == '/iaa-prebrief' ||
        startsWith(github.event.comment.body, '/iaa-prebrief '))) ||
      (github.event_name == 'pull_request_target' &&
       (startsWith(github.head_ref, 'copilot/') ||
        github.event.pull_request.user.login == 'Copilot'))

    steps:
      # ── PUSH path ────────────────────────────────────────────────────────────

      - name: Checkout (push event — read wave-current-tasks.md at pushed SHA)
        if: github.event_name == 'push'
        uses: actions/checkout@v5
        with:
          ref: ${{ github.sha }}
          fetch-depth: 1

      # ── PULL_REQUEST_TARGET path ─────────────────────────────────────────────
      # Fires when a Copilot-authored PR is opened or synchronised.
      # Files are read via the GitHub API (no checkout) to avoid the
      # pull_request_target + untrusted-checkout security concern.

      - name: Check for existing IAA Pre-Brief artifact (pull_request_target)
        id: wave_tasks_pr
        if: github.event_name == 'pull_request_target'
        uses: actions/github-script@v7
        env:
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        with:
          script: |
            const headSha = process.env.PR_HEAD_SHA;
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            // Read wave-current-tasks.md via API (no filesystem checkout needed)
            let tasksFound = false;
            let waveNum = 'unknown';
            let tasksSnippet = '';
            try {
              const { data } = await github.rest.repos.getContent({
                owner, repo,
                path: '.agent-workspace/foreman-v2/personal/wave-current-tasks.md',
                ref: headSha,
              });
              const content = Buffer.from(data.content, 'base64').toString('utf8');
              tasksFound = true;
              tasksSnippet = content.slice(0, 1500).replace(/`/g, "'");
              const waveMatch = content.match(/\*\*Wave\*\*:\s*(?:Wave\s+)?(\S+)/);
              if (waveMatch) waveNum = waveMatch[1];
            } catch (_e) {
              // File absent — leave defaults
            }
            core.setOutput('tasks_found', String(tasksFound));
            core.setOutput('wave_num', waveNum);
            core.setOutput('tasks_snippet', tasksSnippet);

            // Idempotency guard: scan assurance dir for any non-SUPERSEDED pre-brief artifact
            let prebriefExists = false;
            try {
              const { data: assuranceContents } = await github.rest.repos.getContent({
                owner, repo,
                path: '.agent-admin/assurance',
                ref: headSha,
              });
              const prebriefFiles = Array.isArray(assuranceContents)
                ? assuranceContents.filter(
                    (f) => f.type === 'file' &&
                           f.name.startsWith('iaa-prebrief-') &&
                           f.name.endsWith('.md')
                  )
                : [];
              for (const file of prebriefFiles) {
                const { data: fd } = await github.rest.repos.getContent({
                  owner, repo, path: file.path, ref: headSha,
                });
                const fc = Buffer.from(fd.content, 'base64').toString('utf8');
                if (!fc.toLowerCase().includes('superseded')) {
                  prebriefExists = true;
                  break;
                }
              }
            } catch (_e) {
              // Assurance directory absent — prebriefExists stays false
            }
            core.setOutput('prebrief_exists', String(prebriefExists));

      # ── ISSUE_COMMENT path ───────────────────────────────────────────────────
      # When /iaa-prebrief is typed on a PR comment, check out the PR head so
      # wave-current-tasks.md and the idempotency guard read the PR branch state,
      # not main. Falls back to the default branch if the comment is on a plain
      # issue (no pull_request association).

      - name: Resolve checkout ref (issue_comment event)
        id: resolve_ref
        if: github.event_name == 'issue_comment'
        uses: actions/github-script@v7
        env:
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        with:
          script: |
            const issueNumber = parseInt(process.env.ISSUE_NUMBER, 10);
            // Check if this issue is actually a PR
            try {
              const { data: pr } = await github.rest.pulls.get({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: issueNumber,
              });
              // It's a PR — use the head SHA so we read the PR branch state
              core.setOutput('ref', pr.head.sha);
              core.setOutput('issue_pr_number', String(issueNumber));
            } catch (e) {
              // Not a PR (plain issue) — fall back to default branch
              core.setOutput('ref', '');
              core.setOutput('issue_pr_number', '');
            }

      - name: Checkout PR head or default branch (issue_comment event)
        if: github.event_name == 'issue_comment'
        uses: actions/checkout@v5
        with:
          # If comment is on a PR, check out its head SHA; otherwise default branch
          ref: ${{ steps.resolve_ref.outputs.ref || github.event.repository.default_branch }}
          fetch-depth: 1

      - name: Read wave-current-tasks.md and check for existing Pre-Brief (push)
        id: wave_tasks
        if: github.event_name == 'push'
        run: |
          TASKS_FILE=".agent-workspace/foreman-v2/personal/wave-current-tasks.md"
          if [ -f "$TASKS_FILE" ]; then
            SNIPPET=$(head -c 1500 "$TASKS_FILE" | sed "s/\`/'/g")
            # Normalize wave number — strip "Wave " prefix, capture just the number/slug
            WAVE_NUM=$(grep -m1 -oP '(?<=\*\*Wave\*\*:\s)(Wave\s+)?\K\S+' "$TASKS_FILE" || echo "unknown")
            echo "tasks_found=true" >> "$GITHUB_OUTPUT"
            echo "wave_num=$WAVE_NUM" >> "$GITHUB_OUTPUT"
            echo "tasks_snippet<<EOF_TASKS" >> "$GITHUB_OUTPUT"
            echo "$SNIPPET" >> "$GITHUB_OUTPUT"
            echo "EOF_TASKS" >> "$GITHUB_OUTPUT"

            # Idempotency guard — scoped to THIS wave's pre-brief file
            ASSURANCE_DIR=".agent-admin/assurance"
            PREBRIEF_FILE="${ASSURANCE_DIR}/iaa-prebrief-wave${WAVE_NUM}.md"
            if [ "$WAVE_NUM" != "unknown" ] && [ -f "$PREBRIEF_FILE" ] && ! grep -qi "SUPERSEDED" "$PREBRIEF_FILE" 2>/dev/null; then
              echo "prebrief_exists=true" >> "$GITHUB_OUTPUT"
            else
              echo "prebrief_exists=false" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "tasks_found=false" >> "$GITHUB_OUTPUT"
            echo "wave_num=unknown" >> "$GITHUB_OUTPUT"
            echo "prebrief_exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Read wave-current-tasks.md and check for existing Pre-Brief (issue_comment)
        id: wave_tasks_comment
        if: github.event_name == 'issue_comment'
        run: |
          TASKS_FILE=".agent-workspace/foreman-v2/personal/wave-current-tasks.md"
          if [ -f "$TASKS_FILE" ]; then
            SNIPPET=$(head -c 1500 "$TASKS_FILE" | sed "s/\`/'/g")
            WAVE_NUM=$(grep -m1 -oP '(?<=\*\*Wave\*\*:\s)(Wave\s+)?\K\S+' "$TASKS_FILE" || echo "unknown")
            echo "tasks_found=true" >> "$GITHUB_OUTPUT"
            echo "wave_num=$WAVE_NUM" >> "$GITHUB_OUTPUT"
            echo "tasks_snippet<<EOF_TASKS" >> "$GITHUB_OUTPUT"
            echo "$SNIPPET" >> "$GITHUB_OUTPUT"
            echo "EOF_TASKS" >> "$GITHUB_OUTPUT"

            # Idempotency guard — scoped to THIS wave's pre-brief file
            ASSURANCE_DIR=".agent-admin/assurance"
            PREBRIEF_FILE="${ASSURANCE_DIR}/iaa-prebrief-wave${WAVE_NUM}.md"
            if [ "$WAVE_NUM" != "unknown" ] && [ -f "$PREBRIEF_FILE" ] && ! grep -qi "SUPERSEDED" "$PREBRIEF_FILE" 2>/dev/null; then
              echo "prebrief_exists=true" >> "$GITHUB_OUTPUT"
            else
              echo "prebrief_exists=false" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "tasks_found=false" >> "$GITHUB_OUTPUT"
            echo "wave_num=unknown" >> "$GITHUB_OUTPUT"
            echo "prebrief_exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip if Pre-Brief already exists for this wave (push)
        if: github.event_name == 'push' && steps.wave_tasks.outputs.prebrief_exists == 'true'
        env:
          WAVE_NUM_NOTICE: ${{ steps.wave_tasks.outputs.wave_num }}
        run: |
          echo "::notice::Pre-Brief already exists for wave ${WAVE_NUM_NOTICE} — skipping auto-invocation. Use /iaa-prebrief-amend to request an amendment."

      - name: Skip if Pre-Brief already exists for this wave (issue_comment)
        if: github.event_name == 'issue_comment' && steps.wave_tasks_comment.outputs.prebrief_exists == 'true'
        env:
          WAVE_NUM_NOTICE: ${{ steps.wave_tasks_comment.outputs.wave_num }}
        run: |
          echo "::notice::Pre-Brief already exists for wave ${WAVE_NUM_NOTICE} — skipping auto-invocation. Use /iaa-prebrief-amend to request an amendment."

      - name: Skip if Pre-Brief already exists (pull_request_target)
        if: github.event_name == 'pull_request_target' && steps.wave_tasks_pr.outputs.prebrief_exists == 'true'
        run: |
          echo "::notice::IAA Pre-Brief artifact already exists on this branch — skipping auto-invocation."

      - name: Find associated PR number (push event)
        id: find_pr
        if: github.event_name == 'push' && steps.wave_tasks.outputs.tasks_found == 'true' && steps.wave_tasks.outputs.prebrief_exists != 'true'
        uses: actions/github-script@v7
        env:
          GH_REF: ${{ github.ref }}
        with:
          script: |
            const ref = process.env.GH_REF;
            // ref is refs/heads/<branch>
            const branch = ref.replace('refs/heads/', '');
            const { data: pulls } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              head: `${context.repo.owner}:${branch}`,
              per_page: 1,
            });
            if (pulls.length > 0) {
              core.setOutput('pr_number', String(pulls[0].number));
            } else {
              core.setOutput('pr_number', '');
            }

      - name: Post IAA Pre-Brief invocation comment (push)
        if: github.event_name == 'push' && steps.wave_tasks.outputs.tasks_found == 'true' && steps.wave_tasks.outputs.prebrief_exists != 'true'
        uses: actions/github-script@v7
        env:
          TASKS_FOUND: ${{ steps.wave_tasks.outputs.tasks_found }}
          TASKS_SNIPPET: ${{ steps.wave_tasks.outputs.tasks_snippet }}
          WAVE_NUM: ${{ steps.wave_tasks.outputs.wave_num }}
          PR_NUMBER: ${{ steps.find_pr.outputs.pr_number }}
          GH_REF: ${{ github.ref }}
        with:
          script: |
            const tasksFound = process.env.TASKS_FOUND === 'true';
            const tasksSnippet = process.env.TASKS_SNIPPET || '';
            const waveNum = (process.env.WAVE_NUM || 'unknown').trim();
            const prNumberEnv = process.env.PR_NUMBER || '';
            const branchRef = (process.env.GH_REF || '').replace('refs/heads/', '');

            const taskSection = tasksFound
              ? '\n' + tasksSnippet + '\n...\n'
              : '> ⚠️ `wave-current-tasks.md` was not found on this branch. Ensure the Foreman has committed it before proceeding.';

            if (!prNumberEnv) {
              // No open PR — post on the linked issue instead of silently dropping.
              // Resolve issue number from wave-current-tasks.md **Issue**: field,
              // or fall back to branch name convention (e.g. fix/NNN-title → issue NNN).
              const fs = require('fs');
              let issueNumber = null;

              const tasksFile = '.agent-workspace/foreman-v2/personal/wave-current-tasks.md';
              if (fs.existsSync(tasksFile)) {
                const fileContent = fs.readFileSync(tasksFile, 'utf8');
                const issueMatch = fileContent.match(/\*\*Issue\*\*:\s*#?(\d+)/i);
                if (issueMatch) {
                  issueNumber = parseInt(issueMatch[1], 10);
                }
              }

              if (!issueNumber) {
                const branchMatch = branchRef.match(/[\/\-](\d{3,})/);
                if (branchMatch) {
                  issueNumber = parseInt(branchMatch[1], 10);
                }
              }

              if (!issueNumber) {
                // Final fallback — post as a commit comment so the reminder is always visible
                const fallbackBody = [
                  '## ⚠️ IAA Pre-Brief Reminder — No Open PR or Linked Issue Found',
                  '',
                  `**Trigger**: \`wave-current-tasks.md\` was pushed to branch \`${branchRef}\``,
                  `**Commit**: \`${context.sha}\``,
                  '**Status**: Pre-Brief reminder triggered but **no open PR** and **no resolvable issue number** were found for this branch.',
                  '',
                  '> ⛔ Per **foreman-v2-agent contract Step 1.8**, you may not proceed past Phase 1 until the IAA Pre-Brief has been performed.',
                  '',
                  '### Required actions:',
                  '1. **Open a PR immediately** (DRAFT is acceptable) for the wave branch',
                  '2. Ensure the PR description references the correct wave/issue number',
                  '3. **Invoke the IAA Pre-Brief** per Step 1.8 by commenting `/iaa-prebrief` on the PR',
                  '4. **Do not begin any implementation work** until the Pre-Brief artifact is committed to `.agent-admin/assurance/iaa-prebrief-wave[N].md`',
                  '',
                  '### CS2 escalation notice',
                  '> The pre-brief reminder workflow (`iaa-prebrief-inject.yml`) fired but could not deliver the Pre-Brief invocation to a PR or linked issue — neither could be resolved from this branch.',
                  '> @APGI-cmy — governance safety net triggered on push without PR and without resolvable issue mapping.',
                  '',
                  '*IAA Pre-Brief Injection — Authority: foreman-v2-agent contract Step 1.8, IAA_PRE_BRIEF_PROTOCOL.md v1.1.0*',
                ].join('\n');

                try {
                  await github.rest.repos.createCommitComment({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    commit_sha: context.sha,
                    body: fallbackBody,
                  });
                  core.warning(`No PR or issue mapping found for branch '${branchRef}' — Pre-Brief reminder posted as commit comment on ${context.sha}.`);
                } catch (err) {
                  core.setFailed(`No PR or issue mapping found and failed to post commit comment for Pre-Brief reminder: ${err.message}`);
                }
                return;
              }

              const noPrBody = [
                '## ⚠️ IAA Pre-Brief Reminder — No Open PR Found',
                '',
                `**Trigger**: \`wave-current-tasks.md\` was pushed to branch \`${branchRef}\``,
                '**Status**: Pre-Brief reminder triggered but **no open PR was found** for this branch.',
                '',
                '> ⛔ Per **foreman-v2-agent contract Step 1.8**, you may not proceed past Phase 1 until the IAA Pre-Brief has been performed.',
                '',
                '### Required actions:',
                '1. **Open a PR immediately** (DRAFT is acceptable) for the wave branch',
                '2. **Invoke the IAA Pre-Brief** per Step 1.8 by commenting `/iaa-prebrief` on the PR',
                '3. **Do not begin any implementation work** until the Pre-Brief artifact is committed to `.agent-admin/assurance/iaa-prebrief-wave[N].md`',
                '',
                '### CS2 escalation notice',
                '> The pre-brief reminder workflow (`iaa-prebrief-inject.yml`) fired but could not deliver the Pre-Brief invocation to a PR because no open PR exists for this branch.',
                '> @APGI-cmy — governance safety net triggered on push without PR. Agent must open PR before proceeding.',
                '',
                '*IAA Pre-Brief Injection — Authority: foreman-v2-agent contract Step 1.8, IAA_PRE_BRIEF_PROTOCOL.md v1.1.0*',
              ].join('\n');

              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
                body: noPrBody,
              });

              core.warning(`No PR found — Pre-Brief reminder posted on issue #${issueNumber} instead.`);
              return;
            }

            const issueNumber = parseInt(prNumberEnv, 10);

            const body = [
              '## 🔍 IAA Pre-Brief Invocation',
              '',
              '**Trigger**: `wave-current-tasks.md` pushed to this branch',
              '**Action Required**: IAA — generate Pre-Brief for this wave',
              '',
              `@Copilot You are the **Independent Assurance Agent (IAA)**. The Foreman has committed \`wave-current-tasks.md\` for this wave. You are now invoked per \`IAA_PRE_BRIEF_PROTOCOL.md §Trigger\` to generate the **Wave Pre-Brief**.`,
              '',
              '### Your obligations (from `IAA_PRE_BRIEF_PROTOCOL.md` v1.1.0):',
              '',
              '1. Read `.agent-workspace/foreman-v2/personal/wave-current-tasks.md` in full',
              '2. Identify all qualifying tasks per `INDEPENDENT_ASSURANCE_AGENT_CANON.md §Trigger Table`',
              '3. For each qualifying task, declare:',
              '   - Which proof phases (1–4) are required',
              '   - Which evidence artifacts will be checked',
              '   - Which canon overlays apply',
              `4. Generate the Pre-Brief artifact at: \`.agent-admin/assurance/iaa-prebrief-wave${waveNum}.md\``,
              '5. Commit the Pre-Brief artifact to this branch as a **new file only** (do NOT modify any existing committed artifact)',
              '6. Confirm completion by replying to this comment with the Pre-Brief artifact path and a summary of qualifying tasks found',
              '',
              '### Current wave task list (first 1500 chars):',
              '',
              taskSection,
              '',
              '**If no qualifying tasks are found**: Reply confirming `PHASE_A_ADVISORY` status — wave may proceed but note this in your Pre-Brief artifact.',
              '',
              '**Authority**: `IAA_PRE_BRIEF_PROTOCOL.md` v1.1.0 | `INDEPENDENT_ASSURANCE_AGENT_CANON.md` §Proactive Assurance v1.1.0',
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              body,
            });

      - name: Post IAA Pre-Brief invocation comment (issue_comment)
        if: github.event_name == 'issue_comment' && steps.wave_tasks_comment.outputs.tasks_found == 'true' && steps.wave_tasks_comment.outputs.prebrief_exists != 'true'
        uses: actions/github-script@v7
        env:
          TASKS_FOUND: ${{ steps.wave_tasks_comment.outputs.tasks_found }}
          TASKS_SNIPPET: ${{ steps.wave_tasks_comment.outputs.tasks_snippet }}
          WAVE_NUM: ${{ steps.wave_tasks_comment.outputs.wave_num }}
          ISSUE_PR_NUMBER: ${{ steps.resolve_ref.outputs.issue_pr_number }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        with:
          script: |
            const tasksFound = process.env.TASKS_FOUND === 'true';
            const tasksSnippet = process.env.TASKS_SNIPPET || '';
            const waveNum = (process.env.WAVE_NUM || 'unknown').trim();
            // Prefer the resolved PR number, fall back to the raw issue number
            const targetNumber = parseInt(process.env.ISSUE_PR_NUMBER || process.env.ISSUE_NUMBER, 10);

            const taskSection = tasksFound
              ? '\n' + tasksSnippet + '\n...\n'
              : '> ⚠️ `wave-current-tasks.md` was not found on this branch. Ensure the Foreman has committed it before proceeding.';

            const body = [
              '## 🔍 IAA Pre-Brief Invocation',
              '',
              '**Trigger**: `/iaa-prebrief` manual invocation',
              '**Action Required**: IAA — generate Pre-Brief for this wave',
              '',
              `@Copilot You are the **Independent Assurance Agent (IAA)**. The Foreman has invoked you manually per \`IAA_PRE_BRIEF_PROTOCOL.md §Trigger\` to generate the **Wave Pre-Brief**.`,
              '',
              '### Your obligations (from `IAA_PRE_BRIEF_PROTOCOL.md` v1.1.0):',
              '',
              '1. Read `.agent-workspace/foreman-v2/personal/wave-current-tasks.md` in full',
              '2. Identify all qualifying tasks per `INDEPENDENT_ASSURANCE_AGENT_CANON.md §Trigger Table`',
              '3. For each qualifying task, declare:',
              '   - Which proof phases (1–4) are required',
              '   - Which evidence artifacts will be checked',
              '   - Which canon overlays apply',
              `4. Generate the Pre-Brief artifact at: \`.agent-admin/assurance/iaa-prebrief-wave${waveNum}.md\``,
              '5. Commit the Pre-Brief artifact to this branch as a **new file only** (do NOT modify any existing committed artifact)',
              '6. Confirm completion by replying to this comment with the Pre-Brief artifact path and a summary of qualifying tasks found',
              '',
              '### Current wave task list (first 1500 chars):',
              '',
              taskSection,
              '',
              '**If no qualifying tasks are found**: Reply confirming `PHASE_A_ADVISORY` status — wave may proceed but note this in your Pre-Brief artifact.',
              '',
              '### Lifecycle State Tracking',
              '',
              'Machine-derived lifecycle state is automatically reported on every PR push by the `preflight/manage-lifecycle-labels` job.',
              'Look for the **Assurance Lifecycle State** bot comment on this PR (`<!-- assurance-lifecycle-bot -->`). It will contain:',
              '',
              '| Field | Description |',
              '|---|---|',
              '| IAA required | Whether implementation files changed, requiring IAA final assurance |',
              '| IAA invoked | Whether a valid IAA token for this PR/issue/HEAD is committed |',
              '| IAA blocked | Hard-blocks handover if required but not invoked |',
              '| ECAP required | Whether protected governance paths changed, requiring ECAP ceremony |',
              '| ECAP invoked | Whether a valid ECAP bundle for this PR is committed |',
              '| Handover allowed | `true` only when all required ceremonies are complete |',
              '| Required next actions | Step-by-step instructions when lifecycle is blocked |',
              '',
              '> ⚠️ Do NOT mark this PR as merge-ready until the lifecycle state comment shows `ASSURANCE-READY`.',
              '> The `preflight/merge-ready-claim` gate will hard-fail if merge-ready language appears while blocked.',
              '',
              '**Authority**: `IAA_PRE_BRIEF_PROTOCOL.md` v1.1.0 | `INDEPENDENT_ASSURANCE_AGENT_CANON.md` §Proactive Assurance v1.1.0 | maturion-isms#1514',
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: targetNumber,
              body,
            });

      - name: Handle missing wave-current-tasks.md (issue_comment trigger only)
        if: github.event_name == 'issue_comment' && steps.wave_tasks_comment.outputs.tasks_found == 'false'
        uses: actions/github-script@v7
        env:
          ISSUE_PR_NUMBER: ${{ steps.resolve_ref.outputs.issue_pr_number }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        with:
          script: |
            const targetNumber = parseInt(process.env.ISSUE_PR_NUMBER || process.env.ISSUE_NUMBER, 10);
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: targetNumber,
              body: [
                '## ⚠️ IAA Pre-Brief — Cannot Invoke',
                '',
                '`wave-current-tasks.md` was not found on this branch.',
                '',
                'The Foreman must create and commit `.agent-workspace/foreman-v2/personal/wave-current-tasks.md` (populated with all wave tasks) **before** the IAA Pre-Brief can be generated.',
                '',
                'See `IAA_PRE_BRIEF_PROTOCOL.md §Trigger` for requirements.',
              ].join('\n'),
            });

      # ── PULL_REQUEST_TARGET comment path ─────────────────────────────────────

      - name: Post IAA Pre-Brief invocation comment (pull_request_target)
        if: github.event_name == 'pull_request_target' && steps.wave_tasks_pr.outputs.prebrief_exists != 'true'
        uses: actions/github-script@v7
        env:
          TASKS_FOUND: ${{ steps.wave_tasks_pr.outputs.tasks_found }}
          TASKS_SNIPPET: ${{ steps.wave_tasks_pr.outputs.tasks_snippet }}
          WAVE_NUM: ${{ steps.wave_tasks_pr.outputs.wave_num }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        with:
          script: |
            const tasksFound = process.env.TASKS_FOUND === 'true';
            const tasksSnippet = process.env.TASKS_SNIPPET || '';
            const waveNum = (process.env.WAVE_NUM || 'unknown').trim();
            const prNumber = parseInt(process.env.PR_NUMBER, 10);

            // Idempotency guard: skip if an invocation comment already exists on this PR
            const INVOCATION_MARKER = '## 🔍 IAA Pre-Brief Invocation';
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              per_page: 100,
            });
            const alreadyPosted = comments.some(
              (c) => c.body && c.body.includes(INVOCATION_MARKER)
            );
            if (alreadyPosted) {
              core.notice('IAA Pre-Brief invocation comment already present on this PR — skipping duplicate.');
              return;
            }

            const taskSection = tasksFound
              ? '\n' + tasksSnippet + '\n...\n'
              : '> ⚠️ `wave-current-tasks.md` was not found on this branch. Ensure the Foreman commits it before proceeding.';

            const body = [
              '## 🔍 IAA Pre-Brief Invocation',
              '',
              '**Trigger**: PR opened/synchronised (Copilot-authored branch)',
              '**Action Required**: IAA — generate Pre-Brief for this wave',
              '',
              `@Copilot You are the **Independent Assurance Agent (IAA)**. This PR was opened without a Pre-Brief artifact. You are now invoked per \`IAA_PRE_BRIEF_PROTOCOL.md §Trigger\` to generate the **Wave Pre-Brief**.`,
              '',
              '### Your obligations (from `IAA_PRE_BRIEF_PROTOCOL.md` v1.1.0):',
              '',
              '1. Read `.agent-workspace/foreman-v2/personal/wave-current-tasks.md` in full',
              '2. Identify all qualifying tasks per `INDEPENDENT_ASSURANCE_AGENT_CANON.md §Trigger Table`',
              '3. For each qualifying task, declare:',
              '   - Which proof phases (1–4) are required',
              '   - Which evidence artifacts will be checked',
              '   - Which canon overlays apply',
              `4. Generate the Pre-Brief artifact at: \`.agent-admin/assurance/iaa-prebrief-wave${waveNum}.md\``,
              '5. Commit the Pre-Brief artifact to this branch as a **new file only** (do NOT modify any existing committed artifact)',
              '6. Confirm completion by replying to this comment with the Pre-Brief artifact path and a summary of qualifying tasks found',
              '',
              '### Current wave task list (first 1500 chars):',
              '',
              taskSection,
              '',
              '**If no qualifying tasks are found**: Reply confirming `PHASE_A_ADVISORY` status — wave may proceed but note this in your Pre-Brief artifact.',
              '',
              '### Lifecycle State Tracking',
              '',
              'Machine-derived lifecycle state is automatically reported on every PR push by the `preflight/manage-lifecycle-labels` job.',
              'Look for the **Assurance Lifecycle State** bot comment on this PR (`<!-- assurance-lifecycle-bot -->`). It will contain:',
              '',
              '| Field | Description |',
              '|---|---|',
              '| IAA required | Whether implementation files changed, requiring IAA final assurance |',
              '| IAA invoked | Whether a valid IAA token for this PR/issue/HEAD is committed |',
              '| IAA blocked | Hard-blocks handover if required but not invoked |',
              '| ECAP required | Whether protected governance paths changed, requiring ECAP ceremony |',
              '| ECAP invoked | Whether a valid ECAP bundle for this PR is committed |',
              '| Handover allowed | `true` only when all required ceremonies are complete |',
              '| Required next actions | Step-by-step instructions when lifecycle is blocked |',
              '',
              '> ⚠️ Do NOT mark this PR as merge-ready until the lifecycle state comment shows `ASSURANCE-READY`.',
              '> The `preflight/merge-ready-claim` gate will hard-fail if merge-ready language appears while blocked.',
              '',
              '**Authority**: `IAA_PRE_BRIEF_PROTOCOL.md` v1.1.0 | `INDEPENDENT_ASSURANCE_AGENT_CANON.md` §Proactive Assurance v1.1.0 | maturion-isms#1514',
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body,
            });

  # ── T+10min Safety Net ────────────────────────────────────────────────────
  # Fires 10 minutes after the initial push to a wave branch and checks
  # whether the IAA Pre-Brief artifact has been committed. If still absent,
  # posts a governance watchdog alert to the PR and/or linked issue.
  iaa-prebrief-safety-net:
    name: "iaa-prebrief/t10-safety-net"
    runs-on: ubuntu-latest
    needs: iaa-prebrief-inject
    if: github.event_name == 'push' && needs.iaa-prebrief-inject.outputs.prebrief_existed_at_t0 != 'true'
    permissions:
      pull-requests: write
      issues: write
      contents: read

    steps:
      - name: Wait 10 minutes (T+10 safety net window)
        run: sleep 600

      - name: Checkout branch at current state
        uses: actions/checkout@v5
        with:
          ref: ${{ github.ref }}
          fetch-depth: 1

      - name: Read wave number from wave-current-tasks.md
        id: wave_info
        run: |
          TASKS_FILE=".agent-workspace/foreman-v2/personal/wave-current-tasks.md"
          if [ -f "$TASKS_FILE" ]; then
            RAW_WAVE_LINE=$(grep -m1 -oP '(?<=\*\*Wave\*\*:\s).*' "$TASKS_FILE" || true)
            if [ -n "$RAW_WAVE_LINE" ]; then
              # Parse "Wave 14 Batch B" → "14-batchB", "Wave 14" → "14", plain "14" → "14"
              if [[ "$RAW_WAVE_LINE" =~ [Ww]ave[[:space:]]+([0-9]+)[[:space:]]*([Bb]atch[[:space:]]+([A-Za-z0-9]+))? ]]; then
                WAVE_NUM="${BASH_REMATCH[1]}"
                if [ -n "${BASH_REMATCH[3]}" ]; then
                  BATCH="${BASH_REMATCH[3]}"
                  # Normalize batch letter to uppercase (e.g. "b" → "B") → "14-batchB"
                  WAVE_NUM="${WAVE_NUM}-batch$(echo "$BATCH" | tr '[:lower:]' '[:upper:]')"
                fi
              elif [[ "$RAW_WAVE_LINE" =~ ([0-9]+[-A-Za-z0-9]*) ]]; then
                WAVE_NUM="${BASH_REMATCH[1]}"
              else
                WAVE_NUM="unknown"
              fi
            else
              WAVE_NUM="unknown"
            fi
            echo "wave_num=$WAVE_NUM" >> "$GITHUB_OUTPUT"
          else
            echo "wave_num=unknown" >> "$GITHUB_OUTPUT"
          fi

      - name: Check if pre-brief artifact exists at T+10min
        id: check_prebrief
        run: |
          WAVE_NUM="${{ steps.wave_info.outputs.wave_num }}"
          ASSURANCE_DIR=".agent-admin/assurance"
          PREBRIEF_FOUND=false

          if [ "$WAVE_NUM" != "unknown" ]; then
            # Per IAA_PRE_BRIEF_PROTOCOL.md, pre-briefs may be stored as either:
            #   iaa-prebrief-wave<N>.md  (numeric waves, e.g. wave14)
            #   iaa-prebrief-<slug>.md   (slug-based, e.g. iaa-prebrief-14-batchB.md)
            for CANDIDATE in \
              "${ASSURANCE_DIR}/iaa-prebrief-wave${WAVE_NUM}.md" \
              "${ASSURANCE_DIR}/iaa-prebrief-${WAVE_NUM}.md"; do
              if [ -f "$CANDIDATE" ] && ! grep -qi "SUPERSEDED" "$CANDIDATE" 2>/dev/null; then
                PREBRIEF_FOUND=true
                break
              fi
            done
          fi

          # Fallback: any non-SUPERSEDED iaa-prebrief-*.md in assurance dir
          if [ "$PREBRIEF_FOUND" = "false" ] && [ -d "$ASSURANCE_DIR" ]; then
            while IFS= read -r -d '' f; do
              if ! grep -qi "SUPERSEDED" "$f" 2>/dev/null; then
                PREBRIEF_FOUND=true
                break
              fi
            done < <(find "$ASSURANCE_DIR" -name "iaa-prebrief-*.md" -print0 2>/dev/null)
          fi

          if [ "$PREBRIEF_FOUND" = "true" ]; then
            echo "prebrief_exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "prebrief_exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Post T+10min safety net warning if pre-brief still absent
        if: steps.check_prebrief.outputs.prebrief_exists == 'false'
        uses: actions/github-script@v7
        env:
          GH_REF: ${{ github.ref }}
          WAVE_NUM: ${{ steps.wave_info.outputs.wave_num }}
        with:
          script: |
            const branchRef = (process.env.GH_REF || '').replace('refs/heads/', '');
            const waveNum = (process.env.WAVE_NUM || 'unknown').trim();

            const warningBody = [
              '## ⚠️ GOVERNANCE WATCHDOG — Pre-Brief Not Detected (T+10min)',
              '',
              'The IAA Pre-Brief artifact has **not** been committed 10 minutes after the first push to this branch.',
              '',
              '**Agent instruction**: Stop all work. Invoke IAA Pre-Brief per Step 1.8 before continuing.',
              '',
              '**CS2 escalation**: The pre-brief reminder workflow fired but no pre-brief was performed.',
              `@APGI-cmy — T+10min safety net triggered on branch \`${branchRef}\` with no pre-brief artifact found.`,
              '',
              '### Possible causes:',
              '1. Agent skipped Step 1.8 (IAA Pre-Brief Invocation)',
              '2. `wave-current-tasks.md` not yet pushed to the branch',
              '3. Branch does not match `paths:` filter in `iaa-prebrief-inject.yml`',
              '4. Pre-brief artifact committed to wrong path (must be `.agent-admin/assurance/iaa-prebrief-wave[N].md`)',
              '5. GitHub Actions queue delay exceeded the safety net window',
              '',
              '### Required actions:',
              '1. If no PR exists: open a PR immediately (DRAFT is acceptable)',
              '2. Invoke the IAA Pre-Brief by commenting `/iaa-prebrief` on the PR',
              `3. Ensure the Pre-Brief artifact is committed to \`.agent-admin/assurance/iaa-prebrief-wave${waveNum}.md\``,
              '4. Do not proceed with further implementation until the artifact is confirmed',
              '',
              '*IAA Pre-Brief Safety Net (T+10min) — Authority: foreman-v2-agent contract Step 1.8, IAA_PRE_BRIEF_PROTOCOL.md v1.1.0*',
            ].join('\n');

            // Try to post to open PR first
            const { data: pulls } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              head: `${context.repo.owner}:${branchRef}`,
              per_page: 1,
            });

            if (pulls.length > 0) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pulls[0].number,
                body: warningBody,
              });
              core.warning(`T+10min safety net: Pre-Brief still absent. Alert posted on PR #${pulls[0].number}.`);
              return;
            }

            // No PR — attempt to resolve issue from wave-current-tasks.md or branch name
            const fs = require('fs');
            let issueNumber = null;

            const tasksFile = '.agent-workspace/foreman-v2/personal/wave-current-tasks.md';
            if (fs.existsSync(tasksFile)) {
              const fileContent = fs.readFileSync(tasksFile, 'utf8');
              const issueMatch = fileContent.match(/\*\*Issue\*\*:\s*#?(\d+)/i);
              if (issueMatch) {
                issueNumber = parseInt(issueMatch[1], 10);
              }
            }

            if (!issueNumber) {
              const branchMatch = branchRef.match(/[\/\-](\d{3,})/);
              if (branchMatch) {
                issueNumber = parseInt(branchMatch[1], 10);
              }
            }

            if (issueNumber) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
                body: warningBody,
              });
              core.warning(`T+10min safety net: Pre-Brief still absent. Alert posted on issue #${issueNumber}.`);
            } else {
              core.warning(`T+10min safety net: Pre-Brief still absent but could not resolve PR or issue number for branch '${branchRef}'.`);
            }
