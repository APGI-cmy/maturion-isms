name: Wave 7 Governance Validation

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  wave7-governance-validation:
    name: "preflight/wave7-governance-validation"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Run Wave 7 governance validation scenarios
        shell: bash
        run: node .github/scripts/wave7-governance-validation.js
