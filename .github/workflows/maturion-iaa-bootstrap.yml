name: Maturion IAA Bootstrap

# Authority: LIVING_AGENT_SYSTEM.md v6.2.0, IAA_PRE_BRIEF_PROTOCOL.md v1.1.0
# Purpose: Comment-triggered governance ceremony automation. Generates and commits
#          IAA Pre-Brief and governance token artifacts to PR feature branches.
#          Replaces the legacy injection workflow suite (agent-bootstrap-inject.yml,
#          iaa-prebrief-inject.yml, iaa-prebrief-gate.yml, injection-audit-report.yml)
#          which were disabled in Wave: disable-automatic-injections-and-reinforce-contract.
#
# Allowed write paths: .agent-admin/assurance/** and .agent-workspace/**
# Token: MATURION_BOT_TOKEN (required for artifact commit pushes)
#
# Trigger commands (PR comment):
#   /maturion-bootstrap          — run full bootstrap (pre-brief + agent runner)
#   /iaa-prebrief                — generate IAA pre-brief artifact only
#   /iaa-token <token-value>     — commit an IAA audit token file
#
# Container runner: .github/runner/ (see Dockerfile for deterministic execution)
# Agent runner stub: .github/scripts/agent-runner.sh

on:
  issue_comment:
    types: [created]
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to target (required for workflow_dispatch)'
        required: true
        type: string
      command:
        description: 'Command to run: bootstrap | iaa-prebrief | iaa-token'
        required: true
        default: 'bootstrap'
        type: choice
        options:
          - bootstrap
          - iaa-prebrief
          - iaa-token
      token_value:
        description: 'IAA token value (only required when command=iaa-token)'
        required: false
        type: string

permissions:
  contents: write
  pull-requests: write
  issues: write

# Prevent concurrent bootstrap runs on the same PR
concurrency:
  group: maturion-iaa-bootstrap-${{ github.event.issue.number || github.event.inputs.pr_number }}
  cancel-in-progress: false

jobs:
  # ── GATE: parse comment and decide whether to run ─────────────────────────
  parse-command:
    name: "bootstrap/parse-command"
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.parse.outputs.should_run }}
      command: ${{ steps.parse.outputs.command }}
      pr_number: ${{ steps.parse.outputs.pr_number }}
      token_value: ${{ steps.parse.outputs.token_value }}
      actor: ${{ steps.parse.outputs.actor }}
    steps:
      - name: Parse trigger and command
        id: parse
        env:
          COMMENT_BODY: ${{ github.event.comment.body || '' }}
          COMMENT_AUTHOR: ${{ github.event.comment.user.login || '' }}
          IS_PR_COMMENT: ${{ github.event.issue.pull_request != null }}
          ISSUE_NUMBER: ${{ github.event.issue.number || '' }}
          WD_PR_NUMBER: ${{ github.event.inputs.pr_number || '' }}
          WD_COMMAND: ${{ github.event.inputs.command || '' }}
          WD_TOKEN_VALUE: ${{ github.event.inputs.token_value || '' }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          set -euo pipefail

          SHOULD_RUN=false
          COMMAND=""
          PR_NUMBER=""
          TOKEN_VALUE=""
          ACTOR=""

          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            # Manual trigger always runs
            SHOULD_RUN=true
            COMMAND="$WD_COMMAND"
            PR_NUMBER="$WD_PR_NUMBER"
            TOKEN_VALUE="$WD_TOKEN_VALUE"
            ACTOR="workflow_dispatch"
          elif [ "$EVENT_NAME" = "issue_comment" ]; then
            # Only fire on PR comments (not issue comments)
            if [ "$IS_PR_COMMENT" != "true" ]; then
              echo "Not a PR comment — skipping."
              echo "should_run=false" >> "$GITHUB_OUTPUT"
              exit 0
            fi

            # Parse command from comment body
            BODY_FIRST_LINE=$(echo "$COMMENT_BODY" | head -1 | xargs)

            if echo "$BODY_FIRST_LINE" | grep -qE "^/maturion-bootstrap(\s|$)"; then
              COMMAND="bootstrap"
              SHOULD_RUN=true
            elif echo "$BODY_FIRST_LINE" | grep -qE "^/iaa-prebrief(\s|$)"; then
              COMMAND="iaa-prebrief"
              SHOULD_RUN=true
            elif echo "$BODY_FIRST_LINE" | grep -qE "^/iaa-token(\s|$)"; then
              COMMAND="iaa-token"
              TOKEN_VALUE=$(echo "$BODY_FIRST_LINE" | sed 's|^/iaa-token[[:space:]]*||')
              SHOULD_RUN=true
            fi

            PR_NUMBER="$ISSUE_NUMBER"
            ACTOR="$COMMENT_AUTHOR"
          fi

          echo "should_run=$SHOULD_RUN"   >> "$GITHUB_OUTPUT"
          echo "command=$COMMAND"          >> "$GITHUB_OUTPUT"
          echo "pr_number=$PR_NUMBER"      >> "$GITHUB_OUTPUT"
          echo "token_value=$TOKEN_VALUE"  >> "$GITHUB_OUTPUT"
          echo "actor=$ACTOR"              >> "$GITHUB_OUTPUT"

          echo "=== Parse result ==="
          echo "should_run: $SHOULD_RUN"
          echo "command:    $COMMAND"
          echo "pr_number:  $PR_NUMBER"
          echo "actor:      $ACTOR"

  # ── MAIN: run bootstrap on the PR branch ──────────────────────────────────
  run-bootstrap:
    name: "bootstrap/run"
    runs-on: ubuntu-latest
    needs: parse-command
    if: needs.parse-command.outputs.should_run == 'true'
    steps:
      # ── Token guard — must be first ────────────────────────────────────────
      - name: Validate MATURION_BOT_TOKEN
        env:
          TOKEN: ${{ secrets.MATURION_BOT_TOKEN }}
        run: |
          if [ -z "$TOKEN" ]; then
            echo "::error::MATURION_BOT_TOKEN is not set or empty."
            echo "::error::All governance artifact commit pushes require MATURION_BOT_TOKEN."
            echo "::error::Fallback to GITHUB_TOKEN is prohibited (Maturion governance policy Gap 5)."
            exit 1
          fi
          echo "MATURION_BOT_TOKEN is present — token validation passed."

      # ── Authorization guard — trusted collaborators only ──────────────────
      # Security: issue_comment fires from the default branch context, but the
      # subsequent checkout targets the PR HEAD branch. To prevent a malicious
      # PR author from triggering execution of their own modified agent-runner.sh
      # with MATURION_BOT_TOKEN + contents:write, we require the comment author
      # to have at minimum 'write' permission on the repository.
      - name: Verify comment author has write permission
        if: github.event_name == 'issue_comment'
        env:
          GH_TOKEN: ${{ secrets.MATURION_BOT_TOKEN }}
          ACTOR: ${{ needs.parse-command.outputs.actor }}
        run: |
          set -euo pipefail
          PERM=$(gh api \
            "repos/${{ github.repository }}/collaborators/${ACTOR}/permission" \
            --jq '.permission' 2>/dev/null || echo "none")
          echo "Comment author '${ACTOR}' permission: ${PERM}"
          case "$PERM" in
            admin|write|maintain)
              echo "Authorization: PASS — '${ACTOR}' has '${PERM}' access."
              ;;
            *)
              echo "::error::Authorization FAILED: '${ACTOR}' has '${PERM}' access."
              echo "::error::Bootstrap commands require write (or higher) repository permission."
              exit 1
              ;;
          esac

      # ── Resolve PR head branch ────────────────────────────────────────────
      - name: Resolve PR head branch
        id: pr-info
        env:
          GH_TOKEN: ${{ secrets.MATURION_BOT_TOKEN }}
          PR_NUMBER: ${{ needs.parse-command.outputs.pr_number }}
        run: |
          set -euo pipefail
          PR_DATA=$(gh api "repos/${{ github.repository }}/pulls/${PR_NUMBER}" \
            --jq '{"head_ref": .head.ref, "head_sha": .head.sha, "state": .state}')
          HEAD_REF=$(echo "$PR_DATA" | jq -r '.head_ref')
          HEAD_SHA=$(echo "$PR_DATA" | jq -r '.head_sha')
          PR_STATE=$(echo "$PR_DATA" | jq -r '.state')

          if [ "$PR_STATE" != "open" ]; then
            echo "::error::PR #${PR_NUMBER} is not open (state: ${PR_STATE}). Cannot commit artifacts."
            exit 1
          fi

          echo "head_ref=$HEAD_REF"   >> "$GITHUB_OUTPUT"
          echo "head_sha=$HEAD_SHA"   >> "$GITHUB_OUTPUT"
          echo "PR branch: $HEAD_REF ($HEAD_SHA)"

      # ── Checkout repo default branch to get trusted agent-runner.sh ───────
      # Security: We checkout the DEFAULT BRANCH (not the PR HEAD branch) to
      # ensure agent-runner.sh comes from trusted, merged code — not from the
      # PR author's potentially malicious branch. The agent runner only writes
      # to .agent-admin/assurance/ and .agent-workspace/ and the results are
      # committed to the PR branch via git push (not via the checkout ref).
      - name: Checkout default branch (trusted agent-runner.sh)
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.MATURION_BOT_TOKEN }}
          ref: ${{ github.event.repository.default_branch }}
          fetch-depth: 1

      # ── Configure Git identity ────────────────────────────────────────────
      - name: Configure Git
        run: |
          git config --global user.name "Maturion Bot"
          git config --global user.email "bot@maturion.ai"

      # ── Run agent runner stub (from trusted default-branch checkout) ──────
      # Security: agent-runner.sh executes HERE while agent-runner.sh still
      # points to the trusted default-branch version. Any artifacts it creates
      # are untracked files — git will not remove them on branch switch.
      - name: Run agent runner
        env:
          COMMAND: ${{ needs.parse-command.outputs.command }}
          PR_NUMBER: ${{ needs.parse-command.outputs.pr_number }}
          TOKEN_VALUE: ${{ needs.parse-command.outputs.token_value }}
          ACTOR: ${{ needs.parse-command.outputs.actor }}
          BRANCH: ${{ steps.pr-info.outputs.head_ref }}
        run: |
          chmod +x .github/scripts/agent-runner.sh
          .github/scripts/agent-runner.sh \
            --command "$COMMAND" \
            --pr-number "$PR_NUMBER" \
            --branch "$BRANCH" \
            --actor "$ACTOR" \
            --token-value "$TOKEN_VALUE"

      # ── Push artifacts to PR branch via GitHub API (no git checkout) ────────
      # Security: We never check out the PR branch. Artifacts are pushed directly
      # via the GitHub Contents API, preventing untrusted PR code from executing
      # in the context of a privileged workflow with MATURION_BOT_TOKEN.
      - name: Push governance artifacts to PR branch via API
        id: commit
        env:
          GH_TOKEN: ${{ secrets.MATURION_BOT_TOKEN }}
          COMMAND: ${{ needs.parse-command.outputs.command }}
          PR_NUMBER: ${{ needs.parse-command.outputs.pr_number }}
          PR_BRANCH: ${{ steps.pr-info.outputs.head_ref }}
        run: |
          set -euo pipefail

          REPO="${{ github.repository }}"
          COMMITTED=false
          DATESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          COMMIT_MSG="chore(governance): bootstrap ${COMMAND} artifacts for PR #${PR_NUMBER} [${DATESTAMP}]"

          # WRITE PATH RESTRICTION: only these two paths are allowed.
          ALLOWED_PATHS=(".agent-admin/assurance" ".agent-workspace")

          # Collect new/modified files under allowed paths only.
          ARTIFACT_FILES=()
          while IFS= read -r -d '' f; do
            REL="${f#./}"
            ALLOWED=false
            for AP in "${ALLOWED_PATHS[@]}"; do
              if [[ "$REL" == "${AP}/"* ]]; then ALLOWED=true; break; fi
            done
            if [ "$ALLOWED" = "true" ]; then
              ARTIFACT_FILES+=("$REL")
            fi
          done < <(find .agent-admin/assurance .agent-workspace \
            -type f -newer .git/HEAD -print0 2>/dev/null || true)

          if [ "${#ARTIFACT_FILES[@]}" -eq 0 ]; then
            echo "No new governance artifacts — nothing to commit."
            echo "committed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          for FILE in "${ARTIFACT_FILES[@]}"; do
            CONTENT=$(base64 -w 0 "$FILE")
            # Get existing file SHA if the file already exists on the branch
            EXISTING_SHA=$(gh api \
              "repos/${REPO}/contents/${FILE}?ref=${PR_BRANCH}" \
              --jq '.sha' 2>/dev/null || echo "")
            if [ -n "$EXISTING_SHA" ]; then
              gh api --method PUT "repos/${REPO}/contents/${FILE}" \
                -f message="$COMMIT_MSG" \
                -f content="$CONTENT" \
                -f branch="$PR_BRANCH" \
                -f sha="$EXISTING_SHA"
            else
              gh api --method PUT "repos/${REPO}/contents/${FILE}" \
                -f message="$COMMIT_MSG" \
                -f content="$CONTENT" \
                -f branch="$PR_BRANCH"
            fi
            echo "Pushed: ${FILE}"
            COMMITTED=true
          done

          echo "committed=${COMMITTED}" >> "$GITHUB_OUTPUT"
          echo "Governance artifacts pushed to branch ${PR_BRANCH}."

      # ── Post acknowledgement comment ──────────────────────────────────────
      - name: Post result comment
        if: github.event_name == 'issue_comment'
        uses: actions/github-script@v7
        env:
          COMMAND: ${{ needs.parse-command.outputs.command }}
          COMMITTED: ${{ steps.commit.outputs.committed }}
          BRANCH: ${{ steps.pr-info.outputs.head_ref }}
        with:
          github-token: ${{ secrets.MATURION_BOT_TOKEN }}
          script: |
            const command  = process.env.COMMAND   || 'unknown';
            const committed = process.env.COMMITTED || 'false';
            const branch   = process.env.BRANCH    || 'unknown';
            const prNumber = context.payload.issue.number;

            const statusIcon = committed === 'true' ? '✅' : 'ℹ️';
            const statusMsg  = committed === 'true'
              ? 'Governance artifacts committed to branch.'
              : 'No new artifacts generated (idempotent — artifacts already present).';

            const body = [
              `## ${statusIcon} Maturion IAA Bootstrap — \`/${command}\``,
              '',
              `**Branch**: \`${branch}\``,
              `**Result**: ${statusMsg}`,
              '',
              '### Allowed write paths',
              '- `.agent-admin/assurance/`',
              '- `.agent-workspace/`',
              '',
              '*Authority: CS2 (Johan Ras / @APGI-cmy) — IAA_PRE_BRIEF_PROTOCOL.md v1.1.0*',
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body,
            });
