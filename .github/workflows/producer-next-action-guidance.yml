name: Producer Next Action Guidance

# Authority: maturion-isms#1718
# Purpose: Post exactly one sticky advisory comment with the current producer
#          next action before any final summary / ready-for-review / handover posture.

on:
  pull_request_target:
    types: [opened, synchronize, reopened, edited, ready_for_review]
  issue_comment:
    types: [created, edited]

permissions:
  contents: read
  pull-requests: write
  issues: write
  checks: read

jobs:
  producer-next-action-guidance:
    name: "producer/next-action-guidance"
    runs-on: ubuntu-latest
    if: |
      (
        github.event_name == 'pull_request_target' &&
        (
          startsWith(github.event.pull_request.head.ref, 'copilot/') ||
          github.event.pull_request.user.login == 'Copilot'
        )
      ) ||
      (
        github.event_name == 'issue_comment' &&
        github.event.issue.pull_request != null
      )

    steps:
      - name: Checkout trusted default branch utilities
        uses: actions/checkout@v5
        with:
          ref: refs/heads/${{ github.event.repository.default_branch }}
          persist-credentials: false

      - name: Resolve trusted PR context
        id: context
        uses: actions/github-script@v7
        with:
          script: |
            const handoverIntent = require('./.github/scripts/handover-intent.js');
            const stickyMarker = '<!-- producer-next-action-shortfall -->';
            const isIssueComment = context.eventName === 'issue_comment';
            const rawCommentBody = context.payload.comment?.body || '';
            const commentAuthorType = String(context.payload.comment?.user?.type || '').toLowerCase();

            if (
              isIssueComment &&
              (
                commentAuthorType === 'bot' ||
                rawCommentBody.includes(stickyMarker) ||
                !handoverIntent.shouldProcessProducerGuidanceIssueComment(rawCommentBody)
              )
            ) {
              core.setOutput('matched', 'false');
              return;
            }

            let prNumber;
            let pr;
            let triggerBody = '';

            if (isIssueComment) {
              prNumber = context.payload.issue.number;
              triggerBody = rawCommentBody.trim();
              ({ data: pr } = await github.rest.pulls.get({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: prNumber,
              }));
            } else {
              pr = context.payload.pull_request;
              prNumber = pr.number;
              triggerBody = context.payload.action === 'ready_for_review'
                ? 'ready for review'
                : `pull_request_target:${context.payload.action}`;
            }

            core.setOutput('matched', 'true');
            core.setOutput('pr_number', String(prNumber));
            core.setOutput('head_sha', pr.head.sha);
            core.setOutput('base_sha', pr.base.sha);
            core.setOutput('base_ref', pr.base.ref || '');
            core.setOutput('head_ref', pr.head.ref || '');
            core.setOutput('title', pr.title || '');
            core.setOutput('body', pr.body || '');
            core.setOutput('updated_at', pr.updated_at || '');
            core.setOutput('trigger_body', triggerBody);

      - name: Collect current-head checkpoint inputs
        id: inputs
        if: steps.context.outputs.matched == 'true'
        uses: actions/github-script@v7
        env:
          CHECKPOINT_INPUT_DIR: ${{ runner.temp }}/producer-next-action-guidance
          PR_NUMBER: ${{ steps.context.outputs.pr_number }}
          HEAD_SHA: ${{ steps.context.outputs.head_sha }}
          PR_BODY: ${{ steps.context.outputs.body }}
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const headSha = process.env.HEAD_SHA;
            const prNumber = parseInt(process.env.PR_NUMBER, 10);
            const prBody = process.env.PR_BODY || '';

            const { data: checkRunsData } = await github.rest.checks.listForRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: headSha,
              per_page: 100,
            });

            const { data: statusData } = await github.rest.repos.getCombinedStatusForRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: headSha,
            });

            const issueMatch = (context.payload.comment?.body || '').match(/#(\d+)/);
            let issueNumber = issueMatch ? issueMatch[1] : '';
            const repoFiles = {};
            const comments = [];

            const fetchFile = async (targetPath) => {
              try {
                const { data } = await github.rest.repos.getContent({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  path: targetPath,
                  ref: headSha,
                });
                if (!Array.isArray(data) && data.type === 'file') {
                  repoFiles[targetPath] = Buffer.from(data.content, 'base64').toString('utf8');
                }
              } catch (error) {
                if (error.status !== 404) {
                  core.info(`Unable to fetch ${targetPath} at ${headSha}: ${error.message}`);
                }
              }
            };

            const fetchDirectory = async (targetPath, includePattern) => {
              try {
                const { data } = await github.rest.repos.getContent({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  path: targetPath,
                  ref: headSha,
                });
                if (!Array.isArray(data)) return;
                for (const entry of data) {
                  if (entry.type !== 'file') continue;
                  if (includePattern && !includePattern.test(entry.path)) continue;
                  await fetchFile(entry.path);
                }
              } catch (error) {
                if (error.status !== 404) {
                  core.info(`Unable to list ${targetPath} at ${headSha}: ${error.message}`);
                }
              }
            };

            let changedFiles = [];
            let page = 1;
            while (true) {
              const { data: files } = await github.rest.pulls.listFiles({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: prNumber,
                per_page: 100,
                page,
              });
              changedFiles = changedFiles.concat(files.map((file) => file.filename));
              if (files.length < 100) break;
              page += 1;
            }

            page = 1;
            while (true) {
              const { data: pageComments } = await github.rest.issues.listComments({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                per_page: 100,
                page,
              });
              comments.push(...pageComments);
              if (pageComments.length < 100) break;
              page += 1;
            }

            if (!issueNumber) {
              const scopePath = `.agent-admin/scope-declarations/pr-${prNumber}.md`;
              await fetchFile(scopePath);
              const scopeText = repoFiles[scopePath] || '';
              const match = scopeText.match(/^ISSUE:\s*#?(\d+)/m);
              if (match) issueNumber = match[1];
            }

            await fetchFile(`.admin/prs/pr-${prNumber}.json`);
            await fetchFile('.admin/pr.json');
            await fetchFile(`.agent-admin/scope-declarations/pr-${prNumber}.md`);
            await fetchFile(`.functional-delivery/pr-${prNumber}.md`);

            const bodyArtifactMatch = prBody.match(/Functional-Delivery-Artifact:\s*(\S+)/i);
            if (bodyArtifactMatch) {
              await fetchFile(bodyArtifactMatch[1]);
            }

            await fetchDirectory('.agent-admin/assurance', /^\.agent-admin\/assurance\/(iaa-prebrief-|iaa-token-|iaa-wave-record-).+\.md$/);
            await fetchDirectory('.agent-admin/prehandover', /^\.agent-admin\/prehandover\/proof-.+\.md$/);
            await fetchDirectory('.agent-workspace/execution-ceremony-admin-agent/bundles', /^\.agent-workspace\/execution-ceremony-admin-agent\/bundles\/.+\.md$/);
            await fetchDirectory('.agent-workspace/foreman-v2/memory', /^\.agent-workspace\/foreman-v2\/memory\/PREHANDOVER-.+\.md$/);

            fs.mkdirSync(process.env.CHECKPOINT_INPUT_DIR, { recursive: true });
            const writeJson = (name, value) => {
              const targetPath = path.join(process.env.CHECKPOINT_INPUT_DIR, `pr-${prNumber}-${name}.json`);
              fs.writeFileSync(targetPath, JSON.stringify(value));
              return targetPath;
            };
            const repoFilesPath = path.join(process.env.CHECKPOINT_INPUT_DIR, `pr-${prNumber}-repo-files.json`);
            fs.writeFileSync(repoFilesPath, JSON.stringify(repoFiles));

            core.setOutput('check_runs_path', writeJson('check-runs', checkRunsData.check_runs || []));
            core.setOutput('commit_statuses_path', writeJson('commit-statuses', statusData.statuses || []));
            core.setOutput('pr_comments_path', writeJson('comments', comments));
            core.setOutput('changed_files_path', writeJson('changed-files', changedFiles));
            core.setOutput('repo_files_path', repoFilesPath);
            core.setOutput('issue_number', issueNumber);

      - name: Evaluate producer next action state
        id: evaluate
        if: steps.context.outputs.matched == 'true'
        env:
          PR_NUMBER: ${{ steps.context.outputs.pr_number }}
          ISSUE_NUMBER: ${{ steps.inputs.outputs.issue_number }}
          PR_TITLE: ${{ steps.context.outputs.title }}
          PR_BODY: ${{ steps.context.outputs.body }}
          PR_UPDATED_AT: ${{ steps.context.outputs.updated_at }}
          PR_BRANCH: ${{ steps.context.outputs.head_ref }}
          BASE_BRANCH: ${{ steps.context.outputs.base_ref }}
          BASE_SHA: ${{ steps.context.outputs.base_sha }}
          HEAD_SHA: ${{ steps.context.outputs.head_sha }}
          CHECKPOINT_TRIGGER: ${{ steps.context.outputs.trigger_body }}
          CHECKPOINT_INTAKE_ONLY: "true"
          CHECKPOINT_MARK_CURRENT_RUN_AS_INTAKE: "true"
          CHECKPOINT_CHECK_RUNS_PATH: ${{ steps.inputs.outputs.check_runs_path }}
          CHECKPOINT_COMMIT_STATUSES_PATH: ${{ steps.inputs.outputs.commit_statuses_path }}
          CHECKPOINT_CHANGED_FILES_PATH: ${{ steps.inputs.outputs.changed_files_path }}
          CHECKPOINT_PR_COMMENTS_PATH: ${{ steps.inputs.outputs.pr_comments_path }}
          CHECKPOINT_REPO_FILES_PATH: ${{ steps.inputs.outputs.repo_files_path }}
        run: |
          RESULT_JSON="$(node .github/scripts/pre-handover-checkpoint.js)"
          RESULT_JSON_B64="$(printf '%s' "$RESULT_JSON" | base64 | tr -d '\n')"
          echo "result_json_b64=$RESULT_JSON_B64" >> "$GITHUB_OUTPUT"
          printf '%s\n' "$RESULT_JSON"

      - name: Upsert sticky producer guidance comment
        if: steps.context.outputs.matched == 'true'
        uses: actions/github-script@v7
        env:
          PR_NUMBER: ${{ steps.context.outputs.pr_number }}
          HEAD_SHA: ${{ steps.context.outputs.head_sha }}
          RESULT_JSON_B64: ${{ steps.evaluate.outputs.result_json_b64 }}
        with:
          script: |
            const { STICKY_MARKER, renderGuidanceComment } = require('./.github/scripts/producer-next-action-guidance.js');
            const prNumber = parseInt(process.env.PR_NUMBER, 10);
            const headSha = process.env.HEAD_SHA || '';
            const resultJsonB64 = process.env.RESULT_JSON_B64 || '';
            const decodedResult = resultJsonB64
              ? Buffer.from(resultJsonB64, 'base64').toString('utf8')
              : '{}';
            const result = JSON.parse(decodedResult);
            const body = renderGuidanceComment({
              prNumber,
              headSha,
              fields: result.fields || {},
            });

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              per_page: 100,
            });

            const stickyComments = comments
              .filter((comment) => comment.body && comment.body.includes(STICKY_MARKER))
              .sort((left, right) => new Date(right.updated_at || right.created_at) - new Date(left.updated_at || left.created_at));

            const [primary, ...duplicates] = stickyComments;

            if (primary) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: primary.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body,
              });
            }

            for (const duplicate of duplicates) {
              await github.rest.issues.deleteComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: duplicate.id,
              });
            }
