name: IAA Pre-Brief Gate

# Reminder/detection gate: checks whether an IAA Pre-Brief artifact exists in
# .agent-admin/assurance/ on the PR branch. Posts a reminder comment if missing.
# Does NOT hard-block CI.
#
# DISABLED — Wave: disable-automatic-injections-and-reinforce-contract (issue #1061)
# Automatic injection gate is on hold. File preserved for future AMC use.
# To re-enable: restore the original event triggers below.
on:
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for manual trigger'
        required: false
        default: 'Manual activation'

permissions:
  pull-requests: write
  issues: write
  contents: read

jobs:
  iaa-prebrief-gate:
    runs-on: ubuntu-latest

    # Only run for foreman PRs: branches starting with 'copilot/' (GitHub Copilot
    # coding agent branch naming convention) or PRs authored by the Copilot bot.
    if: >-
      startsWith(github.head_ref, 'copilot/') ||
      github.event.pull_request.user.login == 'Copilot'

    steps:
      - name: Checkout PR head branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 1

      - name: Check for IAA Pre-Brief artifact
        id: check
        run: |
          ASSURANCE_DIR=".agent-admin/assurance"
          PREBRIEF_FOUND=false
          if [ -d "$ASSURANCE_DIR" ]; then
            while IFS= read -r -d '' f; do
              if ! grep -qi "SUPERSEDED" "$f" 2>/dev/null; then
                PREBRIEF_FOUND=true; break
              fi
            done < <(find "$ASSURANCE_DIR" -name "iaa-prebrief-*.md" -print0 2>/dev/null)
          fi
          if $PREBRIEF_FOUND; then
            echo "iaa_prebrief_found=true" >> "$GITHUB_OUTPUT"
          else
            echo "iaa_prebrief_found=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Post reminder comment (IAA Pre-Brief artifact missing)
        if: steps.check.outputs.iaa_prebrief_found == 'false'
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.payload.pull_request.number;
            const MARKER = '## 🔴 IAA Pre-Brief Gate: MISSING';

            // Idempotency guard: skip if an active reminder comment already exists
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              per_page: 100,
            });
            const alreadyPosted = comments.some(
              (c) => c.body && c.body.includes(MARKER)
            );
            if (alreadyPosted) {
              core.notice('IAA Pre-Brief reminder comment already present — skipping duplicate.');
              return;
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body: [
                '## 🔴 IAA Pre-Brief Gate: MISSING Pre-Brief Artifact',
                '',
                '@Copilot — This PR does not yet have an IAA Pre-Brief artifact at `.agent-admin/assurance/iaa-prebrief-wave<N>.md`.',
                '',
                '### What You Failed to Do — and Must Do Now',
                '',
                'You opened this PR without invoking the Independent Assurance Agent (IAA) to generate the Wave Pre-Brief (`iaa-prebrief-wave<N>.md`).',
                '',
                'This is a **constitutional gate failure**. Per `IAA_PRE_BRIEF_PROTOCOL.md §Trigger` and your agent contract `§3.0a`, the sequence is:',
                '',
                '1. ✅ Create `.agent-workspace/foreman-v2/personal/wave-current-tasks.md` — populate with ALL wave tasks',
                '2. ✅ Invoke IAA via `task(agent_type: "independent-assurance-agent", action: "PRE-BRIEF", wave: <N>)`',
                '3. ✅ Wait for IAA to publish the Pre-Brief at `.agent-admin/assurance/iaa-prebrief-wave<N>.md`',
                '4. ✅ Communicate the Pre-Brief path to ALL builders before they begin any qualifying task',
                '5. ❌ **You did not do steps 1–4 before delegating work. Fix this now.**',
                '',
                '**You are PROHIBITED from delegating any qualifying task to any builder until the IAA Pre-Brief exists on this branch.**',
                '',
                'Comment `/iaa-prebrief` on this PR to trigger the IAA Pre-Brief Injection workflow.',
                '',
                '**Authority**: CS2 — @APGI-cmy',
              ].join('\n'),
            });

      - name: Log IAA Pre-Brief artifact detected
        if: steps.check.outputs.iaa_prebrief_found == 'true'
        run: |
          echo "::notice::IAA Pre-Brief artifact detected in .agent-admin/assurance/ — gate passed."
