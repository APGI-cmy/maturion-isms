name: IAA Pre-Brief Gate

# Reminder/detection gate: checks whether a canonical IAA Pre-Brief exists
# under ## PRE-BRIEF in .agent-admin/assurance/iaa-wave-record-*.md on the PR branch.
# Posts a concise reminder comment if missing. Does NOT hard-block CI.
on:
  pull_request_target:
    types: [opened, ready_for_review, synchronize]
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for manual trigger'
        required: false
        default: 'Manual activation'

permissions:
  pull-requests: write
  issues: write
  contents: read

jobs:
  iaa-prebrief-gate:
    runs-on: ubuntu-latest

    # Only run for foreman PRs: branches starting with 'copilot/' or PRs authored by the Copilot bot.
    if: >-
      startsWith(github.head_ref, 'copilot/') ||
      github.event.pull_request.user.login == 'Copilot'

    steps:
      - name: Checkout PR head branch
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 1

      - name: Check for canonical IAA Pre-Brief wave record
        id: check
        run: |
          ASSURANCE_DIR=".agent-admin/assurance"
          PREBRIEF_FOUND=false
          if [ -d "$ASSURANCE_DIR" ]; then
            while IFS= read -r -d '' f; do
              if grep -q "## PRE-BRIEF" "$f" 2>/dev/null && \
                 grep -q "IAA_PREFLIGHT_BRIEF:" "$f" 2>/dev/null && \
                 grep -q "result: PREFLIGHT_BRIEF_COMPLETE" "$f" 2>/dev/null && \
                 ! grep -qi "SUPERSEDED" "$f" 2>/dev/null; then
                PREBRIEF_FOUND=true; break
              fi
            done < <(find "$ASSURANCE_DIR" -name "iaa-wave-record-*.md" -print0 2>/dev/null)
          fi
          if $PREBRIEF_FOUND; then
            echo "iaa_prebrief_found=true" >> "$GITHUB_OUTPUT"
          else
            echo "iaa_prebrief_found=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Post reminder comment (IAA Pre-Brief wave record missing)
        if: steps.check.outputs.iaa_prebrief_found == 'false'
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.payload.pull_request.number;
            const marker = '## IAA Pre-Brief Gate: Missing Canonical Wave Record';
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              per_page: 100,
            });
            if (comments.some((c) => c.body && c.body.includes(marker))) {
              core.notice('Reminder comment already present; skipping duplicate.');
              return;
            }
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body: [
                marker,
                '',
                'This PR needs a canonical IAA pre-brief wave record under `## PRE-BRIEF` in `.agent-admin/assurance/iaa-wave-record-{wave}-{date}.md`.',
                '',
                'The record should include `IAA_PREFLIGHT_BRIEF:`, `schema_version: "1.0.0"`, and `result: PREFLIGHT_BRIEF_COMPLETE`.',
                '',
                'Use `.agent-admin/control/schemas/iaa-preflight-brief.schema.json` and `.agent-admin/control/protocols/IAA_PREFLIGHT_BRIEF_PROTOCOL.md` as the canonical references.'
              ].join('\n'),
            });

      - name: Log IAA Pre-Brief wave record detected
        if: steps.check.outputs.iaa_prebrief_found == 'true'
        run: |
          echo "::notice::Canonical IAA Pre-Brief wave record detected in .agent-admin/assurance/ — gate passed."
