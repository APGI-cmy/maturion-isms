name: PIT Slice 4 Authenticated LFV

on:
  pull_request:
    paths:
      - '.github/workflows/pit-slice4-authenticated-lfv.yml'
      - 'apps/isms-portal/**'
      - 'supabase/migrations/**'

permissions:
  contents: read

jobs:
  authenticated-lfv:
    # PR #1952 governed deployed browser verification.
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    env:
      SUPABASE_URL: https://ujucvyyspfxlxlfdamda.supabase.co
      SUPABASE_KEY: sb_publishable_ZUKVt9ixujFGVpI3JVzGEw_MIQYm2np
      PREVIEW_URL: https://maturion-isms-portal-git-pit-stage12-1a1797-rassie-ras-projects.vercel.app
      LFV_EMAIL: ${{ secrets.PIT_TEST_PROJECT_MANAGER_EMAIL }}
      LFV_PASSWORD: ${{ secrets.PIT_TEST_PROJECT_MANAGER_PASSWORD }}
      VERCEL_BYPASS_TOKEN: ${{ secrets.PIT_VERCEL_AUTOMATION_BYPASS_SECRET }}
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.0
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile
      - name: Install Chromium
        run: pnpm exec playwright install --with-deps chromium
      - name: Validate governed LFV identity
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "$LFV_EMAIL" ] || [ -z "$LFV_PASSWORD" ]; then
            echo 'Required governed PIT project-manager secrets are not configured.' >&2
            exit 1
          fi
          if [ -z "$VERCEL_BYPASS_TOKEN" ]; then
            echo 'Required PIT_VERCEL_AUTOMATION_BYPASS_SECRET is not configured.' >&2
            exit 1
          fi
          PROJECT_NAME="PIT Slice 4 LFV ${GITHUB_RUN_ID}"
          printf 'LFV_PROJECT_NAME=%s\n' "$PROJECT_NAME" >> "$GITHUB_ENV"
          RESPONSE=$(curl --fail-with-body --silent --show-error \
            -X POST "$SUPABASE_URL/auth/v1/token?grant_type=password" \
            -H "apikey: $SUPABASE_KEY" \
            -H 'Content-Type: application/json' \
            --data "{\"email\":\"$LFV_EMAIL\",\"password\":\"$LFV_PASSWORD\"}")
          TOKEN=$(printf '%s' "$RESPONSE" | node -e "let d='';process.stdin.on('data',c=>d+=c);process.stdin.on('end',()=>{const r=JSON.parse(d);if(!r.access_token)throw new Error(JSON.stringify(r));process.stdout.write(r.access_token)})")
          USER_ID=$(printf '%s' "$RESPONSE" | node -e "let d='';process.stdin.on('data',c=>d+=c);process.stdin.on('end',()=>{const r=JSON.parse(d);if(!r.user?.id)throw new Error(JSON.stringify(r));process.stdout.write(r.user.id)})")
          printf 'LFV_ACCESS_TOKEN=%s\nLFV_USER_ID=%s\n' "$TOKEN" "$USER_ID" >> "$GITHUB_ENV"
          MEMBERSHIPS=$(curl --fail-with-body --silent --show-error "$SUPABASE_URL/rest/v1/user_org_memberships?select=org_id,status&user_id=eq.$USER_ID&status=eq.active" -H "apikey: $SUPABASE_KEY" -H "Authorization: Bearer $TOKEN")
          ORG_ID=$(printf '%s' "$MEMBERSHIPS" | node -e "let d='';process.stdin.on('data',c=>d+=c);process.stdin.on('end',()=>{const rows=JSON.parse(d);if(rows.length!==1)throw new Error('Expected exactly one active organisation membership; found '+rows.length);process.stdout.write(rows[0].org_id)})")
          ROLES=$(curl --fail-with-body --silent --show-error "$SUPABASE_URL/rest/v1/user_roles?select=role&user_id=eq.$USER_ID&org_id=eq.$ORG_ID&role=eq.project_manager" -H "apikey: $SUPABASE_KEY" -H "Authorization: Bearer $TOKEN")
          ROLE_COUNT=$(printf '%s' "$ROLES" | node -e "let d='';process.stdin.on('data',c=>d+=c);process.stdin.on('end',()=>process.stdout.write(String(JSON.parse(d).length)))")
          if [ "$ROLE_COUNT" != "1" ]; then
            echo "Governed LFV identity does not have exactly one project_manager role in its active organisation." >&2
            exit 1
          fi
          printf 'user_id=%s\norg_id=%s\nproject_name=%s\n' "$USER_ID" "$ORG_ID" "$PROJECT_NAME" > lfv-fixture.txt
      - name: Run authenticated deployed browser journey
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p lfv-artifacts
          node <<'NODE'
          const { chromium } = require('playwright');
          const fs = require('fs');
          let browser;
          let page;
          let checkpoint = 'startup';
          (async () => {
            browser = await chromium.launch({ headless: true });
            const context = await browser.newContext({
              viewport: { width: 1440, height: 1000 },
              extraHTTPHeaders: {
                'x-vercel-protection-bypass': process.env.VERCEL_BYPASS_TOKEN,
                'x-vercel-set-bypass-cookie': 'true',
              },
            });
            await context.addInitScript(() => {
              localStorage.setItem('isms_pending_checkout', JSON.stringify({
                selectedModules: ['project-implementation'],
                isBundle: false,
                isYearly: true,
                source: 'pit-slice4-lfv',
                completedAt: new Date().toISOString(),
              }));
            });
            page = await context.newPage();
            page.on('console', message => console.log(`[browser:${message.type()}] ${message.text()}`));
            page.on('pageerror', error => console.error(`[browser-pageerror] ${error.message}`));
            const base = process.env.PREVIEW_URL;
            checkpoint = 'vercel-bypass';
            await page.goto(`${base}/login`, { waitUntil: 'networkidle' });
            await page.screenshot({ path: 'lfv-artifacts/00-login.png', fullPage: true });
            checkpoint = 'login-submit';
            await page.getByLabel('Work email').fill(process.env.LFV_EMAIL);
            await page.getByLabel('Password').fill(process.env.LFV_PASSWORD);
            await page.getByRole('button', { name: 'Continue' }).click();
            await page.waitForTimeout(2000);
            await page.screenshot({ path: 'lfv-artifacts/00-after-login.png', fullPage: true });
            checkpoint = 'create-route';
            await page.goto(`${base}/projects/new`, { waitUntil: 'networkidle' });
            await page.screenshot({ path: 'lfv-artifacts/00-create-route.png', fullPage: true });
            await page.getByTestId('pit-create-project').waitFor({ timeout: 15000 });
            checkpoint = 'create-form';
            await page.getByLabel('Project name').fill(process.env.LFV_PROJECT_NAME);
            await page.getByLabel('Project type').selectOption('improvement');
            await page.getByLabel('Delivery classification').selectOption('quick_win');
            await page.getByLabel('Description').fill('Authenticated deployed Slice 4 LFV project.');
            await page.getByLabel('Responsible person').fill('PIT Slice 4 LFV');
            await page.getByLabel('Start date').fill('2026-07-22');
            await page.getByLabel('End date').fill('2026-08-31');
            await page.getByLabel('Source type').selectOption('risk');
            await page.getByLabel('Source reference').fill(`LFV-${process.env.GITHUB_RUN_ID}`);
            await page.screenshot({ path: 'lfv-artifacts/01-create-project.png', fullPage: true });
            checkpoint = 'create-submit';
            await page.getByRole('button', { name: 'Create project' }).click();
            await page.waitForURL(/\/projects\/[0-9a-f-]{36}$/, { timeout: 20000 });
            await page.getByTestId('pit-detail-data').waitFor({ timeout: 15000 });
            const projectId = page.url().split('/').pop();
            fs.appendFileSync('lfv-fixture.txt', `project_id=${projectId}\n`);
            await page.screenshot({ path: 'lfv-artifacts/02-created-detail.png', fullPage: true });
            checkpoint = 'update-submit';
            const updatedName = `${process.env.LFV_PROJECT_NAME} Updated`;
            await page.getByLabel('Project name').fill(updatedName);
            await page.getByLabel('Description').fill('Authenticated deployed Slice 4 LFV update persisted.');
            await page.getByRole('button', { name: 'Save changes' }).click();
            await page.getByText('Project saved.').waitFor({ timeout: 15000 });
            checkpoint = 'update-reload';
            await page.reload({ waitUntil: 'networkidle' });
            if ((await page.getByLabel('Project name').inputValue()) !== updatedName) throw new Error('Updated project name did not survive reload');
            await page.screenshot({ path: 'lfv-artifacts/03-updated-detail.png', fullPage: true });
            checkpoint = 'register';
            await page.goto(`${base}/projects`, { waitUntil: 'networkidle' });
            await page.getByText(updatedName).waitFor({ timeout: 15000 });
            await page.screenshot({ path: 'lfv-artifacts/04-project-register.png', fullPage: true });
            checkpoint = 'api-verification';
            const api = await fetch(`${process.env.SUPABASE_URL}/rest/v1/projects?id=eq.${projectId}&select=id,name,org_id,status`, {
              headers: { apikey: process.env.SUPABASE_KEY, Authorization: `Bearer ${process.env.LFV_ACCESS_TOKEN}` },
            });
            const rows = await api.json();
            if (!api.ok || rows.length !== 1 || rows[0].name !== updatedName) throw new Error(`Supabase verification failed: ${JSON.stringify(rows)}`);
            fs.writeFileSync('lfv-artifacts/result.json', JSON.stringify({
              authenticated: true,
              create: true,
              detail: true,
              updateSurvivedReload: true,
              register: true,
              projectId,
              projectName: updatedName,
              previewUrl: base,
              headSha: process.env.GITHUB_SHA,
            }, null, 2));
            await browser.close();
          })().catch(async (error) => {
            console.error(`LFV failed at checkpoint ${checkpoint}:`, error);
            fs.writeFileSync('lfv-artifacts/failure.json', JSON.stringify({ checkpoint, message: error.message, stack: error.stack, url: page ? page.url().replace(/([?&]x-vercel-protection-bypass=)[^&]+/i, '$1[REDACTED]') : null }, null, 2));
            if (page) {
              try { await page.screenshot({ path: 'lfv-artifacts/failure.png', fullPage: true }); } catch {}
            }
            if (browser) await browser.close().catch(() => undefined);
            process.exit(1);
          });
          NODE
      - uses: actions/upload-artifact@v5
        if: always()
        with:
          name: pit-slice4-authenticated-lfv
          path: |
            lfv-artifacts
            lfv-fixture.txt