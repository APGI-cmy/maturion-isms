name: Deploy MMM Supabase Migrations

# WORKFLOW OWNERSHIP BOUNDARY
# This workflow owns ALL database migration and schema verification operations for MMM.
# It is the ONLY authorised path for applying schema changes to the live Supabase database.
#
# Operating model (per §7.4 Deployment Execution Contract — deployment-execution-contract.md):
#   deploy-mmm-vercel.yml                   = frontend CI / build / deploy (no live DB access)
#   deploy-mmm-supabase-migrations.yml      = live schema mutation + schema verification (THIS FILE)
#   deploy-mmm-edge-functions.yml           = Supabase Edge Function deployment
#   deploy-mmm-ai-gateway.yml               = Render AI gateway deployment
#
# Migration mechanism (§4.3 approved):
#   MMM-NATIVE migrations (supabase/migrations/): supabase db push via SUPABASE_ACCESS_TOKEN + SUPABASE_PROJECT_REF
#   Legacy/AIMC migrations: psql via SUPABASE_DB_URL (cross-app exception — see comment in supabase-migrate job)
#
# This workflow:
#   - is triggered manually (workflow_dispatch) only
#   - targets the main branch only
#   - requires a protected-environment approval before any DB mutation step runs
#   - no PR preview run or ordinary CI push will ever trigger this workflow

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: >
          Type exactly: CONFIRM — to acknowledge this workflow mutates the live Supabase database.
          Unconfirmed runs will be rejected before any DB step executes.
        required: true
        default: ''

concurrency:
  group: ${{ github.workflow }}-main
  cancel-in-progress: false

jobs:
  preflight-guard:
    name: Pre-Flight Guard
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Verify branch is main
        run: |
          if [ "$GITHUB_REF" != "refs/heads/main" ]; then
            echo "::error::This workflow may only run on the main branch. Current ref: $GITHUB_REF"
            exit 1
          fi
          echo "Branch check PASSED: $GITHUB_REF"

      - name: Verify confirmation input
        run: |
          if [ "${{ github.event.inputs.confirm }}" != "CONFIRM" ]; then
            echo "::error::Run rejected — confirmation input must be exactly: CONFIRM"
            echo "Re-trigger this workflow and type CONFIRM in the confirmation field to proceed."
            exit 1
          fi
          echo "Confirmation ACCEPTED. Proceeding to migration execution."

  supabase-migrate:
    name: Apply Supabase Migrations
    runs-on: ubuntu-latest
    needs: [preflight-guard]
    permissions:
      contents: read
    environment: production
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1

      # ─────────────────────────────────────────────────────────────────────
      # CROSS-APP MIGRATION EXCEPTION — psql-based legacy and AIMC migrations
      # ─────────────────────────────────────────────────────────────────────
      # The following two steps apply migrations from:
      #   apps/maturion-maturity-legacy/supabase/migrations/
      #   packages/ai-centre/supabase/migrations/
      #
      # These are cross-app shared schema dependencies managed separately from the
      # canonical MMM migration path. They use psql (not supabase db push) because:
      #
      #   1. They are NOT in the canonical supabase/migrations/ directory.
      #      supabase db push only manages migrations tracked in supabase/migrations/.
      #      Applying these with supabase db push would require migrating them into
      #      the canonical directory, which is a separate governed cross-app concern.
      #
      #   2. These migrations define shared schema objects (organisations, audits,
      #      criteria, mps, domains, evidence, ai_feedback) that MMM reads at runtime.
      #      They MUST execute BEFORE MMM-native migrations and in dependency order:
      #        legacy psql → AIMC psql → MMM-native supabase db push
      #
      #   3. The approved path for NEW MMM migrations is ALWAYS supabase/migrations/
      #      via supabase db push. This psql path is an explicit exception for
      #      cross-app legacy schema dependencies only.
      #
      # This exception is documented in §2 of deployment-execution-contract.md
      # (Cross-App Migration Exception). It is not a template for future migrations.
      # ─────────────────────────────────────────────────────────────────────

      - name: Apply pending legacy migrations (cross-app exception — Supabase Management API)
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
        run: |
          # Apply legacy migrations via Supabase Management API (replaces direct psql).
          # The Management API uses HTTPS and is reachable from GitHub-hosted runners,
          # removing the direct Postgres TCP connectivity requirement (issue #1474).
          python3 .github/scripts/apply-migrations-via-api.py \
            --migrations-dir apps/maturion-maturity-legacy/supabase/migrations \
            --tracking-table legacy_migrations \
            --seed-entry 20260310000001_wave16_6_schema_audit_completeness.sql

      # T-A-012: AIMC package migrations (packages/ai-centre/supabase/migrations/)
      # DEPENDENCY: AIMC migration 005_ai_feedback_pipeline.sql references the `organisations` table
      # defined in the legacy app migrations. This step MUST run AFTER "Apply pending legacy migrations"
      # and uses the same Supabase Management API execution path.
      - name: Apply AIMC package migrations (cross-app exception — Supabase Management API)
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
        run: |
          # Apply AIMC migrations via Supabase Management API (replaces direct psql — issue #1474).
          python3 .github/scripts/apply-migrations-via-api.py \
            --migrations-dir packages/ai-centre/supabase/migrations \
            --tracking-table aimc_migrations

      - name: Link Supabase project
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ]; then
            echo "ERROR: SUPABASE_ACCESS_TOKEN secret is not set. Cannot link Supabase project."
            exit 1
          fi
          if [ -z "${{ secrets.SUPABASE_PROJECT_REF }}" ]; then
            echo "ERROR: SUPABASE_PROJECT_REF secret is not set. Cannot link Supabase project."
            exit 1
          fi
          echo "Linking Supabase project ${{ secrets.SUPABASE_PROJECT_REF }}..."
          supabase link --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}
          echo "Project linked successfully."

      - name: Apply MMM-native migrations (supabase db push)
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          echo "Applying MMM-native migrations from supabase/migrations/ via supabase db push..."
          echo "Mechanism: supabase db push (approved per §4.3 of deployment-execution-contract.md)"
          echo "Project ref: ${{ secrets.SUPABASE_PROJECT_REF }}"
          echo "Execution order: legacy psql → AIMC psql → MMM-native supabase db push"
          supabase db push --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}
          echo "MMM-native migrations applied successfully via supabase db push."

  schema-verification:
    name: Schema Verification
    runs-on: ubuntu-latest
    needs: [supabase-migrate]
    permissions:
      contents: read
    environment: production
    # Consolidated schema verification — checks all tables from both MMM-native and cross-app migrations.
    # REQUIRED tables (FAIL on absence): public.audits, public.audit_logs, public.criteria, public.mps, public.domains, public.evidence
    # WARN tables (non-blocking): public.evidence_submissions
    # (Previously split across schema-verification and schema-existence-check jobs — consolidated
    #  per Q-C of wave mmm-deploy-execution-strategy-20260426, issue #1470.)
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: schema-verification — verify all required tables exist
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
        run: |
          echo "Running consolidated schema-verification..."
          # Verify required tables via Supabase Management API (replaces direct psql — issue #1474).
          # REQUIRED tables (FAIL on absence): public.audits, public.audit_logs, public.criteria,
          #   public.mps, public.domains, public.evidence
          # WARN tables (non-blocking): public.evidence_submissions
          python3 .github/scripts/verify-schema-via-api.py \
            --required-tables audits audit_logs criteria mps domains evidence \
            --warn-tables evidence_submissions

  migration-summary:
    name: Migration Summary
    runs-on: ubuntu-latest
    needs: [schema-verification]
    permissions:
      contents: read
    steps:
      - name: Write summary
        run: |
          echo "## ✅ MMM Supabase Migration Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Status**: All migrations applied and schema verified successfully." >> $GITHUB_STEP_SUMMARY
          echo "**Commit**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "**Branch**: ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "**Triggered by**: ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          echo "**Timestamp**: $(date -u +'%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "> ⚠️ This workflow mutates the live Supabase database. It must only be run by CS2 or an authorised operator after explicit approval." >> $GITHUB_STEP_SUMMARY
