---
name: POLC Boundary Validation

# Authority: FOREMAN_AUTHORITY_AND_SUPERVISION_MODEL.md,
#            LIVING_AGENT_SYSTEM.md v6.2.0
# Purpose: Prevent Foreman from implementing new features;
#          allow supervision corrections. Three separate jobs provide
#          independent status checks matching merge_gate_interface required_checks.
# Issue: #193 (original gate), S-007/S-023 (machine enforcement improvements)
# Contract: Foreman-ISMS Agent Contract v2.6.0,
#           merge_gate_interface.required_checks
# S-007: Each gate runs as its own named job so CI reports
#        separate named status checks
# S-023: builder-involvement-check now enforces pre-brief artifact existence
# A-035/S-035: copilot-builder-role label no longer bypasses
#              foreman-implementation-check or session-memory-check when
#              the PR is authored by foreman-v2-agent (Copilot). The label
#              is valid only for pure builder sessions. builder-involvement-check
#              now also covers .github/workflows/ path changes.
# Issue #1245: builder-involvement-check no longer uses commit author identity
#              to detect builder involvement (all Copilot agents share the same
#              copilot-swe-agent[bot] identity). Builder delegation is now proven
#              via governance evidence: agents_delegated_to: in session memory
#              and/or builder references in PREHANDOVER proof (PR-new files only).

'on':
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch: {}

permissions:
  contents: read
  pull-requests: read

jobs:
  foreman-implementation-check:
    name: "foreman-implementation-check"
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Check 1 - Detect Foreman Implementation Commits
        id: check1
        run: |
          echo "=== Check 1: Detect Foreman Implementation ==="
          echo ""
          echo "Refined: Block implementation, allow supervision"
          echo ""

          # If PR is labeled 'copilot-builder-role', Copilot is acting as a
          # governed builder (not Foreman) in this PR. The
          # foreman-implementation-check does not apply to builder PRs.
          # Use exact matching: split the comma-separated label list and compare
          # each label individually to avoid substring false positives.
          PR_LABELS="${{ join(github.event.pull_request.labels.*.name, ',') }}"
          HAS_BUILDER_LABEL=false
          IFS=',' read -ra LABEL_ARRAY <<< "$PR_LABELS"
          for label in "${LABEL_ARRAY[@]}"; do
            if [[ "$label" == "copilot-builder-role" ]]; then
              HAS_BUILDER_LABEL=true
              break
            fi
          done
          if [[ "$HAS_BUILDER_LABEL" == "true" ]]; then
            # A-035: copilot-builder-role does NOT bypass this gate when the
            # PR is authored by foreman-v2-agent. The label is intended for
            # pure builder sessions (api-builder, ui-builder, etc.) where
            # Foreman is NOT the executing agent. When foreman-v2-agent is the
            # session author, the full POLC gate MUST run regardless of label.
            PR_AUTHOR="${{ github.event.pull_request.user.login }}"
            IS_FOREMAN_PR=false
            FOREMAN_AUTHOR_PATTERNS=("Copilot" "copilot-swe-agent" "github-copilot")
            for fpattern in "${FOREMAN_AUTHOR_PATTERNS[@]}"; do
              if [[ "$PR_AUTHOR" =~ $fpattern ]]; then
                IS_FOREMAN_PR=true
                break
              fi
            done
            if [[ "$IS_FOREMAN_PR" == "false" ]]; then
              echo "✅ PR labeled 'copilot-builder-role'"
              echo "   Copilot is acting as a governed builder (not Foreman)."
              echo "   foreman-implementation-check is not applicable — skipping."
              exit 0
            fi
            echo "⚠️  PR labeled 'copilot-builder-role' but authored by Foreman."
            echo "   A-035: copilot-builder-role MUST NOT bypass the POLC gate"
            echo "   when foreman-v2-agent is the session author."
            echo "   Enforcing full gate regardless of label..."
          fi

          # Get base branch
          BASE_BRANCH="${{ github.event.pull_request.base.ref }}"
          echo "Base branch: $BASE_BRANCH"

          # Get all commits in this PR
          COMMITS=$(git log origin/$BASE_BRANCH..HEAD \
            --pretty=format:"%H|%an|%ae")

          # Foreman identity patterns
          FOREMAN_PATTERNS=(
            "copilot-swe-agent\[bot\]"
            "Copilot"
            "198982749+Copilot@users.noreply.github.com"
          )

          VIOLATION_FOUND=false
          VIOLATION_FILES=""
          VIOLATION_COMMITS=""
          SUPERVISION_FILES=""

          echo "Checking commits for Foreman authorship..."
          echo ""

          while IFS='|' read -r commit_sha commit_author commit_email; do
            IS_FOREMAN=false

            # Check if commit is by Foreman
            for pattern in "${FOREMAN_PATTERNS[@]}"; do
              if [[ "$commit_author" =~ $pattern ]] || \
                 [[ "$commit_email" =~ $pattern ]]; then
                IS_FOREMAN=true
                break
              fi
            done

            if [ "$IS_FOREMAN" = true ]; then
              echo "Foreman commit detected: $commit_sha ($commit_author)"

              # Get files changed in this commit
              FILES=$(git diff-tree --no-commit-id --name-only -r $commit_sha)

              # Check each file
              while IFS= read -r file; do
                # Skip if file doesn't exist (deleted files)
                if [ ! -f "$file" ]; then
                  continue
                fi

                # SUPERVISION CORRECTIONS (PERMITTED)
                # Documentation, config, test corrections, governance, session
                # memory
                if [[ "$file" =~ \.md$ ]] || \
                   [[ "$file" =~ README ]] || \
                   [[ "$file" =~ CHANGELOG ]] || \
                   [[ "$file" =~ \.config\.(ts|js|json)$ ]] || \
                   [[ "$file" =~ package\.json$ ]] || \
                   [[ "$file" =~ tsconfig\.json$ ]] || \
                   [[ "$file" =~ ^\.agent-workspace/foreman ]] || \
                   [[ "$file" =~ ^\.agent-admin/ ]] || \
                   [[ "$file" =~ ^governance/ ]] || \
                   [[ "$file" =~ /02-architecture/ ]] || \
                   [[ "$file" =~ BUILD_PROGRESS_TRACKER\.md$ ]]; then
                  echo "  ✅ SUPERVISION: $file"
                  echo "     (documentation/config/governance)"
                  SUPERVISION_FILES="${SUPERVISION_FILES}\n  - ${file}"
                  continue
                fi

                # IMPLEMENTATION DETECTION (PROHIBITED)
                # Check for production code patterns
                if [[ "$file" =~ ^modules/.*/src/.*\.(ts|tsx|js|jsx)$ ]] || \
                   [[ "$file" =~ ^apps/.*/src/.*\.(ts|tsx|js|jsx)$ ]] || \
                   [[ "$file" =~ ^packages/.*/src/.*\.(ts|tsx|js|jsx)$ ]]; then

                  echo "  🔍 ANALYZING: $file (production code pattern)"

                  # Get file diff to check for implementation indicators
                  DIFF=$(git show $commit_sha -- "$file" 2>/dev/null || echo "")

                  # Check for implementation patterns (new capability
                  # indicators)
                  IMPLEMENTATION_DETECTED=false

                  # New component/function/class exports
                  if echo "$DIFF" | \
                     grep -qE '^\+.*export (function|class|const)'; then
                    echo "    - New export detected (possible new capability)"
                    IMPLEMENTATION_DETECTED=true
                  fi

                  # New React components
                  if echo "$DIFF" | \
                     grep -qE '^\+.*(function|const) [A-Z].*=>'; then
                    echo "    - New component detected"
                    IMPLEMENTATION_DETECTED=true
                  fi

                  # New API routes/handlers
                  if echo "$DIFF" | grep -qE \
                     '^\+.*(router\.|app\.|route\.)(get|post)'; then
                    echo "    - New API route/handler detected"
                    IMPLEMENTATION_DETECTED=true
                  fi

                  # New state management
                  if echo "$DIFF" | grep -qE \
                     '^\+.*(createSlice|useState|useReducer)'; then
                    echo "    - New state management detected"
                    IMPLEMENTATION_DETECTED=true
                  fi

                  # Large additions (>50 lines) suggesting feature expansion
                  LINES_ADDED=$(echo "$DIFF" | grep -c '^+[^+]' || echo "0")
                  if [ "$LINES_ADDED" -gt 50 ]; then
                    echo "    - Large addition detected"
                    echo "($LINES_ADDED lines) - possible feature expansion"
                    IMPLEMENTATION_DETECTED=true
                  fi

                  if [ "$IMPLEMENTATION_DETECTED" = true ]; then
                    VIOLATION_FOUND=true
                    VIOLATION_FILES="${VIOLATION_FILES}\n  - ${file}"
                    VIOLATION_COMMITS="${VIOLATION_COMMITS}\n"
                    VIOLATION_COMMITS="${VIOLATION_COMMITS}  - ${commit_sha}"
                    echo "  ❌ IMPLEMENTATION VIOLATION: $file"
                  else
                    echo "  ⚠️  AMBIGUOUS: $file (production"
                    echo "file modified, but no clear implementation detected)"
                    echo "    Manual review recommended"
                  fi
                fi

                # TEST FILES - Check if new test or test correction
                if [[ "$file" =~ \.test\.(ts|tsx|js|jsx)$ ]]; then
                  echo "  🔍 ANALYZING TEST: $file"

                  # Get file diff
                  DIFF=$(git show $commit_sha -- "$file" 2>/dev/null || echo "")

                  # Check if this is a new test file (implementation)
                  if git log --diff-filter=A --oneline \
                     origin/$BASE_BRANCH..HEAD -- "$file" | \
                     grep -q "$commit_sha"; then
                    echo "    - New test file detected (feature test creation)"
                    VIOLATION_FOUND=true
                    VIOLATION_FILES="${VIOLATION_FILES}\n"
                    VIOLATION_FILES="${VIOLATION_FILES}  - ${file}"
                    VIOLATION_COMMITS="${VIOLATION_COMMITS}\n"
                    VIOLATION_COMMITS="${VIOLATION_COMMITS}  - ${commit_sha}"
                  echo "  ❌ IMPLEMENTATION VIOLATION: New test"
                  else
                    # Existing test file - likely correction
                    echo "    - Test modified (correction)"
                    SUPERVISION_FILES="${SUPERVISION_FILES}\n"
                    SUPERVISION_FILES="${SUPERVISION_FILES}  - ${file}"
                    echo "  ✅ SUPERVISION: Test correction"
                  fi
                fi
              done <<< "$FILES"
            fi
          done <<< "$COMMITS"

          echo ""
          echo "=== ANALYSIS SUMMARY ==="
          echo ""

          if [ -n "$SUPERVISION_FILES" ]; then
            echo "✅ Supervision Corrections Detected (Permitted):"
            echo -e "$SUPERVISION_FILES"
            echo ""
          fi

          if [ "$VIOLATION_FOUND" = true ]; then
            echo "❌ POLC BOUNDARY VIOLATION DETECTED"
            echo ""
            echo "Foreman authored commits"
            echo "implementing new features/capabilities."
            echo ""
            echo "Implementation Files:"
            echo -e "$VIOLATION_FILES"
            echo ""
            echo "Commits:${VIOLATION_COMMITS}"
            echo ""
            echo "Foreman MUST NOT implement new"
            echo "features. Builders implement; Foreman supervises."
            echo ""
            echo "Permitted: Documentation, config,"
            echo "test corrections, governance artifacts"
            echo "Prohibited: New components,"
            echo "API routes, business logic, feature expansion"
            echo ""
            echo "Action Required:"
            echo "  1. Close this PR"
            echo "  2. Create builder delegation issues"
            echo "  3. Assign builders to implement"
            echo "  4. Foreman supervises (does not implement)"
            echo ""
            echo "Override: CS2 only (for"
            echo "ambiguous cases or justified exceptions)"
            echo ""
            exit 1
          else
            echo "✅ Check 1 PASSED - No Foreman implementation commits detected"
            echo ""
            echo "Foreman performed supervision"
            echo "corrections only (or no production changes)."
            echo ""
          fi

  # ---------------------------------------------------------------------------
  # Job 2: Builder Involvement + Pre-Brief Existence Check (S-023)
  # Validates that when implementation files changed, builder delegation
  # occurred AND a pre-brief artifact exists.
  # Builder delegation is proven via governance evidence (NOT commit author
  # identity — all Copilot agents share copilot-swe-agent[bot]):
  #   1. agents_delegated_to: field in PR-new Foreman session memory
  #   2. Builder agent references in PR-new PREHANDOVER proof
  # ---------------------------------------------------------------------------
  builder-involvement-check:
    name: "builder-involvement-check"
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Check Builder Involvement and Pre-Brief Existence
        id: builder_check
        run: |
          echo "=== Builder Involvement + Pre-Brief Existence (S-023) ==="
          echo ""
          echo "Logic: Skip if only supervision corrections detected."
          echo "       Fail if implementation changed but no pre-brief artifact."
          echo ""

          # CS2 sign-off bypass: if the PR carries the 'CS sign-off: approved'
          # label, CS2 has explicitly authorized this change, waiving the
          # POLC pre-brief and builder-delegation requirements for this PR.
          PR_LABELS="${{ join(github.event.pull_request.labels.*.name, ',') }}"
          IFS=',' read -ra LABEL_ARRAY <<< "$PR_LABELS"
          for label in "${LABEL_ARRAY[@]}"; do
            if [[ "$label" == "CS sign-off: approved" ]]; then
              echo "✅ PASS — PR carries 'CS sign-off: approved' label."
              echo "   CS2 explicit sign-off detected. Pre-brief and builder-delegation"
              echo "   requirements waived per CS2 supreme authority (AGCFPP §2)."
              exit 0
            fi
          done

          # Get base branch
          BASE_BRANCH="${{ github.event.pull_request.base.ref }}"

          # Check if production/implementation code was changed
          CHANGED_FILES=$(git diff --name-only origin/$BASE_BRANCH...HEAD)

          IMPLEMENTATION_CHANGED=false
          SUPERVISION_ONLY=true

          while IFS= read -r file; do
            # Skip supervision files
            if [[ "$file" =~ \.md$ ]] || \
               [[ "$file" =~ README ]] || \
               [[ "$file" =~ CHANGELOG ]] || \
               [[ "$file" =~ \.config\.(ts|js|json)$ ]] || \
               [[ "$file" =~ package\.json$ ]] || \
               [[ "$file" =~ tsconfig\.json$ ]] || \
               [[ "$file" =~ ^\.agent-workspace/ ]] || \
               [[ "$file" =~ ^\.agent-admin/ ]] || \
               [[ "$file" =~ ^governance/ ]] || \
               [[ "$file" =~ /02-architecture/ ]] || \
               [[ "$file" =~ BUILD_PROGRESS_TRACKER\.md$ ]]; then
              continue
            fi

            # Check for implementation files
            if [[ "$file" =~ ^modules/.*/src/.*\.(ts|tsx|js|jsx)$ ]] || \
               [[ "$file" =~ ^apps/.*/src/.*\.(ts|tsx|js|jsx)$ ]] || \
               [[ "$file" =~ ^packages/.*/src/.*\.(ts|tsx|js|jsx)$ ]] || \
               [[ "$file" =~ ^\.github/workflows/.*\.yml$ ]]; then
              IMPLEMENTATION_CHANGED=true
              SUPERVISION_ONLY=false
              break
            fi

            # Check for new test files (implementation)
            if [[ "$file" =~ \.test\.(ts|tsx|js|jsx)$ ]]; then
              # Check if this is a new test file
              if git log --diff-filter=A --oneline \
                 origin/$BASE_BRANCH..HEAD -- "$file" | grep -q .; then
                IMPLEMENTATION_CHANGED=true
                SUPERVISION_ONLY=false
                break
              fi
            fi
          done <<< "$CHANGED_FILES"

          if [ "$SUPERVISION_ONLY" = true ]; then
            echo "ℹ️  Only supervision corrections detected (docs, config, test fixes)"
            echo "   No builder involvement or pre-brief check required."
            echo ""
            exit 0
          fi

          if [ "$IMPLEMENTATION_CHANGED" = false ]; then
            echo "ℹ️  No implementation code changes detected - skipping check"
            exit 0
          fi

          echo "Implementation code changes detected."
          echo ""

          # S-023: Check for IAA pre-brief artifact (HARD GATE)
          # Per improvement S-023: fail when implementation files changed but
          # no .agent-admin/assurance/iaa-prebrief-*.md exists on branch.
          echo "--- S-023: Pre-Brief Existence Gate ---"
          PREBRIEF_FOUND=false
          ASSURANCE_DIR=".agent-admin/assurance"
          if [ -d "$ASSURANCE_DIR" ]; then
            # Legacy pattern: standalone iaa-prebrief-*.md
            PREBRIEF_FILES=$(find "$ASSURANCE_DIR" \
              -name "iaa-prebrief-*.md" 2>/dev/null | head -5)
            if [ -n "$PREBRIEF_FILES" ]; then
              PREBRIEF_FOUND=true
              echo "✅ IAA pre-brief artifact(s) found (legacy pattern):"
              echo "$PREBRIEF_FILES" | sed 's/^/   /'
            fi

            # New pattern (PR #1348): iaa-wave-record-*.md with ## PRE-BRIEF section
            if [ "$PREBRIEF_FOUND" = false ]; then
              while IFS= read -r -d '' f; do
                if grep -q "## PRE-BRIEF" "$f" 2>/dev/null; then
                  PREBRIEF_FOUND=true
                  echo "✅ IAA wave-record pre-brief found (new pattern): $f"
                  break
                fi
              done < <(find "$ASSURANCE_DIR" -name "iaa-wave-record-*.md" -print0 2>/dev/null)
            fi
          fi

          if [ "$PREBRIEF_FOUND" = false ]; then
            echo ""
            echo "❌ S-023 GATE FAIL — No IAA pre-brief artifact found."
            echo ""
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo ""
            echo "🚨 POLC PRE-BRIEF VIOLATION (A-031)"
            echo ""
            echo "Implementation files changed but no IAA pre-brief artifact"
            echo "exists at .agent-admin/assurance/iaa-prebrief-*.md"
            echo ""
            echo "Per LIVING_AGENT_SYSTEM.md v6.2.0 and Foreman contract"
            echo "Phase 2 Step 2.7 (PRE-BRIEF-BEFORE-DELEGATION):"
            echo "  The IAA pre-brief MUST be committed before any"
            echo "  builder receives an implementation task."
            echo ""
            echo "REQUIRED:"
            echo "  1. Invoke IAA directly: task(agent_type: independent-assurance-agent, action: PRE-BRIEF)"
            echo "  2. Commit the IAA pre-brief artifact to .agent-admin/assurance/"
            echo "  3. Only then proceed with implementation delegation"
            echo ""
            echo "Retroactive pre-brief commits after implementation work"
            echo "has begun are a POLC boundary violation."
            echo ""
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            exit 1
          fi

          echo ""
          echo "--- Builder Delegation Detection (Evidence-Based) ---"
          echo ""
          echo "NOTE: Explicit builder commit identity (author/email) check is"
          echo "no longer used. In Copilot-based sessions all commits share the"
          echo "same copilot-swe-agent[bot] identity regardless of whether"
          echo "Foreman or a builder is the executing agent."
          echo "Builder delegation is now proven via governance evidence:"
          echo "  1. agents_delegated_to: field in PR-introduced session memory"
          echo "  2. Delegated agents listed in PR-introduced PREHANDOVER proof"
          echo ""

          BUILDER_FOUND=false
          BUILDER_EVIDENCE_SOURCE=""

          # Primary evidence: agents_delegated_to: field in session memory
          # Scope to session memory files introduced by this PR only
          # (--diff-filter=A) to avoid false positives from historical files.
          NEW_SESSION_FILES=$(git diff --name-only --diff-filter=A \
            origin/$BASE_BRANCH...HEAD 2>/dev/null | \
            grep -E '^\.agent-workspace/foreman.*/memory/session-.*\.md$' \
            || true)

          if [ -n "$NEW_SESSION_FILES" ]; then
            while IFS= read -r session_file; do
              if [ -f "$session_file" ]; then
                # Check for agents_delegated_to: with at least one entry.
                # The field is a YAML list; entries are lines with "- agent:"
                # or "  - <agentname>". Match any non-empty list item after
                # the agents_delegated_to: key.
                # AWK pattern:
                #   line 1: enter block when agents_delegated_to: key is found
                #   line 2: exit block when a non-indented, non-list line follows
                #   line 3: collect list items (lines starting with optional
                #           whitespace then "- ") and set found flag
                #   END:    exit 0 (success) if any list item was found
                DELEGATED=$(awk '
                  /^agents_delegated_to:/ { in_block=1; next }
                  in_block && /^[^ \t-]/ && !/^[ \t]*-/ { in_block=0 }
                  in_block && /^[ \t]*-[ \t]/ { print; found=1 }
                  END { exit (found ? 0 : 1) }
                ' "$session_file" 2>/dev/null || true)
                if [ -n "$DELEGATED" ]; then
                  BUILDER_FOUND=true
                  BUILDER_EVIDENCE_SOURCE="session-memory: $session_file"
                  SAMPLE=$(echo "$DELEGATED" | head -5)
                  echo "✅ Builder delegation found in session memory:"
                  echo "   File: $session_file"
                  echo "   agents_delegated_to entries (sample):"
                  echo "$SAMPLE" | sed 's/^/     /'
                  break
                fi
              fi
            done <<< "$NEW_SESSION_FILES"
          fi

          # Secondary evidence: PREHANDOVER proof lists delegated agents.
          # Scope to PREHANDOVER files introduced by this PR only.
          if [ "$BUILDER_FOUND" = false ]; then
            NEW_PREHANDOVER_FILES=$(git diff --name-only --diff-filter=A \
              origin/$BASE_BRANCH...HEAD 2>/dev/null | \
              grep -E '^\.agent-workspace/foreman.*/memory/PREHANDOVER-.*\.md$' \
              || true)
            if [ -n "$NEW_PREHANDOVER_FILES" ]; then
              while IFS= read -r ph_file; do
                if [ -f "$ph_file" ]; then
                  # Look for any builder agent reference in PREHANDOVER
                  if grep -qiE \
                    "(api-builder|ui-builder|qa-builder|schema-builder|integration-builder|mat-specialist|pit-specialist)" \
                    "$ph_file" 2>/dev/null; then
                    BUILDER_FOUND=true
                    BUILDER_EVIDENCE_SOURCE="prehandover-proof: $ph_file"
                    echo "✅ Builder delegation found in PREHANDOVER proof:"
                    echo "   File: $ph_file"
                    break
                  fi
                fi
              done <<< "$NEW_PREHANDOVER_FILES"
            fi
          fi

          echo ""

          if [ "$BUILDER_FOUND" = false ]; then
            echo "❌ NO BUILDER DELEGATION EVIDENCE FOUND"
            echo ""
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo ""
            echo "🚨 POLC BUILDER DELEGATION VIOLATION"
            echo ""
            echo "Implementation files changed but no governance evidence"
            echo "of builder delegation was found."
            echo ""
            echo "Checked:"
            echo "  1. agents_delegated_to: field in PR-new session memory"
            echo "     (.agent-workspace/foreman*/memory/session-*.md)"
            echo "  2. Builder agent references in PR-new PREHANDOVER proof"
            echo "     (.agent-workspace/foreman*/memory/PREHANDOVER-*.md)"
            echo ""
            echo "Per LIVING_AGENT_SYSTEM.md v6.2.0 and Foreman contract"
            echo "Phase 3 Step 3.3 (POLC-ORCHESTRATION):"
            echo "  Foreman MUST delegate implementation to a registered"
            echo "  builder. The session memory MUST record each delegation"
            echo "  in the agents_delegated_to: field."
            echo ""
            echo "REQUIRED:"
            echo "  1. Ensure session memory is committed with"
            echo "     agents_delegated_to: populated (at least one entry)"
            echo "  2. The field must name the builder agent(s) and task(s)"
            echo "  3. PREHANDOVER proof should reference the builders involved"
            echo ""
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            exit 1
          else
            echo "✅ Builder delegation confirmed via governance evidence"
            echo "   Evidence source: $BUILDER_EVIDENCE_SOURCE"
          fi

  # ---------------------------------------------------------------------------
  # Job 3: Session Memory Check
  # Validates Foreman session memory is present and does not indicate
  # the Foreman wrote production code directly.
  # ---------------------------------------------------------------------------
  session-memory-check:
    name: "session-memory-check"
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Check Session Memory Presence and Compliance
        run: |
          echo "=== Session Memory Presence and Compliance ==="
          echo ""

          # If PR is labeled 'copilot-builder-role', Copilot is acting as a
          # governed builder (not Foreman) in this PR.
          # session-memory-check does not apply to builder PRs — Foreman session
          # memory is not produced by builder-wave PRs.
          # Use exact matching to avoid substring false positives.
          PR_LABELS="${{ join(github.event.pull_request.labels.*.name, ',') }}"
          HAS_BUILDER_LABEL=false
          IFS=',' read -ra LABEL_ARRAY <<< "$PR_LABELS"
          for label in "${LABEL_ARRAY[@]}"; do
            if [[ "$label" == "copilot-builder-role" ]]; then
              HAS_BUILDER_LABEL=true
              break
            fi
          done
          if [[ "$HAS_BUILDER_LABEL" == "true" ]]; then
            # A-035: copilot-builder-role does NOT bypass this gate when the
            # PR is authored by foreman-v2-agent. The label is intended for
            # pure builder sessions where Foreman is NOT the executing agent.
            # When foreman-v2-agent is the session author, the full
            # session-memory-check MUST run regardless of label.
            PR_AUTHOR="${{ github.event.pull_request.user.login }}"
            IS_FOREMAN_PR=false
            FOREMAN_AUTHOR_PATTERNS=("Copilot" "copilot-swe-agent" "github-copilot")
            for fpattern in "${FOREMAN_AUTHOR_PATTERNS[@]}"; do
              if [[ "$PR_AUTHOR" =~ $fpattern ]]; then
                IS_FOREMAN_PR=true
                break
              fi
            done
            if [[ "$IS_FOREMAN_PR" == "false" ]]; then
              echo "✅ PR labeled 'copilot-builder-role'"
              echo "   Copilot is acting as a governed builder (not Foreman)."
              echo "   session-memory-check is not applicable to builder PRs — skipping."
              exit 0
            fi
            echo "⚠️  PR labeled 'copilot-builder-role' but authored by Foreman."
            echo "   A-035: copilot-builder-role MUST NOT bypass session-memory-check"
            echo "   when foreman-v2-agent is the session author."
            echo "   Enforcing full check regardless of label..."
          fi

          # Check for Foreman session memory
          SESSION_MEMORY_FOUND=false

          if ls .agent-workspace/foreman*/memory/session-*.md \
             1> /dev/null 2>&1; then
            SESSION_MEMORY_FOUND=true
            SESSION_FILES=$(ls .agent-workspace/foreman*/memory/session-*.md \
              2>/dev/null)
            echo "✅ Session memory files found:"
            echo "$SESSION_FILES" | while read -r file; do
              echo "  - $file"
            done
          fi

          echo ""

          if [ "$SESSION_MEMORY_FOUND" = false ]; then
            echo "❌ SESSION MEMORY REQUIRED"
            echo ""
            echo "Every Foreman session MUST create session memory."
            echo ""
            echo "Expected: .agent-workspace/foreman*/memory/session-NNN-YYYYMMDD.md"
            echo ""
            echo "Session memory must document:"
            echo "  - Builder delegation (if implementation work occurred)"
            echo "  - POLC supervision evidence"
            echo "  - Decisions and lessons learned"
            echo ""
            echo "Per Living Agent System v6.2.0."
            echo ""
            exit 1
          fi

          echo "✅ Session memory present"
          echo ""
          echo "Checking session memory for POLC violations..."
          echo "(Scoped to new session memory files introduced in this PR only)"
          echo ""

          # Scope POLC compliance scan to NEW session memory files introduced
          # in this PR only. Scanning all historical files causes false
          # positives from prior legitimately-supervised builder waves.
          BASE_BRANCH="${{ github.event.pull_request.base.ref }}"
          NEW_SESSION_FILES=$(git diff --name-only --diff-filter=A \
            origin/$BASE_BRANCH...HEAD 2>/dev/null | \
            grep -E '^\.agent-workspace/foreman.*/memory/session-.*\.md$' \
            || true)

          POLC_VIOLATION_IN_MEMORY=false
          if [ -z "$NEW_SESSION_FILES" ]; then
            echo "ℹ️  No new Foreman session memory files introduced in this PR."
            echo "   POLC compliance scan skipped (scoped to PR-introduced files only)."
          else
            while IFS= read -r session_file; do
              if [ -f "$session_file" ]; then
                # Check for indicators that FM wrote production code; skip governance/workflow work
                if grep -iE "(implemented|wrote).*code" "$session_file" | \
                   grep -qviE \
                     "did NOT|NOT.*implement|governance|workflow|\.github|\.agent-admin|\.agent-workspace|supervision|correction"; then
                  echo "⚠️  WARNING: Session memory may indicate FM wrote production code: $session_file"
                  POLC_VIOLATION_IN_MEMORY=true
                fi
              fi
            done <<< "$NEW_SESSION_FILES"
          fi

          if [ "$POLC_VIOLATION_IN_MEMORY" = true ]; then
            echo ""
            echo "❌ SESSION MEMORY INDICATES POLC VIOLATION"
            echo ""
            echo "Session memory contains evidence that Foreman implemented"
            echo "new features. This violates the POLC-Only Constraint."
            echo ""
            echo "Note: Supervision corrections (docs, config, test fixes)"
            echo "are permitted."
            echo ""
            exit 1
          fi

          echo "✅ Session memory validates POLC compliance"

  # ---------------------------------------------------------------------------
  # Gap 1 — Wave Record Count Cap (WAVE-RECORD-COUNT-001)
  # Authority: GOVERNANCE_ARTIFACT_TAXONOMY.md — one wave record per wave.
  # Issue: #1358 (CI-HARDENING)
  # Prevents agents from creating multiple iaa-wave-record-*.md files in a
  # single PR. The one-wave-record-per-wave rule was contractual only; this
  # job enforces it at the CI level.
  # ---------------------------------------------------------------------------
  wave-record-count-check:
    name: "wave-record-count-check"
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Check Wave Record Count
        run: |
          echo "=== Wave Record Count Check (WAVE-RECORD-COUNT-001) ==="
          echo ""

          # CS2 sign-off bypass
          PR_LABELS="${{ join(github.event.pull_request.labels.*.name, ',') }}"
          IFS=',' read -ra LABEL_ARRAY <<< "$PR_LABELS"
          for label in "${LABEL_ARRAY[@]}"; do
            if [[ "$label" == "CS sign-off: approved" ]]; then
              echo "✅ PASS — PR carries 'CS sign-off: approved' label."
              echo "   CS2 explicit sign-off detected. Wave record count cap waived."
              exit 0
            fi
          done

          BASE_BRANCH="${{ github.event.pull_request.base.ref }}"

          # Count iaa-wave-record-*.md files ADDED (not modified) in this PR
          WAVE_RECORDS_ADDED=$(git diff --name-only --diff-filter=A \
            origin/"$BASE_BRANCH"...HEAD \
            | grep -c '^\.agent-admin/assurance/iaa-wave-record-.*\.md$' || true)

          if [ "$WAVE_RECORDS_ADDED" -gt 1 ]; then
            echo "❌ WAVE-RECORD-COUNT-001 FAIL — $WAVE_RECORDS_ADDED iaa-wave-record-*.md files added in this PR."
            echo "   Only ONE wave record file may be created per PR."
            echo "   Found files:"
            git diff --name-only --diff-filter=A origin/"$BASE_BRANCH"...HEAD \
              | grep '^\.agent-admin/assurance/iaa-wave-record-.*\.md$' | sed 's/^/   - /'
            echo ""
            echo "   Per GOVERNANCE_ARTIFACT_TAXONOMY.md: one wave record per wave."
            echo "   If a revision is needed, UPDATE the existing wave record — do not create a second file."
            exit 1
          else
            echo "✅ WAVE-RECORD-COUNT-001 PASS — $WAVE_RECORDS_ADDED wave record file(s) added (within limit)."
          fi

  # ---------------------------------------------------------------------------
  # Gap 2 — Foreman Scope Declaration Validation (SCOPE-DECL-001/002)
  # Authority: foreman-v2-agent Phase 2 Step 2.7 (HALT-008),
  #            SCOPE_DECLARATION_SCHEMA.md
  # Issue: #1358 (CI-HARDENING)
  # When new .agent-workspace/ files are added, a scope declaration must exist
  # with an APPROVED_ARTIFACT_PATHS: field (or Markdown equivalent).
  # Previously contractual-only.
  # ---------------------------------------------------------------------------
  scope-declaration-check:
    name: "scope-declaration-check"
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Check Scope Declaration
        run: |
          echo "=== Scope Declaration Check (SCOPE-DECL-001/002) ==="
          echo ""

          # CS2 sign-off bypass
          PR_LABELS="${{ join(github.event.pull_request.labels.*.name, ',') }}"
          IFS=',' read -ra LABEL_ARRAY <<< "$PR_LABELS"
          for label in "${LABEL_ARRAY[@]}"; do
            if [[ "$label" == "CS sign-off: approved" ]]; then
              echo "✅ PASS — PR carries 'CS sign-off: approved' label."
              echo "   CS2 explicit sign-off detected. Scope declaration check waived."
              exit 0
            fi
          done

          BASE_BRANCH="${{ github.event.pull_request.base.ref }}"

          # Only run if agent-workspace files were added in this PR
          AGENT_WORKSPACE_ADDED=$(git diff --name-only --diff-filter=A \
            origin/"$BASE_BRANCH"...HEAD \
            | grep -c '^\.agent-workspace/' || true)

          if [ "$AGENT_WORKSPACE_ADDED" -eq 0 ]; then
            echo "ℹ️  No new .agent-workspace/ files added — scope declaration check not applicable."
            exit 0
          fi

          echo "New .agent-workspace/ files detected ($AGENT_WORKSPACE_ADDED). Checking scope declaration..."

          # Find scope declaration files added or modified in this PR;
          # if none were changed in the PR, fall back to matching declarations
          # already present in the working tree on this branch.
          SCOPE_DECL_FILES=$(git diff --name-only --diff-filter=AM \
            origin/"$BASE_BRANCH"...HEAD \
            | grep '^\.agent-workspace/foreman-v2/personal/scope-declaration-.*\.md$' || true)

          if [ -z "$SCOPE_DECL_FILES" ]; then
            SCOPE_DECL_FILES=$(find .agent-workspace/foreman-v2/personal -maxdepth 1 -type f \
              -name 'scope-declaration-*.md' 2>/dev/null | sort || true)
          fi

          if [ -z "$SCOPE_DECL_FILES" ]; then
            echo ""
            echo "❌ SCOPE-DECL-001 FAIL — New .agent-workspace/ files added but no scope declaration found."
            echo ""
            echo "   Foreman Phase 2 Step 2.7 requires:"
            echo "   .agent-workspace/foreman-v2/personal/scope-declaration-wave-{N}.md"
            echo "   with an APPROVED_ARTIFACT_PATHS: field listing all approved write paths."
            echo ""
            echo "   HALT-008: Do not proceed without a committed scope declaration."
            exit 1
          fi

          # Verify at least one scope declaration contains approved artifact paths
          # Accept both the canonical schema marker (APPROVED_ARTIFACT_PATHS:) and
          # the Markdown heading variant (## Approved Artifact Paths) for
          # backward compatibility with existing scope declarations.
          DECL_WITH_PATHS=false
          while IFS= read -r decl_file; do
            if [ -f "$decl_file" ] && grep -qiE "(APPROVED_ARTIFACT_PATHS:|## Approved Artifact Paths)" "$decl_file" 2>/dev/null; then
              DECL_WITH_PATHS=true
              echo "✅ SCOPE-DECL-001 PASS — Scope declaration found with approved artifact paths:"
              echo "   File: $decl_file"
              break
            fi
          done <<< "$SCOPE_DECL_FILES"

          if [ "$DECL_WITH_PATHS" = false ]; then
            echo ""
            echo "❌ SCOPE-DECL-002 FAIL — Scope declaration found but missing approved artifact paths field."
            echo ""
            echo "   The scope declaration MUST contain an APPROVED_ARTIFACT_PATHS: field"
            echo "   (or a '## Approved Artifact Paths' Markdown section)"
            echo "   explicitly enumerating every file path this wave is authorised to create."
            echo "   Per SCOPE_DECLARATION_SCHEMA.md."
            exit 1
          fi
