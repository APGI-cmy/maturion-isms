name: Governance Ceremony Gate

# Authority: FAIL-ONLY-ONCE v2.2.0 (A-010, A-014, A-015, A-016)
#            LIVING_AGENT_SYSTEM.md v6.2.0
#            FOREMAN_AUTHORITY_AND_SUPERVISION_MODEL.md
# Purpose: Block PRs touching CI workflows, agent contracts, or Foreman Tier 2
#          knowledge unless the governance ceremony is complete:
#          - PREHANDOVER proof present at .agent-workspace/foreman-v2/memory/PREHANDOVER-*.md
#          - PREHANDOVER proof has a resolved iaa_audit_token (not PENDING, not PHASE_A_ADVISORY)
#          - PREHANDOVER proof has a non-empty ## IAA Agent Response (verbatim) section
#          - PR body contains a ## Governance block with IAA Category, IAA Audit Token,
#            and PREHANDOVER Proof path
#          - PR is not in draft state
# Violation class: GOV-BREACH-AIMC-W5-002 (evidence bundle incomplete)
# Foreman-owned: Issue #808 (Add governance ceremony merge gate)

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - '.github/workflows/**'
      - '.github/agents/**'
      - '.agent-workspace/foreman-v2/knowledge/*.md'

permissions:
  contents: read
  pull-requests: read

jobs:
  # ============================================================================
  # JOB 1: Detect scope and bypass
  # ============================================================================
  detect-scope:
    name: "governance-ceremony/detect-scope"
    runs-on: ubuntu-latest
    outputs:
      in_scope: ${{ steps.scope.outputs.in_scope }}
      bypass: ${{ steps.bypass.outputs.bypass }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for automated governance bypass
        id: bypass
        env:
          PR_LABELS: ${{ join(github.event.pull_request.labels.*.name, ',') }}
          PR_BRANCH: ${{ github.event.pull_request.head.ref }}
        run: |
          echo "=== Automated Governance Bypass Check ==="
          echo "PR Labels: $PR_LABELS"
          echo "PR Branch: $PR_BRANCH"
          echo ""

          if [[ ( "$PR_LABELS" == *"governance"* && "$PR_LABELS" == *"automated"* && \
                  "$PR_LABELS" == *"agent:liaison"* ) || \
               "$PR_BRANCH" == "governance-alignment-auto" ]]; then
            echo "✅ Automated governance alignment PR detected — bypassing ceremony gate."
            echo "bypass=true" >> $GITHUB_OUTPUT
          else
            echo "ℹ️  Regular PR — ceremony gate enforcement applies."
            echo "bypass=false" >> $GITHUB_OUTPUT
          fi

      - name: Detect governed paths in PR diff
        id: scope
        run: |
          echo "=== Governed Path Detection ==="
          BASE_BRANCH="${{ github.event.pull_request.base.ref }}"
          CHANGED_FILES=$(git diff --name-only "origin/${BASE_BRANCH}...HEAD" 2>/dev/null || \
                          git diff --name-only HEAD~1 2>/dev/null || true)

          echo "Changed files:"
          echo "$CHANGED_FILES" | sed 's/^/  /'
          echo ""

          IN_SCOPE=false
          while IFS= read -r f; do
            if [[ "$f" =~ ^\.github/workflows/.*\.yml$ ]] || \
               [[ "$f" =~ ^\.github/agents/.*\.md$ ]] || \
               [[ "$f" =~ ^\.agent-workspace/foreman-v2/knowledge/.*\.md$ ]]; then
              IN_SCOPE=true
              echo "  ✦ Governed path detected: $f"
            fi
          done <<< "$CHANGED_FILES"

          echo "in_scope=$IN_SCOPE" >> $GITHUB_OUTPUT
          echo ""
          if [ "$IN_SCOPE" = true ]; then
            echo "→ PR is in scope for governance ceremony gate."
          else
            echo "→ PR is out of scope — no governed paths changed."
          fi

  # ============================================================================
  # JOB 2: Draft PR check
  # Governance ceremony must be complete before a PR leaves draft state.
  # ============================================================================
  draft-check:
    name: "governance-ceremony/draft-check"
    runs-on: ubuntu-latest
    needs: detect-scope
    if: needs.detect-scope.outputs.bypass != 'true' && needs.detect-scope.outputs.in_scope == 'true'
    steps:
      - name: Check PR is not in draft state
        run: |
          echo "=== Draft PR Check ==="
          echo "Authority: FAIL-ONLY-ONCE v2.2.0 (A-016 PHASE-4-BEFORE-REPORT-PROGRESS)"
          echo ""

          IS_DRAFT="${{ github.event.pull_request.draft }}"
          echo "Draft state: $IS_DRAFT"
          echo ""

          if [[ "$IS_DRAFT" == "true" ]]; then
            echo "❌ FAIL — PR is in draft state."
            echo ""
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo ""
            echo "🚨 GOV-BREACH-AIMC-W5-002 — DRAFT PR WITH GOVERNED PATH CHANGES"
            echo ""
            echo "This PR modifies governed paths (CI workflows, agent contracts, or"
            echo "Tier 2 knowledge) but is still in draft state."
            echo ""
            echo "Governance ceremony MUST be complete before marking ready-for-review:"
            echo "  1. Complete Phase 4 PREHANDOVER ceremony."
            echo "  2. PREHANDOVER proof at .agent-workspace/foreman-v2/memory/PREHANDOVER-*.md"
            echo "  3. IAA audit token (not PENDING) in the proof."
            echo "  4. IAA Agent Response (verbatim) section in the proof."
            echo "  5. ## Governance block in PR body."
            echo "  6. Convert PR from draft to ready-for-review."
            echo ""
            echo "Reference:"
            echo "  - FAIL-ONLY-ONCE v2.2.0 A-010, A-014, A-015, A-016"
            echo "  - foreman-v2-agent contract Phase 4"
            echo ""
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            exit 1
          fi

          echo "✅ PASS — PR is not in draft state."

  # ============================================================================
  # JOB 3: PREHANDOVER proof presence, IAA token, and verbatim response check
  # ============================================================================
  prehandover-ceremony-check:
    name: "governance-ceremony/prehandover-and-iaa-token"
    runs-on: ubuntu-latest
    needs: detect-scope
    if: needs.detect-scope.outputs.bypass != 'true' && needs.detect-scope.outputs.in_scope == 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check PREHANDOVER proof exists with valid IAA token and verbatim response
        run: |
          echo "=== PREHANDOVER Proof and IAA Ceremony Check ==="
          echo "Authority: FAIL-ONLY-ONCE v2.2.0 (A-010, A-014, A-015, A-016)"
          echo "Scope: .github/workflows/, .github/agents/, .agent-workspace/foreman-v2/knowledge/*.md"
          echo ""

          # ----------------------------------------------------------------
          # Step 1: Locate all PREHANDOVER proof files
          # ----------------------------------------------------------------
          PROOF_FILES=$(find .agent-workspace/foreman-v2/memory -name "PREHANDOVER-*.md" \
                        2>/dev/null | sort -r || true)

          if [ -z "$PROOF_FILES" ]; then
            echo "❌ FAIL — No PREHANDOVER proof file found."
            echo ""
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo ""
            echo "🚨 GOV-BREACH-AIMC-W5-002 — PREHANDOVER PROOF MISSING"
            echo ""
            echo "This PR modifies governed paths but no PREHANDOVER proof exists at:"
            echo "  .agent-workspace/foreman-v2/memory/PREHANDOVER-*.md"
            echo ""
            echo "Action Required:"
            echo "  1. Complete Phase 4 PREHANDOVER ceremony per foreman-v2-agent contract."
            echo "  2. Create PREHANDOVER proof using the template:"
            echo "     .agent-workspace/foreman-v2/knowledge/prehandover-template.md"
            echo "  3. Invoke IAA via task tool and obtain ASSURANCE-TOKEN (A-014)."
            echo "  4. Record token in proof; paste verbatim IAA response (S-009, A-016)."
            echo "  5. Push to re-trigger CI."
            echo ""
            echo "Reference:"
            echo "  - FAIL-ONLY-ONCE v2.2.0 A-010, A-014, A-015, A-016"
            echo "  - foreman-v2-agent contract Phase 4 Step 4.2"
            echo ""
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            exit 1
          fi

          echo "PREHANDOVER proof files found:"
          echo "$PROOF_FILES" | sed 's/^/  /'
          echo ""

          # ----------------------------------------------------------------
          # Step 2: Check each proof for valid IAA token and verbatim response
          # A PR may have multiple proof files; any one valid proof is sufficient.
          # ----------------------------------------------------------------
          VALID_PROOF_FOUND=false
          VALID_PROOF_PATH=""
          PENDING_COUNT=0
          ADVISORY_COUNT=0
          EMPTY_RESPONSE_COUNT=0

          while IFS= read -r pf; do
            if [ -z "$pf" ] || [ ! -f "$pf" ]; then
              continue
            fi

            echo "--- Checking: $pf ---"

            # Check iaa_audit_token field
            TOKEN_LINE=$(grep -E "iaa_audit_token:" "$pf" | head -1 || true)

            if [ -z "$TOKEN_LINE" ]; then
              echo "  ⚠️  iaa_audit_token field not found — skipping."
              continue
            fi

            echo "  Token line: $TOKEN_LINE"

            if echo "$TOKEN_LINE" | grep -qiE "PENDING"; then
              echo "  ⚠️  Token is PENDING — ceremony not yet complete."
              PENDING_COUNT=$((PENDING_COUNT + 1))
              continue
            fi

            if echo "$TOKEN_LINE" | grep -qiE "PHASE_A_ADVISORY"; then
              echo "  ⚠️  Token is PHASE_A_ADVISORY (stale advisory mode)."
              ADVISORY_COUNT=$((ADVISORY_COUNT + 1))
              continue
            fi

            # Check ## IAA Agent Response (verbatim) section is non-empty
            IAA_RESPONSE=$(awk \
              '/^## IAA Agent Response \(verbatim\)/{found=1; next}
               found && /^## /{found=0}
               found{print}' \
              "$pf" | grep -v '^<!--' | grep -v '^[[:space:]]*$' | head -3 || true)

            if [ -z "$IAA_RESPONSE" ]; then
              echo "  ⚠️  ## IAA Agent Response (verbatim) section is empty."
              EMPTY_RESPONSE_COUNT=$((EMPTY_RESPONSE_COUNT + 1))
              continue
            fi

            # Check for placeholder text in response
            if echo "$IAA_RESPONSE" | grep -qiE "\[IAA agent output pasted verbatim|placeholder|TODO|TBD\]"; then
              echo "  ⚠️  ## IAA Agent Response (verbatim) contains placeholder text."
              EMPTY_RESPONSE_COUNT=$((EMPTY_RESPONSE_COUNT + 1))
              continue
            fi

            # This proof is valid
            VALID_PROOF_FOUND=true
            VALID_PROOF_PATH="$pf"
            echo "  ✅ Valid proof with resolved IAA token and verbatim response."
            break

          done <<< "$PROOF_FILES"

          echo ""

          if [ "$VALID_PROOF_FOUND" = true ]; then
            echo "=== PREHANDOVER Proof and IAA Ceremony Check: PASS ==="
            echo ""
            echo "✅ Valid PREHANDOVER proof found: $VALID_PROOF_PATH"
            echo ""
            echo "Per FAIL-ONLY-ONCE v2.2.0 A-010 and A-014:"
            echo "  - PREHANDOVER proof present ✅"
            echo "  - iaa_audit_token resolved (not PENDING) ✅"
            echo "  - ## IAA Agent Response (verbatim) non-empty ✅"
          else
            echo "❌ FAIL — No valid PREHANDOVER proof found."
            echo ""
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo ""
            echo "🚨 GOV-BREACH-AIMC-W5-002 — GOVERNANCE CEREMONY INCOMPLETE"
            echo ""
            echo "Proof files found: $(echo "$PROOF_FILES" | wc -l)"
            if [ "$PENDING_COUNT" -gt 0 ]; then
              echo "  - $PENDING_COUNT proof(s) have iaa_audit_token: PENDING"
              echo "    → Complete IAA ceremony. Invoke independent-assurance-agent"
              echo "      via task tool and record the returned ASSURANCE-TOKEN. (A-014)"
            fi
            if [ "$ADVISORY_COUNT" -gt 0 ]; then
              echo "  - $ADVISORY_COUNT proof(s) have PHASE_A_ADVISORY token (stale)"
              echo "    → PHASE_A_ADVISORY is no longer valid (IAA is PHASE_B_BLOCKING)."
              echo "      Perform a real IAA audit and use the returned token. (A-015)"
            fi
            if [ "$EMPTY_RESPONSE_COUNT" -gt 0 ]; then
              echo "  - $EMPTY_RESPONSE_COUNT proof(s) missing ## IAA Agent Response (verbatim)"
              echo "    → Paste the complete verbatim IAA output into this section. (S-009)"
            fi
            echo ""
            echo "Action Required:"
            echo "  1. Invoke independent-assurance-agent via task tool (A-014)."
            echo "  2. Record the ASSURANCE-TOKEN in iaa_audit_token field."
            echo "  3. Paste the complete verbatim IAA response into:"
            echo "     ## IAA Agent Response (verbatim) section."
            echo "  4. Push to re-trigger CI."
            echo ""
            echo "Reference:"
            echo "  - FAIL-ONLY-ONCE v2.2.0 A-010, A-014, A-015, A-016"
            echo "  - S-009 (FAIL-ONLY-ONCE v1.8.0 — IAA verbatim response mandatory)"
            echo "  - prehandover-template.md"
            echo ""
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            exit 1
          fi

  # ============================================================================
  # JOB 4: PR body governance block check
  # ============================================================================
  pr-body-governance-check:
    name: "governance-ceremony/pr-body-governance-block"
    runs-on: ubuntu-latest
    needs: detect-scope
    if: needs.detect-scope.outputs.bypass != 'true' && needs.detect-scope.outputs.in_scope == 'true'
    env:
      PR_BODY: ${{ github.event.pull_request.body }}
    steps:
      - name: Check PR body contains required ## Governance block
        run: |
          echo "=== PR Body Governance Block Check ==="
          echo "Authority: FAIL-ONLY-ONCE v2.2.0 (A-010, A-014, A-015)"
          echo ""

          # ----------------------------------------------------------------
          # Check 1: ## Governance block exists
          # ----------------------------------------------------------------
          if ! printf '%s\n' "$PR_BODY" | grep -qE "^## Governance"; then
            echo "❌ FAIL — PR body is missing a ## Governance block."
            echo ""
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo ""
            echo "🚨 GOV-BREACH-AIMC-W5-002 — PR GOVERNANCE BLOCK MISSING"
            echo ""
            echo "This PR modifies governed paths but the PR body does not contain"
            echo "a required ## Governance section."
            echo ""
            echo "REQUIRED: Add a ## Governance section to the PR body with:"
            echo "  - IAA Category: <category of change>"
            echo "  - IAA Audit Token: IAA-session-NNN-YYYYMMDD-PASS"
            echo "  - PREHANDOVER Proof: .agent-workspace/foreman-v2/memory/PREHANDOVER-*.md"
            echo ""
            echo "Example:"
            echo "  ## Governance"
            echo "  - IAA Category: CI workflow addition"
            echo "  - IAA Audit Token: IAA-session-091-20260303-PASS"
            echo "  - PREHANDOVER Proof: .agent-workspace/foreman-v2/memory/PREHANDOVER-session-091-wave14-20260303.md"
            echo ""
            echo "Reference:"
            echo "  - FAIL-ONLY-ONCE v2.2.0 A-010, A-014, A-015"
            echo "  - foreman-v2-agent contract Phase 4 Step 4.4"
            echo ""
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            exit 1
          fi

          echo "✅ ## Governance block found in PR body."
          echo ""

          # ----------------------------------------------------------------
          # Check 2: IAA Audit Token field is present and not stale
          # ----------------------------------------------------------------
          if ! printf '%s\n' "$PR_BODY" | grep -qiE "IAA Audit Token"; then
            echo "❌ FAIL — ## Governance block is missing 'IAA Audit Token' field."
            echo ""
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "🚨 GOV-BREACH-AIMC-W5-002 — IAA AUDIT TOKEN MISSING FROM PR BODY"
            echo ""
            echo "Add to the ## Governance section:"
            echo "  - IAA Audit Token: IAA-session-NNN-YYYYMMDD-PASS"
            echo ""
            echo "Per A-015: Token format must be IAA-session-NNN-YYYYMMDD-PASS"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            exit 1
          fi

          TOKEN_LINE=$(printf '%s\n' "$PR_BODY" | grep -iE "IAA Audit Token" | head -1)
          echo "IAA Audit Token line: $TOKEN_LINE"

          if printf '%s\n' "$TOKEN_LINE" | grep -qiE "PENDING"; then
            echo "❌ FAIL — IAA Audit Token in PR body is PENDING (ceremony not complete)."
            echo ""
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "🚨 GOV-BREACH-AIMC-W5-002 — PENDING TOKEN IN PR BODY"
            echo ""
            echo "Complete the IAA ceremony (A-014) and update the token in the PR body"
            echo "from PENDING to the issued IAA-session-NNN-YYYYMMDD-PASS token."
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            exit 1
          fi

          if printf '%s\n' "$TOKEN_LINE" | grep -qiE "PHASE_A_ADVISORY"; then
            echo "❌ FAIL — IAA Audit Token in PR body is PHASE_A_ADVISORY (stale)."
            echo ""
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "🚨 GOV-BREACH-AIMC-W5-002 — STALE ADVISORY TOKEN IN PR BODY"
            echo ""
            echo "PHASE_A_ADVISORY is no longer valid. IAA is now PHASE_B_BLOCKING."
            echo "Perform a real IAA audit and use the returned token. (A-015)"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            exit 1
          fi

          echo "✅ IAA Audit Token in PR body is present and non-stale."
          echo ""

          # ----------------------------------------------------------------
          # Check 3: IAA Category field is present
          # ----------------------------------------------------------------
          if ! printf '%s\n' "$PR_BODY" | grep -qiE "IAA Category"; then
            echo "❌ FAIL — ## Governance block is missing 'IAA Category' field."
            echo ""
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "🚨 GOV-BREACH-AIMC-W5-002 — IAA CATEGORY MISSING FROM PR BODY"
            echo ""
            echo "Add to the ## Governance section:"
            echo "  - IAA Category: <category of change>"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            exit 1
          fi

          echo "✅ IAA Category found in PR body."
          echo ""

          # ----------------------------------------------------------------
          # Check 4: PREHANDOVER Proof path is referenced
          # ----------------------------------------------------------------
          if ! printf '%s\n' "$PR_BODY" | grep -qiE "PREHANDOVER Proof|PREHANDOVER-session"; then
            echo "❌ FAIL — ## Governance block missing PREHANDOVER Proof path reference."
            echo ""
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "🚨 GOV-BREACH-AIMC-W5-002 — PREHANDOVER PROOF PATH MISSING FROM PR BODY"
            echo ""
            echo "Add to the ## Governance section:"
            echo "  - PREHANDOVER Proof: .agent-workspace/foreman-v2/memory/PREHANDOVER-session-NNN-waveX-YYYYMMDD.md"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            exit 1
          fi

          echo "✅ PREHANDOVER Proof path found in PR body."
          echo ""
          echo "=== PR Body Governance Block Check: PASS ==="
          echo ""
          echo "All required governance block fields verified:"
          echo "  - ## Governance section ✅"
          echo "  - IAA Category ✅"
          echo "  - IAA Audit Token (non-stale) ✅"
          echo "  - PREHANDOVER Proof path ✅"

  # ============================================================================
  # JOB 5: Final governance ceremony verdict
  # All checks must pass for the ceremony gate to clear.
  # ============================================================================
  governance-ceremony-verdict:
    name: "governance-ceremony/verdict"
    runs-on: ubuntu-latest
    needs:
      - detect-scope
      - draft-check
      - prehandover-ceremony-check
      - pr-body-governance-check
    if: always() && needs.detect-scope.outputs.bypass != 'true' && needs.detect-scope.outputs.in_scope == 'true'
    steps:
      - name: Governance Ceremony Gate Verdict
        run: |
          echo "=== Governance Ceremony Gate — Final Verdict ==="
          echo "Authority: FAIL-ONLY-ONCE v2.2.0 | LIVING_AGENT_SYSTEM.md v6.2.0"
          echo ""

          DRAFT_STATUS="${{ needs.draft-check.result }}"
          PREHANDOVER_STATUS="${{ needs.prehandover-ceremony-check.result }}"
          PR_BODY_STATUS="${{ needs.pr-body-governance-check.result }}"

          echo "Draft Check:              $DRAFT_STATUS"
          echo "PREHANDOVER + IAA Token:  $PREHANDOVER_STATUS"
          echo "PR Body Governance Block: $PR_BODY_STATUS"
          echo ""

          if [[ "$DRAFT_STATUS" != "success" ]] || \
             [[ "$PREHANDOVER_STATUS" != "success" ]] || \
             [[ "$PR_BODY_STATUS" != "success" ]]; then
            echo "❌ GOVERNANCE CEREMONY GATE: FAIL"
            echo ""
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo ""
            echo "🚨 GOV-BREACH-AIMC-W5-002 — MERGE BLOCKED"
            echo ""
            echo "This PR modifies governed paths (CI workflows, agent contracts,"
            echo "or Foreman Tier 2 knowledge) and has not completed the required"
            echo "governance ceremony."
            echo ""
            echo "Review the individual check logs above for specific remediation."
            echo ""
            echo "Required ceremony steps:"
            echo "  1. Complete foreman-v2-agent Phase 4 PREHANDOVER ceremony."
            echo "  2. Create/update PREHANDOVER proof with resolved IAA token."
            echo "  3. IAA Agent Response (verbatim) section must be non-empty."
            echo "  4. Add ## Governance block to PR body."
            echo "  5. PR must not be in draft state."
            echo ""
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            exit 1
          fi

          echo "✅ GOVERNANCE CEREMONY GATE: PASS"
          echo ""
          echo "All governance ceremony requirements satisfied:"
          echo "  - PR is not in draft state ✅"
          echo "  - PREHANDOVER proof present with resolved IAA token ✅"
          echo "  - IAA Agent Response (verbatim) section non-empty ✅"
          echo "  - PR body contains complete ## Governance block ✅"
          echo ""
          echo "Per LIVING_AGENT_SYSTEM.md v6.2.0 and FAIL-ONLY-ONCE v2.2.0:"
          echo "  Governance ceremony confirmed complete. Merge gate cleared."
          echo "  Merge authority: CS2 ONLY (@APGI-cmy)."
