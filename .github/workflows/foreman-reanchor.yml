name: Foreman Handover Re-Anchor

# Fires when a Copilot-authored PR is opened, synchronised, or marked ready-for-review,
# and on-demand when CS2 or the Foreman types /foreman-anchor in a comment.
#
# Narrowed to handover-phase reminder (not a broad mid-wave pulse):
# For synchronize events, a handover keyword check prevents comment spam on routine pushes.
# For opened/ready_for_review events, always post to catch early handover attempts.
#
# PR type awareness (issue #1542):
# - Reads .admin/pr.json when present to determine requires_iaa and requires_ecap.
# - Product-fix PRs (requires_iaa=false, requires_ecap=false) receive lightweight re-anchor.
# - Governance-control PRs receive full heavy re-anchor only when manifest requires IAA/ECAP.
on:
  pull_request_target:
    types: [opened, synchronize, ready_for_review]
  issue_comment:
    types: [created]
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for manual trigger'
        required: false
        default: 'Manual activation'

permissions:
  pull-requests: write
  issues: write

jobs:
  foreman-reanchor:
    runs-on: ubuntu-latest

    # Fire for:
    # (a) pull_request_target events on copilot/ branches, OR
    # (b) issue_comment events that contain /foreman-anchor
    if: |
      (
        github.event_name == 'pull_request_target' &&
        (
          startsWith(github.head_ref, 'copilot/') ||
          github.event.pull_request.user.login == 'Copilot'
        )
      ) ||
      (
        github.event_name == 'issue_comment' &&
        contains(github.event.comment.body, '/foreman-anchor')
      ) ||
      github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout PR branch (pull_request_target events — to read wave-current-tasks.md)
        if: github.event_name == 'pull_request_target'
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 1

      - name: Checkout default branch (issue_comment / workflow_dispatch events)
        if: github.event_name != 'pull_request_target'
        uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - name: Read .admin/pr.json manifest and wave-current-tasks.md
        id: wave_tasks
        env:
          EVENT_ACTION: ${{ github.event.action }}
        run: |
          TASKS_FILE=".agent-workspace/foreman-v2/personal/wave-current-tasks.md"
          if [ -f "$TASKS_FILE" ]; then
            SNIPPET=$(head -c 500 "$TASKS_FILE" | sed "s/\`/'/g")
            echo "tasks_found=true" >> "$GITHUB_OUTPUT"
            echo "tasks_snippet<<EOF_TASKS" >> "$GITHUB_OUTPUT"
            echo "$SNIPPET" >> "$GITHUB_OUTPUT"
            echo "EOF_TASKS" >> "$GITHUB_OUTPUT"
          else
            echo "tasks_found=false" >> "$GITHUB_OUTPUT"
          fi

          # Read .admin/pr.json to determine governance mode
          # Default to heavy (requires_iaa=true) when manifest is absent or unreadable
          REQUIRES_IAA="true"
          REQUIRES_ECAP="true"
          PR_TYPE="unknown"
          if [ -f ".admin/pr.json" ] && command -v python3 >/dev/null 2>&1; then
            REQUIRES_IAA=$(python3 -c "
import json, sys
try:
    m = json.load(open('.admin/pr.json'))
    v = m.get('requires_iaa')
    print('false' if v is False else 'true')
except Exception:
    print('true')
" 2>/dev/null || echo "true")
            REQUIRES_ECAP=$(python3 -c "
import json, sys
try:
    m = json.load(open('.admin/pr.json'))
    v = m.get('requires_ecap')
    print('false' if v is False else 'true')
except Exception:
    print('true')
" 2>/dev/null || echo "true")
            PR_TYPE=$(python3 -c "
import json, sys
try:
    m = json.load(open('.admin/pr.json'))
    print(m.get('type', 'unknown'))
except Exception:
    print('unknown')
" 2>/dev/null || echo "unknown")
          fi
          echo "requires_iaa=$REQUIRES_IAA" >> "$GITHUB_OUTPUT"
          echo "requires_ecap=$REQUIRES_ECAP" >> "$GITHUB_OUTPUT"
          echo "pr_type=$PR_TYPE" >> "$GITHUB_OUTPUT"

          # For synchronize events, only post if handover keywords are present in the
          # HEAD commit message. This avoids spam on routine mid-wave pushes.
          # For opened/ready_for_review and non-PR events, always allow the post.
          if [ "$EVENT_ACTION" = "synchronize" ]; then
            COMMIT_MSG=$(git log -1 --format="%s %b" 2>/dev/null | tr '[:upper:]' '[:lower:]' || echo "")
            HANDOVER_KEYWORDS="handover prehandover phase 4 merge gate released session closure opojd"
            SHOULD_POST=false
            for kw in $HANDOVER_KEYWORDS; do
              if echo "$COMMIT_MSG" | grep -q "$kw"; then
                SHOULD_POST=true
                break
              fi
            done
            echo "should_post=$SHOULD_POST" >> "$GITHUB_OUTPUT"
          else
            echo "should_post=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Post foreman handover re-anchor comment
        if: steps.wave_tasks.outputs.should_post == 'true'
        uses: actions/github-script@v7
        env:
          TASKS_FOUND: ${{ steps.wave_tasks.outputs.tasks_found }}
          TASKS_SNIPPET: ${{ steps.wave_tasks.outputs.tasks_snippet }}
          REQUIRES_IAA: ${{ steps.wave_tasks.outputs.requires_iaa }}
          REQUIRES_ECAP: ${{ steps.wave_tasks.outputs.requires_ecap }}
          PR_TYPE: ${{ steps.wave_tasks.outputs.pr_type }}
        with:
          script: |
            const tasksFound = process.env.TASKS_FOUND === 'true';
            const tasksSnippet = process.env.TASKS_SNIPPET || '';
            const requiresIaa = process.env.REQUIRES_IAA !== 'false';
            const requiresEcap = process.env.REQUIRES_ECAP !== 'false';
            const prType = process.env.PR_TYPE || 'unknown';
            const isProductFix = !requiresIaa && !requiresEcap;

            const prNumber = context.payload.pull_request?.number
              || context.payload.issue?.number;

            if (!prNumber) {
              core.warning('Could not determine PR/issue number — skipping re-anchor comment.');
              return;
            }

            // Idempotency guard: skip if a re-anchor comment was already posted recently
            const MARKER = '<!-- foreman-handover-reanchor -->';
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              per_page: 20,
              sort: 'created',
              direction: 'desc',
            });
            const alreadyPosted = comments.some(c => c.body && c.body.includes(MARKER));
            if (alreadyPosted) {
              core.notice('Foreman handover re-anchor comment already posted — skipping duplicate.');
              return;
            }

            const tasksSection = tasksFound
              ? `\n\n**Outstanding wave tasks** (from \`.agent-workspace/foreman-v2/personal/wave-current-tasks.md\`):\n\`\`\`\n${tasksSnippet}\n...\n\`\`\``
              : '\n\n> \u2139\ufe0f No `wave-current-tasks.md` found \u2014 read `.agent-workspace/foreman-v2/memory/` latest session for wave state.';

            // ── Lightweight re-anchor for product-fix PRs (requires_iaa=false, requires_ecap=false) ──
            if (isProductFix) {
              const lightweightChecklist = [
                '1. \u2705 **CI gates green**: All required checks must be GREEN before marking merge-ready.',
                '   Run locally: `.github/scripts/validate-simple-pr-admin.sh` → PASS',
                '2. \u2705 **Scope declaration**: `.agent-admin/scope-declarations/pr-<N>.md` created and accurate.',
                '3. \u2705 **Evidence declared**: `evidence_required` in `.admin/pr.json` matches what you have produced.',
                '4. \u2705 **No IAA / ECAP ceremony required** for this PR type (`' + prType + '` with `requires_iaa: false`, `requires_ecap: false`).',
                '   \u26a0\ufe0f Do NOT invoke IAA or ECAP agents — this is a lightweight product-fix PR.',
                '5. \u2705 **Handover check**: Verify ALL current-head required CI checks are GREEN before claiming merge-ready.',
                '   A PR cannot claim handover/merge-ready while any required check is red, pending, or missing.',
                `6. \u2705 **OPOJD**: If this wave is complete \u2192 update \`wave-current-tasks.md\` to DONE.${tasksSection}`,
              ].join('\n');

              const lightBody = [
                `${MARKER}`,
                '## \ud83d\udd04 FOREMAN HANDOVER RE-ANCHOR (Lightweight — Product-Fix PR)',
                '',
                '@copilot \u2014 You are **foreman-v2-agent** (class: foreman). You do **NOT** build. You **orchestrate**.',
                '',
                `> \u2139\ufe0f **This is a product-fix PR** (\`.admin/pr.json\` type: \`${prType}\`, \`requires_iaa: false\`, \`requires_ecap: false\`).`,
                '> No PREHANDOVER proof, IAA final assurance, or ECAP ceremony is required.',
                '> Follow the lightweight checklist below.',
                '',
                '### Lightweight Handover Checklist:',
                lightweightChecklist,
                '',
                '**Authority**: CS2 (Johan Ras / @APGI-cmy) | Contract: foreman-v2-agent (class: foreman)',
              ].join('\n');

              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body: lightBody,
              });
              return;
            }

            // ── Full governance re-anchor for PRs requiring IAA/ECAP ──
            const ecapInstructions = [
              '---',
              '### \ud83d\udee1\ufe0f ECAP / Admin Ceremony — Classification & Invocation (REQUIRED before IAA final assurance)',
              '',
              '> \u26d4 **This PR cannot pass final governance unless the following steps are completed and committed BEFORE IAA invocation.**',
              '',
              '**STEP E-1 — Classify changed paths** (run locally):',
              '```bash',
              'git diff --name-only $(git merge-base origin/main HEAD)...HEAD',
              '```',
              'Identify whether any of these **protected-path categories** are touched:',
              '- `[AGENT-CONTRACT]` `.github/agents/*.md`',
              '- `[CANON-DOC]` `governance/canon/**`',
              '- `[CHECKLIST]` `governance/checklists/**`',
              '- `[TEMPLATE]` `governance/templates/**`',
              '- `[CANON-INV]` `governance/CANON_INVENTORY.json`',
              '',
              '**STEP E-2 — Record ECAP fields in PREHANDOVER proof** (before IAA invocation):',
              'Add these fields to `.agent-admin/prehandover/proof-<slug>.md`:',
              '```yaml',
              'protected_path_touched: true   # or false if none of the above categories match',
              'ecap_required: true            # true if protected paths touched; false only with CS2 waiver',
              'ecap_invoked: <true|false>     # true after invoking execution-ceremony-admin-agent',
              'ecap_verdict: <PASS|FAIL>      # filled after ECAP completes',
              '# OR if waived by CS2:',
              'ecap_waiver_ref: <CS2-waiver-reference>  # must reference an actual CS2 comment/decision',
              '```',
              '',
              '**STEP E-3 — Invoke ECAP** (if `ecap_required: true`):',
              '```',
              'task(agent_type: "execution-ceremony-admin-agent")',
              '```',
              'Provide: wave context, complete changed-file list (from E-1), PREHANDOVER draft, session memory.',
              'ECAP **must** produce a bundle artifact committed to:',
              '`.agent-workspace/execution-ceremony-admin-agent/bundles/PREHANDOVER-<slug>.md`',
              '',
              '**STEP E-4 — Update PREHANDOVER proof with ECAP outcome** then commit.',
              'Do NOT proceed to IAA until this is committed.',
            ].join('\n');

            const iaaInstructions = [
              '---',
              '### \ud83d\udd0d IAA Final Assurance — Invocation (REQUIRED after ECAP, before merge)',
              '',
              '> \u26d4 **This PR cannot pass final governance unless the following artifact is committed.**',
              '> Foreman PREHANDOVER proof alone is NOT evidence of IAA invocation.',
              '> `Quality Professor PASS` or `merge-ready` claims without a committed IAA token are rejected.',
              '',
              '**STEP I-1 — Pre-IAA Commit Gate** (Phase 4 Step 4.3a):',
              'Confirm ALL of these are committed before invoking IAA:',
              '- PREHANDOVER proof: `.agent-admin/prehandover/proof-<slug>.md`',
              '- Session memory: `.agent-workspace/foreman-v2/memory/session-NNN-YYYYMMDD.md`',
              '- ECAP bundle (if required): `.agent-workspace/execution-ceremony-admin-agent/bundles/PREHANDOVER-<slug>.md`',
              '- SCOPE_DECLARATION.md refreshed from final diff',
              '- Parking station updated',
              'Run: `git status --porcelain` → must be empty before invoking IAA.',
              '',
              '**STEP I-2 — Invoke IAA for FINAL ASSURANCE** (not just pre-brief):',
              '```',
              'task(agent_type: "independent-assurance-agent")',
              '```',
              'Provide ALL of the following to IAA:',
              '- Current PR number and URL',
              '- Governing issue number',
              '- HEAD SHA (the exact commit SHA being reviewed)',
              '- Complete changed-file list: `git diff --name-only $(git merge-base origin/main HEAD)...HEAD`',
              '- PREHANDOVER proof: path `.agent-admin/prehandover/proof-<slug>.md` + full content',
              '- Session memory: path + full content',
              '- Test / CI check status (all checks must be GREEN)',
              '- ECAP ceremony evidence (if protected paths touched)',
              '- Any open review findings from CI or code review',
              '',
              '**STEP I-3 — Commit the IAA-produced token artifact**:',
              'IAA must commit to ONE of:',
              '- `.agent-admin/assurance/iaa-token-session-NNN-wave-<slug>-YYYYMMDD.md`',
              '- OR populate `## TOKEN` section of `.agent-admin/assurance/iaa-wave-record-<slug>-YYYYMMDD.md`',
              '',
              'The committed artifact MUST contain:',
              '```',
              'PHASE_B_BLOCKING_TOKEN: <non-empty, non-PENDING value>',
              '```',
              'And: final verdict `PASS` or `PASS_WITH_CS2_WAIVER`, plus reference to PR number / HEAD SHA.',
              '',
              '**If IAA returns a REJECTION-PACKAGE:**',
              '- Fix ALL cited findings',
              '- Regenerate PREHANDOVER proof (new commit)',
              '- Re-invoke IAA (you own this loop — skipping is not permitted)',
              '',
              '**STEP I-4 — Confirm CI gates GREEN** before marking merge-ready.',
              'Required CI checks (all must be GREEN):',
              '- `preflight/iaa-final-assurance` — validates IAA token artifact',
              '- `preflight/ecap-admin-ceremony` — validates ECAP evidence for protected paths',
              '- All other existing preflight gates',
            ].join('\n');

            const obligationLines = [
              '1. \u2705 **ECAP Classification** (before IAA): Have you classified changed paths against protected-path categories? See ECAP instructions below.',
              '2. \u2705 **ECAP Invocation** (if protected paths touched): Has `execution-ceremony-admin-agent` been invoked? ECAP bundle committed?',
              '3. \u2705 **IAA Final Assurance** (Phase 4 Step 4.3b): Has this PR received an `ASSURANCE-TOKEN` with `PHASE_B_BLOCKING_TOKEN` non-empty?',
              '   - If NO \u2192 invoke IAA now — see detailed IAA instructions below.',
              '   - If you received a `REJECTION-PACKAGE` \u2192 fix all cited findings, regenerate PREHANDOVER proof (new commit), re-invoke IAA directly (you own this loop).',
              '4. \u2705 **Token Artifact Committed** (Phase 4 Step 4.3c): Is the IAA token committed either at `.agent-admin/assurance/iaa-token-*.md` with `PHASE_B_BLOCKING_TOKEN:` non-empty, or in a populated `## TOKEN` section within `.agent-admin/assurance/iaa-wave-record-*.md`?',
              '5. \u2705 **Pre-IAA Commit Gate** (Phase 4 Step 4.3a): `git status --porcelain` must be empty before IAA invocation.',
              '6. \u2705 **§4.3 Parity**: All merge gate checks must be GREEN locally before Phase 4.',
              '7. \u2705 **QP**: Has any builder returned a delivery requiring Quality-Professor review? If yes \u2192 execute QP gate now (Phase 3 Step 3.5).',
              '8. \ud83d\udeab **NEVER write production code, schemas, migrations, or tests** \u2014 if you find yourself editing source files, STOP and delegate (NO-IMPLEMENT-001).',
              `9. \u2705 **OPOJD**: If this wave is complete \u2192 write session memory, update \`wave-current-tasks.md\` to DONE, and close cleanly.${tasksSection}`,
            ].join('\n');

            const body = [
              `${MARKER}`,
              '## \ud83d\udd04 FOREMAN HANDOVER RE-ANCHOR',
              '',
              '@copilot \u2014 You are **foreman-v2-agent** (class: foreman). You do **NOT** build. You **orchestrate**.',
              '',
              '> \u26a0\ufe0f **Hard CI gates are now enforced.** Advisory reminders alone no longer protect the merge. Both `preflight/iaa-final-assurance` and `preflight/ecap-admin-ceremony` will **fail CI** if required artifacts are absent. You must produce committed artifacts — not governance text claims.',
              '',
              '### Phase 4 Handover Checklist \u2014 check each before proceeding:',
              obligationLines,
              '',
              ecapInstructions,
              '',
              iaaInstructions,
              '',
              '**Authority**: CS2 (Johan Ras / @APGI-cmy) | Contract: foreman-v2-agent (class: foreman)',
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body,
            });
