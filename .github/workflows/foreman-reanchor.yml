name: Foreman Re-Anchor Pulse

# Fires on every PR push to a wave/AAWP/MAT PR,
# and on-demand when CS2 types /foreman-anchor in a comment.
on:
  pull_request:
    types: [synchronize, review_requested]
  issue_comment:
    types: [created]

permissions:
  pull-requests: write
  issues: write

jobs:
  foreman-reanchor:
    runs-on: ubuntu-latest

    # Only run if:
    # (a) it's a wave/AAWP/MAT PR, OR
    # (b) a comment on any issue/PR contains /foreman-anchor
    if: |
      (
        github.event_name == 'pull_request' &&
        (
          contains(github.event.pull_request.title, 'Wave') ||
          contains(github.event.pull_request.title, 'AAWP') ||
          contains(github.event.pull_request.title, 'MAT') ||
          contains(toJson(github.event.pull_request.labels), 'aawp-deliverable') ||
          contains(toJson(github.event.pull_request.labels), 'mat-deliverable')
        )
      ) ||
      (
        github.event_name == 'issue_comment' &&
        contains(github.event.comment.body, '/foreman-anchor')
      )

    steps:
      - name: Checkout PR branch (pull_request events — to read wave-current-tasks.md)
        if: github.event_name == 'pull_request'
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 1

      - name: Checkout default branch (issue_comment events — to read wave-current-tasks.md)
        if: github.event_name == 'issue_comment'
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Read wave-current-tasks.md if present
        id: wave_tasks
        run: |
          TASKS_FILE=".agent-workspace/foreman-v2/personal/wave-current-tasks.md"
          if [ -f "$TASKS_FILE" ]; then
            # Extract first 500 chars, escape backticks for safe embedding
            SNIPPET=$(head -c 500 "$TASKS_FILE" | sed "s/\`/'/g")
            echo "tasks_found=true" >> "$GITHUB_OUTPUT"
            # Use delimiter to safely pass multiline content
            echo "tasks_snippet<<EOF_TASKS" >> "$GITHUB_OUTPUT"
            echo "$SNIPPET" >> "$GITHUB_OUTPUT"
            echo "EOF_TASKS" >> "$GITHUB_OUTPUT"
          else
            echo "tasks_found=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Post foreman re-anchor comment
        uses: actions/github-script@v7
        with:
          script: |
            const tasksFound = '${{ steps.wave_tasks.outputs.tasks_found }}' === 'true';
            const tasksSnippet = `${{ steps.wave_tasks.outputs.tasks_snippet }}`;

            const tasksSection = tasksFound
              ? `\n\n**Outstanding wave tasks** (from \`.agent-workspace/foreman-v2/personal/wave-current-tasks.md\`):\n\`\`\`\n${tasksSnippet}\n...\n\`\`\``
              : '\n\n> \u2139\ufe0f No `wave-current-tasks.md` found \u2014 read `.agent-workspace/foreman-v2/memory/` latest session for wave state.';

            const prNumber = context.payload.pull_request?.number
              || context.payload.issue?.number;

            const obligationLines = [
              '1. \u2705 **IAA**: Has this PR received an `ASSURANCE-TOKEN`? If not \u2192 invoke `independent-assurance-agent` now (Phase 4 Step 4.3a).',
              '2. \u2705 **Delegation**: Are there remaining wave tasks not yet delegated to a builder? If yes \u2192 delegate via task tool now (Phase 3 Step 3.3).',
              '3. \u2705 **QP**: Has any builder returned a delivery requiring Quality-Professor review? If yes \u2192 execute QP gate now (Phase 3 Step 3.5).',
              '4. \u2705 **Parity**: Has the \u00a74.3 merge gate parity check been run locally? If not \u2192 run it before Phase 4.',
              '5. \ud83d\udeab **NEVER write code, schemas, migrations, or tests** \u2014 if you find yourself about to edit a source file, STOP immediately and delegate to the correct builder (NO-IMPLEMENT-001).',
              `6. \ud83d\udeab **NEVER invoke IAA on your own work** \u2014 POLC boundary violation. IAA is independent.${tasksSection}`,
            ].join('\n');

            const body = [
              '## \ud83d\udd01 FOREMAN RE-ANCHOR \u2014 Mid-Wave Pulse',
              '',
              '@copilot \u2014 You are **foreman-v2-agent** (contract v2.5.0, class: foreman). You do **NOT** build. You **orchestrate**.',
              '',
              '### Your current obligations \u2014 check each before responding:',
              obligationLines,
              '',
              '**OPOJD reminder**: One pass, one job done. If this PR\'s wave is complete \u2192 write session memory, update `wave-current-tasks.md` to DONE, and close cleanly.',
              '**Authority**: CS2 (Johan Ras / @APGI-cmy) | Contract: foreman-v2-agent v6.2.0 / 2.5.0',
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body,
            });
