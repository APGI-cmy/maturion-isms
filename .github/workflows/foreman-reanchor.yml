name: Foreman Handover Re-Anchor

# Fires when a Copilot-authored PR is opened, synchronised, or marked ready-for-review,
# and on-demand when CS2 or the Foreman types /foreman-anchor in a comment.
#
# Narrowed to handover-phase reminder (not a broad mid-wave pulse):
# For synchronize events, a handover keyword check prevents comment spam on routine pushes.
# For opened/ready_for_review events, always post to catch early handover attempts.
on:
  pull_request_target:
    types: [opened, synchronize, ready_for_review]
  issue_comment:
    types: [created]
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for manual trigger'
        required: false
        default: 'Manual activation'

permissions:
  pull-requests: write
  issues: write

jobs:
  foreman-reanchor:
    runs-on: ubuntu-latest

    # Fire for:
    # (a) pull_request_target events on copilot/ branches, OR
    # (b) issue_comment events that contain /foreman-anchor
    if: |
      (
        github.event_name == 'pull_request_target' &&
        (
          startsWith(github.head_ref, 'copilot/') ||
          github.event.pull_request.user.login == 'Copilot'
        )
      ) ||
      (
        github.event_name == 'issue_comment' &&
        contains(github.event.comment.body, '/foreman-anchor')
      ) ||
      github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout PR branch (pull_request_target events — to read wave-current-tasks.md)
        if: github.event_name == 'pull_request_target'
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 1

      - name: Checkout default branch (issue_comment / workflow_dispatch events)
        if: github.event_name != 'pull_request_target'
        uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - name: Read wave-current-tasks.md and check handover keywords
        id: wave_tasks
        env:
          EVENT_ACTION: ${{ github.event.action }}
        run: |
          TASKS_FILE=".agent-workspace/foreman-v2/personal/wave-current-tasks.md"
          if [ -f "$TASKS_FILE" ]; then
            SNIPPET=$(head -c 500 "$TASKS_FILE" | sed "s/\`/'/g")
            echo "tasks_found=true" >> "$GITHUB_OUTPUT"
            echo "tasks_snippet<<EOF_TASKS" >> "$GITHUB_OUTPUT"
            echo "$SNIPPET" >> "$GITHUB_OUTPUT"
            echo "EOF_TASKS" >> "$GITHUB_OUTPUT"
          else
            echo "tasks_found=false" >> "$GITHUB_OUTPUT"
          fi

          # For synchronize events, only post if handover keywords are present in the
          # HEAD commit message. This avoids spam on routine mid-wave pushes.
          # For opened/ready_for_review and non-PR events, always allow the post.
          if [ "$EVENT_ACTION" = "synchronize" ]; then
            COMMIT_MSG=$(git log -1 --format="%s %b" 2>/dev/null | tr '[:upper:]' '[:lower:]' || echo "")
            HANDOVER_KEYWORDS="handover prehandover phase 4 merge gate released session closure opojd"
            SHOULD_POST=false
            for kw in $HANDOVER_KEYWORDS; do
              if echo "$COMMIT_MSG" | grep -q "$kw"; then
                SHOULD_POST=true
                break
              fi
            done
            echo "should_post=$SHOULD_POST" >> "$GITHUB_OUTPUT"
          else
            echo "should_post=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Post foreman handover re-anchor comment
        if: steps.wave_tasks.outputs.should_post == 'true'
        uses: actions/github-script@v7
        env:
          TASKS_FOUND: ${{ steps.wave_tasks.outputs.tasks_found }}
          TASKS_SNIPPET: ${{ steps.wave_tasks.outputs.tasks_snippet }}
        with:
          script: |
            const tasksFound = process.env.TASKS_FOUND === 'true';
            const tasksSnippet = process.env.TASKS_SNIPPET || '';

            const prNumber = context.payload.pull_request?.number
              || context.payload.issue?.number;

            if (!prNumber) {
              core.warning('Could not determine PR/issue number — skipping re-anchor comment.');
              return;
            }

            // Idempotency guard: skip if a re-anchor comment was already posted recently
            const MARKER = '<!-- foreman-handover-reanchor -->';
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              per_page: 20,
              sort: 'created',
              direction: 'desc',
            });
            const alreadyPosted = comments.some(c => c.body && c.body.includes(MARKER));
            if (alreadyPosted) {
              core.notice('Foreman handover re-anchor comment already posted — skipping duplicate.');
              return;
            }

            const tasksSection = tasksFound
              ? `\n\n**Outstanding wave tasks** (from \`.agent-workspace/foreman-v2/personal/wave-current-tasks.md\`):\n\`\`\`\n${tasksSnippet}\n...\n\`\`\``
              : '\n\n> \u2139\ufe0f No `wave-current-tasks.md` found \u2014 read `.agent-workspace/foreman-v2/memory/` latest session for wave state.';

            const obligationLines = [
              '1. \u2705 **IAA Invocation** (Phase 4 Step 4.3b): Has this PR received an `ASSURANCE-TOKEN`?',
              '   - If NO \u2192 invoke IAA now: `task(agent_type: "independent-assurance-agent")` — provide PREHANDOVER proof + session memory + evidence bundle',
              '   - If you received a `REJECTION-PACKAGE` \u2192 fix all cited findings, regenerate PREHANDOVER proof (new commit), re-invoke IAA directly (you own this loop)',
              '2. \u2705 **Token Ceremony** (Phase 4 Step 4.3c): Is the IAA token committed at `.agent-admin/assurance/iaa-token-*.md` with a non-empty `PHASE_B_BLOCKING_TOKEN:`?',
              '3. \u2705 **Pre-IAA Commit Gate** (Phase 4 Step 4.3a): Are PREHANDOVER proof, session memory, SCOPE_DECLARATION, and parking station all committed before IAA invocation?',
              '4. \u2705 **§4.3 Parity**: Has the merge gate parity check been run locally? All required checks must pass before Phase 4.',
              '5. \u2705 **QP**: Has any builder returned a delivery requiring Quality-Professor review? If yes \u2192 execute QP gate now (Phase 3 Step 3.5).',
              '6. \ud83d\udeab **NEVER write production code, schemas, migrations, or tests** \u2014 if you find yourself editing source files, STOP and delegate to the correct builder (NO-IMPLEMENT-001).',
              `7. \u2705 **OPOJD**: One pass, one job done. If this wave is complete \u2192 write session memory, update \`wave-current-tasks.md\` to DONE, and close cleanly.${tasksSection}`,
            ].join('\n');

            const body = [
              `${MARKER}`,
              '## \ud83d\udd04 FOREMAN HANDOVER RE-ANCHOR',
              '',
              '@copilot \u2014 You are **foreman-v2-agent** (contract v6.2.0 / 2.10.0, class: foreman). You do **NOT** build. You **orchestrate**.',
              '',
              '### Phase 4 Handover Checklist \u2014 check each before proceeding:',
              obligationLines,
              '',
              '**Authority**: CS2 (Johan Ras / @APGI-cmy) | Contract: foreman-v2-agent v6.2.0 / 2.10.0',
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body,
            });
