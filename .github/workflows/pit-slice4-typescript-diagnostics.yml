name: PIT Slice 4 TypeScript Diagnostics

on:
  pull_request:
    paths:
      - 'apps/isms-portal/**'
      - '.github/workflows/pit-slice4-typescript-diagnostics.yml'

permissions:
  contents: read

jobs:
  diagnostics:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.0
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --no-frozen-lockfile
      - name: Capture TypeScript diagnostics
        shell: bash
        run: |
          set +e
          pnpm --filter isms-portal exec tsc --noEmit > pit-slice4-tsc.log 2>&1
          status=$?
          cat pit-slice4-tsc.log
          echo "$status" > pit-slice4-tsc.exit
          exit 0
      - uses: actions/upload-artifact@v5
        with:
          name: pit-slice4-typescript-diagnostics
          path: |
            pit-slice4-tsc.log
            pit-slice4-tsc.exit
