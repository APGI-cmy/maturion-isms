# Purpose: Intercept @copilot push/commit attempts mid-session and inject a
# one-line redirect before the agent spends 10 minutes reasoning about 403s.
# Authority: CS2 (Johan Ras) — operational efficiency directive

name: Copilot Push Intercept

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

permissions:
  pull-requests: write
  issues: write

jobs:
  intercept-push-reasoning:
    name: "intercept/push-reasoning"
    runs-on: ubuntu-latest
    # Only fire on PR-related comments that mention @copilot AND contain push/commit/token reasoning
    if: >-
      (github.event_name == 'pull_request_review_comment' || github.event.issue.pull_request != null) &&
      contains(github.event.comment.body, '@copilot') &&
      (
        (contains(github.event.comment.body, 'push') && contains(github.event.comment.body, '403')) ||
        contains(github.event.comment.body, 'push failed') ||
        contains(github.event.comment.body, 'push access') ||
        contains(github.event.comment.body, 'MATURION_BOT_TOKEN') ||
        contains(github.event.comment.body, 'committed locally') ||
        contains(github.event.comment.body, 'local commit') ||
        contains(github.event.comment.body, 'push needs to be handled') ||
        contains(github.event.comment.body, 'infrastructure constraint') ||
        contains(github.event.comment.body, 'infrastructure limitation') ||
        contains(github.event.comment.body, 'gh CLI')
      )
    steps:
      - name: Inject push redirect instruction
        uses: actions/github-script@v7
        env:
          ISSUE_NUMBER: ${{ github.event.issue.number || github.event.pull_request.number }}
        with:
          script: |
            const issueNumber = parseInt(process.env.ISSUE_NUMBER, 10);
            if (isNaN(issueNumber)) {
              core.warning('Could not resolve issue/PR number — skipping intercept.');
              return;
            }

            // Idempotency: don't post if we already replied to this session
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              per_page: 100,
              sort: 'created',
              direction: 'desc',
            });

            const alreadyPosted = comments.some(c =>
              c.body && c.body.includes('PUSH-INTERCEPT')
            );
            if (alreadyPosted) {
              core.info('Push intercept already posted — skipping.');
              return;
            }

            const body = [
              '> **[PUSH-INTERCEPT — Governance Watchdog]**',
              '>',
              '> @copilot **Stop. Do not push. Do not reason about push failures, 403 errors, tokens, or credentials.**',
              '>',
              '> **Your only job right now:** produce your output as text in this PR comment thread.',
              '> CS2 will commit and push on your behalf during merge.',
              '>',
              '> - ❌ Do not attempt `git push`',
              '> - ❌ Do not attempt `gh` CLI pushes',
              '> - ❌ Do not reason about MATURION_BOT_TOKEN, runner credentials, or infrastructure constraints',
              '> - ✅ Write your artifact content as a fenced code block in a comment here',
              '> - ✅ State "OUTPUT COMPLETE" when done',
              '>',
              '> *This is expected behaviour. The push restriction is intentional. Authority: CS2.*',
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              body,
            });

            core.info('Push intercept comment posted.');
