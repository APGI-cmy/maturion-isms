name: Deploy MAT Frontend to Vercel

on:
  push:
    branches:
      - main
    paths:
      - 'modules/**'
      - 'api/**'
      - 'packages/ai-centre/src/**'
      - 'vercel.json'
      - '.github/workflows/deploy-mat-vercel.yml'
      - 'apps/maturion-maturity-legacy/supabase/migrations/**'
  pull_request:
    branches:
      - main
    paths:
      - 'modules/**'
      - 'api/**'
      - 'packages/ai-centre/src/**'
      - 'vercel.json'
      - '.github/workflows/deploy-mat-vercel.yml'
      - 'apps/maturion-maturity-legacy/supabase/migrations/**'
  workflow_dispatch:

env:
  NODE_VERSION: '20'
  PNPM_VERSION: '8.15.7'
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: modules/mat/frontend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Check for direct provider SDK imports (T-C-010 CI gate)
        working-directory: .
        run: |
          echo "Scanning modules/ for direct provider SDK imports..."
          # Fail if any non-test file in modules/ imports openai, @anthropic-ai, or similar SDKs directly
          if grep -rn \
            --include="*.ts" --include="*.tsx" --include="*.js" \
            --exclude="*.test.ts" --exclude="*.test.tsx" --exclude="*.test.js" \
            --exclude="*.spec.ts" --exclude="*.spec.tsx" \
            -E "from ['\"]openai['\"]|from ['\"]@anthropic-ai|from ['\"]@google/generative-ai|require\(['\"]openai['\"]|require\(['\"]@anthropic-ai|require\(['\"]@google/generative-ai" \
            modules/; then
            echo ""
            echo "❌ T-C-010 FAIL: Direct provider SDK import found in modules/."
            echo "   All AI provider access MUST go through the @maturion/ai-centre gateway."
            echo "   Replace the import above with the appropriate AICentre capability call."
            exit 1
          fi
          echo "✅ T-C-010 PASS: No direct provider SDK imports found in modules/."

      - name: Run ESLint
        run: npm run lint

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: modules/mat/frontend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run TypeScript compiler
        run: npx tsc --noEmit

  typecheck-api:
    name: Type Check API Routes
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install pnpm
        run: npm install -g pnpm@${{ env.PNPM_VERSION }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type-check api/ serverless routes
        run: pnpm exec tsc -p api/tsconfig.json --noEmit

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: modules/mat/frontend
    env:
      VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
      VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
      VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run test

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, typecheck, typecheck-api, test]
    defaults:
      run:
        working-directory: modules/mat/frontend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: env-var-audit — validate required environment variables
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: |
          echo "Running env-var-audit..."
          if [ -z "$VITE_SUPABASE_URL" ] || [ "$VITE_SUPABASE_URL" = "https://placeholder.supabase.co" ]; then
            echo "FAIL: VITE_SUPABASE_URL is not set or is a placeholder value"
            exit 1
          fi
          if [ -z "$VITE_SUPABASE_ANON_KEY" ] || [ "$VITE_SUPABASE_ANON_KEY" = "placeholder-anon-key" ]; then
            echo "FAIL: VITE_SUPABASE_ANON_KEY is not set or is a placeholder value"
            exit 1
          fi
          echo "PASS: All required env vars validated"

      - name: Build application
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mat-frontend-dist
          path: modules/mat/frontend/dist/
          retention-days: 7

  supabase-migrate:
    name: Apply Supabase Migrations
    runs-on: ubuntu-latest
    needs: [build]
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1

      - name: Apply pending migrations
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          if [ -z "$SUPABASE_DB_URL" ]; then
            echo "ERROR: SUPABASE_DB_URL secret is not set. Cannot apply migrations."
            exit 1
          fi
          psql "$SUPABASE_DB_URL" -c "CREATE TABLE IF NOT EXISTS legacy_migrations (name TEXT PRIMARY KEY, applied_at TIMESTAMPTZ NOT NULL DEFAULT now());"
          psql "$SUPABASE_DB_URL" -c "INSERT INTO legacy_migrations (name) VALUES ('20260310000001_wave16_6_schema_audit_completeness.sql') ON CONFLICT DO NOTHING;"
          for f in $(ls apps/maturion-maturity-legacy/supabase/migrations/*.sql | sort); do
            name=$(basename "$f")
            count=$(psql "$SUPABASE_DB_URL" -t -A -c "SELECT COUNT(*) FROM legacy_migrations WHERE name = '$name';")
            if [ "$count" = "0" ]; then
              echo "Applying $f..."
              psql "$SUPABASE_DB_URL" -v ON_ERROR_STOP=1 -f "$f"
              psql "$SUPABASE_DB_URL" -c "INSERT INTO legacy_migrations (name) VALUES ('$name') ON CONFLICT DO NOTHING;"
            else
              echo "Skipping $f (already applied)"
            fi
          done
          if [ -n "$FAILED_MIGRATION" ]; then
            echo "::error::Apply Supabase Migrations failed at: $FAILED_MIGRATION"
            exit 1
          fi
          echo "All legacy migrations applied successfully"

      # T-A-012: AIMC package migrations (packages/ai-centre/supabase/migrations/)
      # DEPENDENCY: AIMC migration 005_ai_feedback_pipeline.sql references the `organisations` table
      # defined in the legacy app migrations. This step MUST run AFTER "Apply pending migrations"
      # (apps/maturion-maturity-legacy) and MUST target the same $SUPABASE_DB_URL.
      # NOTE: `supabase db push` requires <timestamp>_name.sql filenames; AIMC uses sequential
      # names (001_ai_memory.sql). psql is used directly with an aimc_migrations tracking table
      # to apply each file exactly once, matching Supabase's migration semantics.
      - name: Apply AIMC package migrations
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          if [ -z "$SUPABASE_DB_URL" ]; then
            echo "ERROR: SUPABASE_DB_URL secret is not set. Cannot apply AIMC migrations."
            exit 1
          fi
          psql "$SUPABASE_DB_URL" -c "CREATE TABLE IF NOT EXISTS aimc_migrations (name TEXT PRIMARY KEY, applied_at TIMESTAMPTZ NOT NULL DEFAULT now());"
          FAILED_MIGRATION=""
          for f in $(ls packages/ai-centre/supabase/migrations/*.sql | sort); do
            name=$(basename "$f")
            count=$(psql "$SUPABASE_DB_URL" -t -A -c "SELECT COUNT(*) FROM aimc_migrations WHERE name = '$name';")
            if [ "$count" = "0" ]; then
              echo "Applying $f..."
              if ! psql "$SUPABASE_DB_URL" -v ON_ERROR_STOP=1 -f "$f"; then
                echo "::error file=$f::AIMC Migration FAILED: $f — see psql output above for the specific SQL error"
                FAILED_MIGRATION="$f"
                break
              fi
              psql "$SUPABASE_DB_URL" -c "INSERT INTO aimc_migrations (name) VALUES ('$name');"
              echo "Applied $f successfully"
            else
              echo "Skipping $f (already applied)"
            fi
          done
          if [ -n "$FAILED_MIGRATION" ]; then
            echo "::error::Apply AIMC Migrations failed at: $FAILED_MIGRATION"
            exit 1
          fi
          echo "All AIMC migrations applied successfully"

  schema-verification:
    name: Schema Verification
    runs-on: ubuntu-latest
    needs: [supabase-migrate]
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: schema-verification — verify public.audits exists in schema cache
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          echo "Verifying schema — checking public.audits table exists..."
          # Schema verification: public.audits must be present
          if [ -n "$SUPABASE_DB_URL" ]; then
            result=$(psql "$SUPABASE_DB_URL" -t -A -c \
              "SELECT COUNT(*) FROM information_schema.tables WHERE table_schema='public' AND table_name='audits';" 2>/dev/null || echo "0")
            if [ "$result" != "1" ]; then
              echo "FAIL: public.audits not found in schema cache"
              exit 1
            fi
            echo "PASS: public.audits verified"
          else
            echo "SUPABASE_DB_URL not set — skipping live schema check (CI secret required)"
          fi

      - name: schema-verification — verify public.audit_logs exists
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          echo "Verifying schema — checking public.audit_logs table exists..."
          # Schema verification: public.audit_logs must be present (Wave 15R migration)
          # Required by useCriteria.ts useUploadedDocuments() and useUploadCriteria()
          if [ -n "$SUPABASE_DB_URL" ]; then
            result=$(psql "$SUPABASE_DB_URL" -t -A -c \
              "SELECT COUNT(*) FROM information_schema.tables WHERE table_schema='public' AND table_name='audit_logs';" 2>/dev/null || echo "0")
            if [ "$result" != "1" ]; then
              echo "FAIL: public.audit_logs not found — migration 20260308000001_audit_logs_table.sql may not have been applied"
              exit 1
            fi
            echo "PASS: public.audit_logs verified"
          else
            echo "SUPABASE_DB_URL not set — skipping live schema check (CI secret required)"
          fi

      - name: schema-verification — verify public.evidence_submissions exists
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          echo "Verifying schema — checking public.evidence_submissions table exists..."
          if [ -n "$SUPABASE_DB_URL" ]; then
            result=$(psql "$SUPABASE_DB_URL" -t -A -c \
              "SELECT COUNT(*) FROM information_schema.tables WHERE table_schema='public' AND table_name='evidence_submissions';" 2>/dev/null || echo "0")
            if [ "$result" != "1" ]; then
              echo "WARN: public.evidence_submissions not found — migration 20260310000001_wave16_6_schema_audit_completeness.sql may not have been applied or was applied out-of-band. This is non-blocking; evidence_submissions was applied to the live DB directly."
            else
              echo "PASS: public.evidence_submissions verified"
            fi
          else
            echo "SUPABASE_DB_URL not set — skipping live schema check (CI secret required)"
          fi

  deploy-preview:
    name: Deploy Preview
    runs-on: ubuntu-latest
    needs: [build, supabase-migrate]
    if: github.event_name == 'pull_request'
    environment:
      name: preview
      url: ${{ steps.deploy.outputs.preview-url }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Enable pnpm (Corepack)
        run: |
          corepack enable
          corepack prepare pnpm@${{ env.PNPM_VERSION }} --activate
          pnpm --version

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Create .env file from GitHub Secrets
        run: |
          printf 'VITE_SUPABASE_URL=%s\nVITE_SUPABASE_ANON_KEY=%s\nVITE_API_BASE_URL=%s\n' \
            "$VITE_SUPABASE_URL" "$VITE_SUPABASE_ANON_KEY" "$VITE_API_BASE_URL" > modules/mat/frontend/.env
          chmod 600 modules/mat/frontend/.env
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}

      - name: Configure Vercel project
        env:
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
        run: |
          mkdir -p .vercel
          printf '{"projectId":"%s","orgId":"%s"}\n' \
            "$VERCEL_PROJECT_ID" "$VERCEL_ORG_ID" > .vercel/project.json

      - name: Pull Vercel Project Settings
        run: vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build Project Artifacts
        run: vercel build --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy Preview to Vercel
        id: deploy
        run: |
          url=$(vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }})
          echo "preview-url=$url" >> $GITHUB_OUTPUT
          echo "Preview URL: $url"

      - name: Comment Preview URL on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `✅ **Preview deployment ready!\n\n🔗 Preview URL: ${{ steps.deploy.outputs.preview-url }}`
            })

  deploy-production:
    name: Deploy Production
    runs-on: ubuntu-latest
    needs: [build, supabase-migrate]
    if: >
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main')
    environment:
      name: production
      url: https://mat.maturion.com
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Enable pnpm (Corepack)
        run: |
          corepack enable
          corepack prepare pnpm@${{ env.PNPM_VERSION }} --activate
          pnpm --version

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Create .env file from GitHub Secrets
        run: |
          printf 'VITE_SUPABASE_URL=%s\nVITE_SUPABASE_ANON_KEY=%s\nVITE_API_BASE_URL=%s\n' \
            "$VITE_SUPABASE_URL" "$VITE_SUPABASE_ANON_KEY" "$VITE_API_BASE_URL" > modules/mat/frontend/.env
          chmod 600 modules/mat/frontend/.env
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}

      - name: Configure Vercel project
        env:
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
        run: |
          mkdir -p .vercel
          printf '{"projectId":"%s","orgId":"%s"}\n' \
            "$VERCEL_PROJECT_ID" "$VERCEL_ORG_ID" > .vercel/project.json

      - name: Pull Vercel Project Settings
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build Project Artifacts
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy Production to Vercel
        id: deploy
        run: |
          url=$(vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }})
          echo "production-url=$url" >> $GITHUB_OUTPUT
          echo "Production URL: $url"

      - name: Create deployment summary
        run: |
          echo "## 🚀 MAT Frontend Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Status**: ✅ Deployed to Production" >> $GITHUB_STEP_SUMMARY
          echo "**URL**: ${{ steps.deploy.outputs.production-url }}" >> $GITHUB_STEP_SUMMARY
          echo "**Commit**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "**Branch**: ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "**Timestamp**: $(date -u +'%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY

  post-deploy-smoke-test:
    name: Post-Deploy Auth Smoke Test
    runs-on: ubuntu-latest
    needs: [deploy-production]
    permissions:
      contents: read
    if: >
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main')
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: auth-smoke — verify auth endpoint reachable after deploy
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: |
          echo "Running post-deploy-smoke-test auth-smoke check..."
          # Verify Supabase auth endpoint is reachable
          if [ -n "$VITE_SUPABASE_URL" ]; then
            response=$(curl -s -o /dev/null -w "%{http_code}" \
              "${VITE_SUPABASE_URL}/auth/v1/settings" \
              -H "apikey: ${VITE_SUPABASE_ANON_KEY}" 2>/dev/null || echo "000")
            if [ "$response" = "200" ]; then
              echo "PASS: auth-smoke — Supabase auth endpoint reachable (HTTP $response)"
            else
              echo "WARN: auth-smoke — Supabase auth endpoint returned HTTP $response"
            fi
          else
            echo "SKIP: VITE_SUPABASE_URL not set — skipping auth-smoke"
          fi
